/* ---- Store Class ---- */

class Store {
    constructor() {
        this._listeners = new Map();
        this._data = this._load();
        // Undo/Redo history
        this._undoStack = [];
        this._redoStack = [];
        this._maxHistory = 50;
        this._batchingUndo = false;
    }

    /* ---- Persistence ---- */

    _load() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (parsed.projects && parsed.tasks && parsed.resources) {
                    // Migrate: ensure all tasks have assignees array
                    parsed.tasks.forEach(t => {
                        if (!t.assignees) {
                            t.assignees = t.assignee ? [t.assignee] : [];
                        }
                        // Migrate dependencies: string[] → {taskId, type}[]
                        if (!t.dependencies) {
                            t.dependencies = [];
                        } else if (t.dependencies.length && typeof t.dependencies[0] === 'string') {
                            t.dependencies = t.dependencies.map(id => ({ taskId: id, type: 'FS' }));
                        }
                    });
                    return parsed;
                }
            }
        } catch (e) {
            console.warn('Failed to load from localStorage:', e);
        }

        // Initialize with default data
        return this._createDefaults();
    }

    _createDefaults() {
        const resources = createDefaultResources();
        const { project, tasks } = createDefaultProject(resources);

        return {
            projects: [project],
            tasks: tasks,
            resources: resources,
            settings: {
                activeProjectId: project.id,
                activeView: 'timeline',
                zoomLevel: 'week', // 'day', 'week', 'month', 'quarter'
                theme: null, // null = system preference
            },
        };
    }

    _save() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(this._data));
        } catch (e) {
            console.warn('Failed to save to localStorage:', e);
        }
    }

    /* ---- Event System ---- */

    on(event, callback) {
        if (!this._listeners.has(event)) {
            this._listeners.set(event, new Set());
        }
        this._listeners.get(event).add(callback);
        return () => this._listeners.get(event).delete(callback);
    }

    _emit(event, data) {
        const listeners = this._listeners.get(event);
        if (listeners) {
            listeners.forEach(cb => cb(data));
        }
        // Always emit a generic 'change' event
        if (event !== 'change') {
            const changeListeners = this._listeners.get('change');
            if (changeListeners) {
                changeListeners.forEach(cb => cb({ event, data }));
            }
        }
    }

    /* ---- Undo / Redo ---- */

    _snapshot() {
        if (this._batchingUndo) return;
        this._undoStack.push(JSON.stringify(this._data));
        if (this._undoStack.length > this._maxHistory) {
            this._undoStack.shift();
        }
        this._redoStack = [];
    }

    undo() {
        if (this._undoStack.length === 0) return false;
        this._redoStack.push(JSON.stringify(this._data));
        this._data = JSON.parse(this._undoStack.pop());
        this._save();
        this._emit('undo', null);
        return true;
    }

    redo() {
        if (this._redoStack.length === 0) return false;
        this._undoStack.push(JSON.stringify(this._data));
        this._data = JSON.parse(this._redoStack.pop());
        this._save();
        this._emit('redo', null);
        return true;
    }

    canUndo() { return this._undoStack.length > 0; }
    canRedo() { return this._redoStack.length > 0; }

    /* ---- Projects ---- */

    getProjects() {
        return [...this._data.projects];
    }

    getActiveProject() {
        const id = this._data.settings.activeProjectId;
        return this._data.projects.find(p => p.id === id) || this._data.projects[0];
    }

    setActiveProject(projectId) {
        this._data.settings.activeProjectId = projectId;
        this._save();
        this._emit('project:change', projectId);
    }

    addProject(project) {
        this._snapshot();
        const newProject = {
            id: generateId(),
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            ...project,
        };
        this._data.projects.push(newProject);
        this._save();
        this._emit('project:add', newProject);
        return newProject;
    }

    updateProject(projectId, updates) {
        this._snapshot();
        const idx = this._data.projects.findIndex(p => p.id === projectId);
        if (idx === -1) return null;
        this._data.projects[idx] = {
            ...this._data.projects[idx],
            ...updates,
            updatedAt: new Date().toISOString(),
        };
        this._save();
        this._emit('project:update', this._data.projects[idx]);
        return this._data.projects[idx];
    }

    deleteProject(projectId) {
        this._snapshot();
        this._data.projects = this._data.projects.filter(p => p.id !== projectId);
        this._data.tasks = this._data.tasks.filter(t => t.projectId !== projectId);
        if (this._data.settings.activeProjectId === projectId) {
            this._data.settings.activeProjectId = this._data.projects[0]?.id || null;
        }
        this._save();
        this._emit('project:delete', projectId);
    }

    /* ---- Tasks ---- */

    getTasks(projectId = null) {
        const pid = projectId || this._data.settings.activeProjectId;
        return this._data.tasks
            .filter(t => t.projectId === pid)
            .sort((a, b) => a.order - b.order);
    }

    getTask(taskId) {
        return this._data.tasks.find(t => t.id === taskId) || null;
    }

    getChildTasks(parentId) {
        return this._data.tasks
            .filter(t => t.parentId === parentId)
            .sort((a, b) => a.order - b.order);
    }

    getTaskTree(projectId = null) {
        const tasks = this.getTasks(projectId);
        const roots = tasks.filter(t => !t.parentId);
        const buildTree = (parent) => ({
            ...parent,
            children: tasks
                .filter(t => t.parentId === parent.id)
                .sort((a, b) => a.order - b.order)
                .map(buildTree),
        });
        return roots.map(buildTree);
    }

    addTask(task) {
        this._snapshot();
        const tasks = this.getTasks();
        const newTask = {
            id: generateId(),
            projectId: this._data.settings.activeProjectId,
            parentId: null,
            description: '',
            progress: 0,
            priority: 'medium',
            status: 'todo',
            color: '#6366F1',
            assignee: null,
            assignees: [],
            isMilestone: false,
            isPhase: false,
            order: tasks.length,
            dependencies: [],
            collapsed: false,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            ...task,
        };

        // If milestone, endDate = startDate
        if (newTask.isMilestone) {
            newTask.endDate = newTask.startDate;
        }

        this._data.tasks.push(newTask);
        this._save();
        this._emit('task:add', newTask);
        return newTask;
    }

    updateTask(taskId, updates) {
        if (!this._batchingUndo) this._snapshot();
        const idx = this._data.tasks.findIndex(t => t.id === taskId);
        if (idx === -1) return null;

        this._data.tasks[idx] = {
            ...this._data.tasks[idx],
            ...updates,
            updatedAt: new Date().toISOString(),
        };

        // Recalculate phase dates and progress
        const task = this._data.tasks[idx];
        if (task.parentId) {
            this._recalculatePhase(task.parentId);
        }

        // Propagate to successors only when dates change
        if (updates.startDate !== undefined || updates.endDate !== undefined) {
            this.propagateDependencies(taskId);
        }

        this._save();
        this._emit('task:update', this._data.tasks[idx]);
        return this._data.tasks[idx];
    }

    deleteTask(taskId) {
        if (!this._batchingUndo) this._snapshot();
        const task = this.getTask(taskId);
        if (!task) return;

        // Delete children recursively
        const children = this.getChildTasks(taskId);
        children.forEach(child => this.deleteTask(child.id));

        const parentId = task.parentId;
        this._data.tasks = this._data.tasks.filter(t => t.id !== taskId);

        if (parentId) {
            this._recalculatePhase(parentId);
        }

        this._save();
        this._emit('task:delete', taskId);
    }

    /**
     * Apply predecessor constraints to a task.
     * Adjusts task dates based on its predecessors, then cascades to successors.
     */
    applyPredecessorConstraints(taskId) {
        const task = this.getTask(taskId);
        if (!task || !task.dependencies || !task.dependencies.length) return;

        const duration = daysBetween(task.startDate, task.endDate);
        let latestStart = null;
        let latestEnd = null;

        task.dependencies.forEach(dep => {
            const pred = this.getTask(dep.taskId);
            if (!pred) return;

            const predStart = new Date(pred.startDate);
            const predEnd = new Date(pred.endDate);

            if (dep.type === 'FS') {
                const candidate = addDays(predEnd, 1);
                if (!latestStart || candidate > latestStart) latestStart = candidate;
            } else if (dep.type === 'SS') {
                if (!latestStart || predStart > latestStart) latestStart = predStart;
            } else if (dep.type === 'FF') {
                if (!latestEnd || predEnd > latestEnd) latestEnd = predEnd;
            } else if (dep.type === 'SF') {
                if (!latestEnd || predStart > latestEnd) latestEnd = predStart;
            }
        });

        let changed = false;

        if (latestStart) {
            const ns = formatDateISO(latestStart);
            if (new Date(ns) > new Date(task.startDate)) {
                task.startDate = ns;
                task.endDate = formatDateISO(addDays(latestStart, duration));
                changed = true;
            }
        }
        if (latestEnd) {
            const ne = formatDateISO(latestEnd);
            if (new Date(ne) > new Date(task.endDate)) {
                task.endDate = ne;
                task.startDate = formatDateISO(addDays(latestEnd, -duration));
                changed = true;
            }
        }

        if (changed) {
            if (task.parentId) this._recalculatePhase(task.parentId);
            this.propagateDependencies(taskId);
            this._save();
            this._emit('task:update', task);
        }
    }

    /**
     * Get tasks that depend on this task (successors)
     */
    getSuccessors(taskId) {
        return this._data.tasks.filter(t =>
            t.dependencies && t.dependencies.some(d => d.taskId === taskId)
        );
    }

    /**
     * Propagate date changes to successors based on link type
     * FS: successor.start = predecessor.end + 1
     * SS: successor.start = predecessor.start
     * FF: successor.end = predecessor.end
     * SF: successor.end = predecessor.start
     */
    propagateDependencies(taskId, visited = new Set()) {
        if (visited.has(taskId)) return; // prevent cycles
        visited.add(taskId);

        const task = this.getTask(taskId);
        if (!task) return;

        const successors = this.getSuccessors(taskId);
        successors.forEach(succ => {
            const link = succ.dependencies.find(d => d.taskId === taskId);
            if (!link) return;

            const predStart = new Date(task.startDate);
            const predEnd = new Date(task.endDate);
            const succDuration = daysBetween(succ.startDate, succ.endDate);
            let changed = false;

            if (link.type === 'FS') {
                // Successor starts after predecessor finishes
                const newStart = addDays(predEnd, 1);
                const ns = formatDateISO(newStart);
                if (ns !== succ.startDate) {
                    succ.startDate = ns;
                    succ.endDate = formatDateISO(addDays(newStart, succDuration));
                    changed = true;
                }
            } else if (link.type === 'SS') {
                // Successor starts when predecessor starts
                const ns = formatDateISO(predStart);
                if (ns !== succ.startDate) {
                    succ.startDate = ns;
                    succ.endDate = formatDateISO(addDays(predStart, succDuration));
                    changed = true;
                }
            } else if (link.type === 'FF') {
                // Successor finishes when predecessor finishes
                const ne = formatDateISO(predEnd);
                if (ne !== succ.endDate) {
                    succ.endDate = ne;
                    succ.startDate = formatDateISO(addDays(predEnd, -succDuration));
                    changed = true;
                }
            } else if (link.type === 'SF') {
                // Successor finishes when predecessor starts
                const ne = formatDateISO(predStart);
                if (ne !== succ.endDate) {
                    succ.endDate = ne;
                    succ.startDate = formatDateISO(addDays(predStart, -succDuration));
                    changed = true;
                }
            }

            if (changed) {
                if (succ.parentId) this._recalculatePhase(succ.parentId);
                // Recursively propagate
                this.propagateDependencies(succ.id, visited);
            }
        });

        this._save();
    }

    toggleTaskCollapse(taskId) {
        const task = this.getTask(taskId);
        if (!task) return;
        this.updateTask(taskId, { collapsed: !task.collapsed });
    }

    _recalculatePhase(phaseId) {
        const phase = this._data.tasks.find(t => t.id === phaseId);
        if (!phase || !phase.isPhase) return;

        const children = this._data.tasks.filter(t => t.parentId === phaseId);
        if (children.length === 0) return;

        // Recalculate dates
        const dates = children.map(c => new Date(c.startDate).getTime());
        const endDates = children.map(c => new Date(c.endDate).getTime());
        phase.startDate = formatDateISO(new Date(Math.min(...dates)));
        phase.endDate = formatDateISO(new Date(Math.max(...endDates)));

        // Recalculate progress
        const totalProgress = children.reduce((sum, c) => sum + (c.progress || 0), 0);
        phase.progress = Math.round(totalProgress / children.length);
    }

    /* ---- Resources ---- */

    getResources() {
        return [...this._data.resources];
    }

    getResource(resourceId) {
        return this._data.resources.find(r => r.id === resourceId) || null;
    }

    addResource(resource) {
        this._snapshot();
        const newResource = {
            id: generateId(),
            ...resource,
        };
        this._data.resources.push(newResource);
        this._save();
        this._emit('resource:add', newResource);
        return newResource;
    }

    updateResource(resourceId, updates) {
        this._snapshot();
        const idx = this._data.resources.findIndex(r => r.id === resourceId);
        if (idx === -1) return null;
        this._data.resources[idx] = { ...this._data.resources[idx], ...updates };
        this._save();
        this._emit('resource:update', this._data.resources[idx]);
        return this._data.resources[idx];
    }

    deleteResource(resourceId) {
        this._snapshot();
        this._data.resources = this._data.resources.filter(r => r.id !== resourceId);
        // Unassign from tasks
        this._data.tasks.forEach(t => {
            if (t.assignee === resourceId) t.assignee = null;
            if (t.assignees) {
                t.assignees = t.assignees.filter(id => id !== resourceId);
            }
        });
        this._save();
        this._emit('resource:delete', resourceId);
    }

    /* ---- Settings ---- */

    getSettings() {
        return { ...this._data.settings };
    }

    updateSettings(updates) {
        this._data.settings = { ...this._data.settings, ...updates };
        this._save();
        this._emit('settings:change', this._data.settings);
    }

    /* ---- Computed Data ---- */

    getProjectStats() {
        const tasks = this.getTasks();
        const nonPhaseTasks = tasks.filter(t => !t.isPhase);
        const activeTasks = nonPhaseTasks.filter(t => t.status !== 'done');
        const project = this.getActiveProject();

        const totalProgress = nonPhaseTasks.length > 0
            ? Math.round(nonPhaseTasks.reduce((sum, t) => sum + t.progress, 0) / nonPhaseTasks.length)
            : 0;

        const daysRemaining = project
            ? Math.max(0, daysBetween(new Date(), project.endDate))
            : 0;

        return {
            totalTasks: nonPhaseTasks.length,
            activeTasks: activeTasks.length,
            completedTasks: nonPhaseTasks.filter(t => t.status === 'done').length,
            progress: totalProgress,
            daysRemaining,
            budget: project?.budget || 0,
            budgetUsed: project?.budgetUsed || 0,
        };
    }

    getTimelineRange() {
        const tasks = this.getTasks();
        if (tasks.length === 0) {
            const today = new Date();
            return {
                start: new Date(today.getFullYear(), today.getMonth(), 1),
                end: addDays(today, 90),
            };
        }

        const starts = tasks.map(t => new Date(t.startDate).getTime());
        const ends = tasks.map(t => new Date(t.endDate).getTime());
        const minDate = new Date(Math.min(...starts));
        const maxDate = new Date(Math.max(...ends));

        // Add some padding
        return {
            start: addDays(minDate, -7),
            end: addDays(maxDate, 14),
        };
    }

    /* ---- Critical Path ---- */

    /**
     * Compute the critical path: the longest chain of dependent tasks
     * that determines the project minimum duration.
     * Returns an array of task IDs on the critical path.
     */
    getCriticalPath() {
        const tasks = this.getTasks().filter(t => !t.isPhase);
        if (tasks.length === 0) return [];

        const taskMap = {};
        tasks.forEach(t => { taskMap[t.id] = t; });

        // Build adjacency: task -> successors
        const successorsOf = {};
        const predecessorsOf = {};
        tasks.forEach(t => {
            successorsOf[t.id] = [];
            predecessorsOf[t.id] = [];
        });
        tasks.forEach(t => {
            (t.dependencies || []).forEach(dep => {
                const predId = dep.taskId;
                if (taskMap[predId]) {
                    successorsOf[predId].push(t.id);
                    predecessorsOf[t.id].push(predId);
                }
            });
        });

        // Forward pass: earliest start / earliest finish
        const es = {}; // earliest start
        const ef = {}; // earliest finish
        const duration = {};
        tasks.forEach(t => {
            duration[t.id] = daysBetween(t.startDate, t.endDate) + 1;
            es[t.id] = 0;
            ef[t.id] = 0;
        });

        // Topological sort
        const visited = new Set();
        const order = [];
        const visit = (id) => {
            if (visited.has(id)) return;
            visited.add(id);
            predecessorsOf[id].forEach(pid => visit(pid));
            order.push(id);
        };
        tasks.forEach(t => visit(t.id));

        // Forward pass
        order.forEach(id => {
            if (predecessorsOf[id].length === 0) {
                es[id] = 0;
            } else {
                es[id] = Math.max(...predecessorsOf[id].map(pid => ef[pid]));
            }
            ef[id] = es[id] + duration[id];
        });

        const projectEnd = Math.max(...tasks.map(t => ef[t.id]));

        // Backward pass: latest start / latest finish
        const ls = {}; // latest start
        const lf = {}; // latest finish
        tasks.forEach(t => {
            lf[t.id] = projectEnd;
            ls[t.id] = projectEnd;
        });

        for (let i = order.length - 1; i >= 0; i--) {
            const id = order[i];
            if (successorsOf[id].length === 0) {
                lf[id] = projectEnd;
            } else {
                lf[id] = Math.min(...successorsOf[id].map(sid => ls[sid]));
            }
            ls[id] = lf[id] - duration[id];
        }

        // Critical path: tasks where float (ls - es) === 0
        const critical = [];
        tasks.forEach(t => {
            const float = ls[t.id] - es[t.id];
            if (Math.abs(float) < 0.001) {
                critical.push(t.id);
            }
        });

        return critical;
    }

    /* ---- Import ---- */

    importProject(jsonData) {
        this._snapshot();
        try {
            const data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
            if (data.project && data.tasks) {
                // Assign new IDs to avoid conflicts
                const idMap = {};
                const newProjectId = generateId();
                idMap[data.project.id] = newProjectId;

                const newProject = {
                    ...data.project,
                    id: newProjectId,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                };
                this._data.projects.push(newProject);

                // Map task IDs
                data.tasks.forEach(t => {
                    idMap[t.id] = generateId();
                });

                // Import tasks with remapped IDs
                data.tasks.forEach(t => {
                    const newTask = {
                        ...t,
                        id: idMap[t.id],
                        projectId: newProjectId,
                        parentId: t.parentId ? (idMap[t.parentId] || null) : null,
                        assignees: t.assignees || (t.assignee ? [t.assignee] : []),
                        dependencies: (t.dependencies || []).map(d => {
                            if (typeof d === 'string') {
                                return { taskId: idMap[d] || d, type: 'FS' };
                            }
                            return { taskId: idMap[d.taskId] || d.taskId, type: d.type || 'FS' };
                        }),
                    };
                    this._data.tasks.push(newTask);
                });

                // Import resources if present
                if (data.resources) {
                    data.resources.forEach(r => {
                        const exists = this._data.resources.find(
                            existing => existing.name === r.name && existing.role === r.role
                        );
                        if (!exists) {
                            const newId = generateId();
                            idMap[r.id] = newId;
                            this._data.resources.push({ ...r, id: newId });
                        } else {
                            idMap[r.id] = exists.id;
                        }
                    });

                    // Remap assignee IDs in imported tasks
                    this._data.tasks
                        .filter(t => t.projectId === newProjectId)
                        .forEach(t => {
                            if (t.assignee && idMap[t.assignee]) t.assignee = idMap[t.assignee];
                            if (t.assignees) {
                                t.assignees = t.assignees.map(id => idMap[id] || id);
                            }
                        });
                }

                this._data.settings.activeProjectId = newProjectId;
                this._save();
                this._emit('project:import', newProjectId);
                return newProject;
            }
        } catch (e) {
            console.error('Import failed:', e);
        }
        return null;
    }

    importFromMSProjectXML(xmlString) {
        this._snapshot();
        try {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlString, 'application/xml');
            const ns = 'http://schemas.microsoft.com/project';

            const getTag = (el, tag) => {
                const node = el.getElementsByTagNameNS(ns, tag)[0] || el.getElementsByTagName(tag)[0];
                return node ? node.textContent.trim() : '';
            };

            const projectName = getTag(doc.documentElement, 'Name') || 'Projet importé (XML)';
            const taskEls = Array.from(doc.getElementsByTagNameNS(ns, 'Task').length
                ? doc.getElementsByTagNameNS(ns, 'Task')
                : doc.getElementsByTagName('Task'));
            const resEls = Array.from(doc.getElementsByTagNameNS(ns, 'Resource').length
                ? doc.getElementsByTagNameNS(ns, 'Resource')
                : doc.getElementsByTagName('Resource'));
            const assignEls = Array.from(doc.getElementsByTagNameNS(ns, 'Assignment').length
                ? doc.getElementsByTagNameNS(ns, 'Assignment')
                : doc.getElementsByTagName('Assignment'));

            const newProjectId = generateId();
            const uidToId = {};
            const resUidToId = {};
            const tasks = [];
            const resources = [];

            resEls.forEach(el => {
                const uid = getTag(el, 'UID');
                const name = getTag(el, 'Name');
                if (uid === '0' || !name) return;
                const id = generateId();
                resUidToId[uid] = id;
                resources.push({ id, name, role: '', color: this._randomColor() });
            });

            const parentMap = {};
            taskEls.forEach(el => {
                const uid = getTag(el, 'UID');
                if (uid === '0') return;

                const outlineLevel = parseInt(getTag(el, 'OutlineLevel')) || 1;
                const isSummary = getTag(el, 'Summary') === '1';
                const startStr = getTag(el, 'Start');
                const finishStr = getTag(el, 'Finish');
                const name = getTag(el, 'Name') || 'Tâche sans nom';
                const pct = parseInt(getTag(el, 'PercentComplete')) || 0;

                const startDate = startStr ? startStr.substring(0, 10) : '';
                const endDate = finishStr ? finishStr.substring(0, 10) : '';

                const id = generateId();
                uidToId[uid] = id;

                parentMap[outlineLevel] = id;
                const parentId = outlineLevel > 1 ? (parentMap[outlineLevel - 1] || null) : null;

                tasks.push({
                    id,
                    projectId: newProjectId,
                    name,
                    startDate,
                    endDate,
                    progress: pct,
                    isPhase: isSummary,
                    parentId,
                    assignees: [],
                    dependencies: [],
                    order: tasks.length,
                    color: isSummary ? '#6366F1' : '#3B82F6',
                });
            });

            assignEls.forEach(el => {
                const taskUID = getTag(el, 'TaskUID');
                const resUID = getTag(el, 'ResourceUID');
                const taskId = uidToId[taskUID];
                const resId = resUidToId[resUID];
                if (taskId && resId) {
                    const task = tasks.find(t => t.id === taskId);
                    if (task) task.assignees.push(resId);
                }
            });

            const newProject = {
                id: newProjectId,
                name: projectName,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
            };
            this._data.projects.push(newProject);
            tasks.forEach(t => this._data.tasks.push(t));
            resources.forEach(r => {
                const exists = this._data.resources.find(e => e.name === r.name);
                if (!exists) {
                    this._data.resources.push(r);
                } else {
                    tasks.filter(t => t.projectId === newProjectId).forEach(t => {
                        t.assignees = t.assignees.map(id => id === r.id ? exists.id : id);
                    });
                }
            });

            this._data.settings.activeProjectId = newProjectId;
            this._save();
            this._emit('project:import', newProjectId);
            return newProject;
        } catch (e) {
            console.error('MS Project XML import failed:', e);
        }
        return null;
    }

    importFromExcel(rows, fileName) {
        this._snapshot();
        try {
            const headers = Object.keys(rows[0]).map(h => h.toLowerCase().trim());
            const headerMap = Object.keys(rows[0]);

            const find = (keywords) => {
                for (const kw of keywords) {
                    const idx = headers.findIndex(h => h.includes(kw));
                    if (idx >= 0) return headerMap[idx];
                }
                return null;
            };

            const colName = find(['nom', 'name', 'tâche', 'tache', 'task', 'titre', 'title', 'libellé', 'libelle']);
            const colStart = find(['début', 'debut', 'start', 'date début', 'date debut', 'begin', 'from']);
            const colEnd = find(['fin', 'end', 'finish', 'date fin', 'to', 'échéance', 'echeance']);
            const colProgress = find(['progress', 'avancement', '%', 'pct', 'percent', '% achevé', 'acheve']);
            const colPhase = find(['phase', 'groupe', 'group', 'catégorie', 'categorie', 'section', 'wbs']);
            const colAssignee = find(['ressource', 'resource', 'assigné', 'assigne', 'assignee', 'responsable']);

            if (!colName) {
                console.error('No name column found. Headers:', headers);
                return null;
            }

            const projectName = fileName.replace(/\.(xlsx|xls)$/i, '').replace(/_/g, ' ') || 'Projet importé (Excel)';
            const newProjectId = generateId();
            const tasks = [];
            const phaseMap = {};
            const resourceMap = {};

            const fmtDate = (v) => {
                if (!v) return '';
                if (v instanceof Date) return v.toISOString().substring(0, 10);
                const s = String(v).trim();
                if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0, 10);
                const m = s.match(/^(\d{1,2})[/\-.](\d{1,2})[/\-.](\d{4})$/);
                if (m) return `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
                return '';
            };

            rows.forEach((row, i) => {
                const name = String(row[colName] || '').trim();
                if (!name) return;

                const startDate = colStart ? fmtDate(row[colStart]) : '';
                const endDate = colEnd ? fmtDate(row[colEnd]) : '';
                const progress = colProgress ? (parseInt(row[colProgress]) || 0) : 0;
                const phaseName = colPhase ? String(row[colPhase] || '').trim() : '';
                const assigneeName = colAssignee ? String(row[colAssignee] || '').trim() : '';

                let parentId = null;
                if (phaseName && phaseName !== name) {
                    if (!phaseMap[phaseName]) {
                        const phaseId = generateId();
                        phaseMap[phaseName] = phaseId;
                        tasks.push({
                            id: phaseId,
                            projectId: newProjectId,
                            name: phaseName,
                            startDate: '',
                            endDate: '',
                            progress: 0,
                            isPhase: true,
                            parentId: null,
                            assignees: [],
                            dependencies: [],
                            order: tasks.length,
                            color: '#6366F1',
                        });
                    }
                    parentId = phaseMap[phaseName];
                }

                const assignees = [];
                if (assigneeName) {
                    if (!resourceMap[assigneeName]) {
                        resourceMap[assigneeName] = generateId();
                    }
                    assignees.push(resourceMap[assigneeName]);
                }

                tasks.push({
                    id: generateId(),
                    projectId: newProjectId,
                    name,
                    startDate,
                    endDate,
                    progress,
                    isPhase: false,
                    parentId,
                    assignees,
                    dependencies: [],
                    order: tasks.length,
                    color: '#3B82F6',
                });
            });

            tasks.filter(t => t.isPhase).forEach(phase => {
                const children = tasks.filter(t => t.parentId === phase.id && t.startDate && t.endDate);
                if (children.length) {
                    phase.startDate = children.reduce((min, c) => (!min || c.startDate < min) ? c.startDate : min, '');
                    phase.endDate = children.reduce((max, c) => (!max || c.endDate > max) ? c.endDate : max, '');
                    const totalPct = children.reduce((s, c) => s + c.progress, 0);
                    phase.progress = Math.round(totalPct / children.length);
                }
            });

            const newProject = {
                id: newProjectId,
                name: projectName,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
            };
            this._data.projects.push(newProject);
            tasks.forEach(t => this._data.tasks.push(t));

            Object.entries(resourceMap).forEach(([name, id]) => {
                const exists = this._data.resources.find(e => e.name === name);
                if (!exists) {
                    this._data.resources.push({ id, name, role: '', color: this._randomColor() });
                } else {
                    tasks.filter(t => t.projectId === newProjectId).forEach(t => {
                        t.assignees = t.assignees.map(aid => aid === id ? exists.id : aid);
                    });
                }
            });

            this._data.settings.activeProjectId = newProjectId;
            this._save();
            this._emit('project:import', newProjectId);
            return newProject;
        } catch (e) {
            console.error('Excel import failed:', e);
        }
        return null;
    }

    _randomColor() {
        const colors = ['#6366F1', '#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#14B8A6'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    /* ---- Reset ---- */

    reset() {
        this._data = this._createDefaults();
        this._save();
        this._emit('reset', null);
    }
}

/* ========================================
   THEME MANAGER - Day/Night Mode
   Gantt Planner Pro
   ======================================== */


class ThemeManager {
    constructor() {
        this._html = document.documentElement;
        this._mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        this._toggleBtn = null;
        this._sunIcon = null;
        this._moonIcon = null;
    }

    init() {
        this._toggleBtn = document.getElementById('themeToggle');
        this._sunIcon = this._toggleBtn?.querySelector('.sun-icon');
        this._moonIcon = this._toggleBtn?.querySelector('.moon-icon');

        // Apply saved theme or system preference
        const settings = store.getSettings();
        if (settings.theme) {
            this._apply(settings.theme);
        } else {
            this._applySystemPreference();
        }

        // Listen for system preference changes
        this._mediaQuery.addEventListener('change', (e) => {
            const settings = store.getSettings();
            if (!settings.theme) {
                this._apply(e.matches ? 'dark' : 'light');
            }
        });

        // Toggle button
        if (this._toggleBtn) {
            this._toggleBtn.addEventListener('click', () => this.toggle());
        }

        // Keyboard shortcut: Ctrl+D
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'd') {
                e.preventDefault();
                this.toggle();
            }
        });
    }

    _apply(theme) {
        this._html.setAttribute('data-theme', theme);
        this._updateIcons(theme);

        // Update aria-label
        if (this._toggleBtn) {
            const label = theme === 'dark'
                ? 'Passer en mode clair'
                : 'Passer en mode sombre';
            this._toggleBtn.setAttribute('aria-label', label);
            this._toggleBtn.setAttribute('title', label);
        }
    }

    _updateIcons(theme) {
        if (!this._sunIcon || !this._moonIcon) return;
        if (theme === 'dark') {
            this._sunIcon.style.display = 'none';
            this._moonIcon.style.display = 'block';
        } else {
            this._sunIcon.style.display = 'block';
            this._moonIcon.style.display = 'none';
        }
    }

    _applySystemPreference() {
        const isDark = this._mediaQuery.matches;
        this._apply(isDark ? 'dark' : 'light');
    }

    get current() {
        return this._html.getAttribute('data-theme') || 'light';
    }

    toggle() {
        const newTheme = this.current === 'light' ? 'dark' : 'light';
        this._apply(newTheme);
        store.updateSettings({ theme: newTheme });
    }

    setTheme(theme) {
        if (theme !== 'light' && theme !== 'dark') return;
        this._apply(theme);
        store.updateSettings({ theme });
    }

    useSystemPreference() {
        store.updateSettings({ theme: null });
        this._applySystemPreference();
    }
}

/* ---- Constants ---- */
var ZOOM_CONFIG = {
    day:     { colWidth: 36,  label: 'Jour' },
    week:    { colWidth: 50,  label: 'Semaine' },
    month:   { colWidth: 120, label: 'Mois' },
    quarter: { colWidth: 200, label: 'Trimestre' },
};

class GanttRenderer {
    constructor() {
        this._container = null;
        this._zoomLevel = 'week';
        this._timelineRange = null;
        this._dayColumns = [];
        this._criticalPath = null;
    }

    init() {
        this._container = document.getElementById('ganttContainer');
        if (!this._container) return;

        // Listen for store changes
        store.on('change', () => this.render());

        // Initial render
        const settings = store.getSettings();
        this._zoomLevel = settings.zoomLevel || 'week';
        this.render();
    }

    setZoom(level) {
        if (!ZOOM_CONFIG[level]) return;
        this._zoomLevel = level;
        store.updateSettings({ zoomLevel: level });
    }

    setCriticalPath(taskIds) {
        this._criticalPath = taskIds;
    }

    render() {
        if (!this._container) return;

        const tasks = store.getTasks();
        const tree = store.getTaskTree();
        this._timelineRange = store.getTimelineRange();

        // Calculate day columns for positioning
        this._dayColumns = getDaysBetween(this._timelineRange.start, this._timelineRange.end);

        // Calculate total timeline width for horizontal scrolling
        const colWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;
        this._timelineWidth = this._dayColumns.length * colWidth;

        this._container.innerHTML = '';

        // Build header
        this._container.appendChild(this._renderHeader());

        // Build body
        const body = createElement('div', { className: 'gantt-body', role: 'treegrid', 'aria-label': 'Diagramme de Gantt' });

        if (tree.length === 0) {
            body.appendChild(this._renderEmpty());
        } else {
            this._renderTree(tree, body, 0);
        }

        // Set min-width on container so the timeline never collapses when rows are filtered
        const taskColWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gantt-task-col-width')) || 280;
        this._container.style.minWidth = (this._timelineWidth + taskColWidth) + 'px';

        this._container.appendChild(body);

        // Render dependency arrows
        this._lastBody = body;
        this._lastTasks = tasks;
        this._renderDependencies(body, tasks);
    }

    /** Re-render dependency arrows (called after filter changes) */
    refreshDependencies() {
        if (!this._lastBody || !this._lastTasks) return;
        const existing = this._lastBody.querySelector('.gantt-dependencies-layer');
        if (existing) existing.remove();
        this._renderDependencies(this._lastBody, this._lastTasks);
    }

    /* ---- Header ---- */

    _renderHeader() {
        const header = createElement('div', { className: 'gantt-header', role: 'row' });

        // Task column header
        const taskHeader = createElement('div', {
            className: 'gantt-header-task',
            role: 'columnheader',
        }, 'Tâche');
        header.appendChild(taskHeader);

        // Timeline header
        const timelineHeader = createElement('div', { className: 'gantt-timeline-header' });

        if (this._zoomLevel === 'day' || this._zoomLevel === 'week') {
            // Show months on top, weeks/days below
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);

            months.forEach((monthDate) => {
                const monthEnd = new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0);
                const visibleStart = new Date(Math.max(monthDate.getTime(), this._timelineRange.start.getTime()));
                const visibleEnd = new Date(Math.min(monthEnd.getTime(), this._timelineRange.end.getTime()));
                const daysInVisibleMonth = daysBetween(visibleStart, visibleEnd) + 1;

                const colWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;
                const monthWidth = daysInVisibleMonth * colWidth;

                const monthEl = createElement('div', {
                    className: 'timeline-month',
                    style: { width: monthWidth + 'px', minWidth: monthWidth + 'px' },
                });

                // Month name
                const monthName = createElement('div', { className: 'timeline-month-name' },
                    `${getMonthName(monthDate).charAt(0).toUpperCase() + getMonthName(monthDate).slice(1)} ${monthDate.getFullYear()}`
                );
                monthEl.appendChild(monthName);

                // Sub-row: weeks or days
                const subRow = createElement('div', { className: 'timeline-weeks' });

                if (this._zoomLevel === 'week') {
                    // Show week numbers
                    const weeks = getWeeksBetween(visibleStart, visibleEnd);
                    weeks.forEach(weekDate => {
                        const weekNum = getWeekNumber(weekDate);
                        const weekEl = createElement('div', {
                            className: 'timeline-week',
                            style: { width: (colWidth * 7) + 'px', minWidth: (colWidth * 7) + 'px' },
                        }, `S${weekNum}`);
                        subRow.appendChild(weekEl);
                    });
                } else {
                    // Show day numbers
                    const days = getDaysBetween(visibleStart, visibleEnd);
                    days.forEach(dayDate => {
                        let cls = 'timeline-day';
                        if (isWeekend(dayDate)) cls += ' weekend';
                        if (isToday(dayDate)) cls += ' today';
                        const dayEl = createElement('div', {
                            className: cls,
                            style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
                        }, dayDate.getDate().toString());
                        subRow.appendChild(dayEl);
                    });
                }

                monthEl.appendChild(subRow);
                timelineHeader.appendChild(monthEl);
            });
        } else {
            // Month or Quarter view
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            const colWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;

            months.forEach(monthDate => {
                const monthEl = createElement('div', {
                    className: 'timeline-month',
                    style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
                });
                const label = `${getMonthName(monthDate).charAt(0).toUpperCase() + getMonthName(monthDate).slice(1)} ${monthDate.getFullYear()}`;
                monthEl.appendChild(createElement('div', { className: 'timeline-month-name' }, label));
                timelineHeader.appendChild(monthEl);
            });
        }

        header.appendChild(timelineHeader);
        return header;
    }

    /* ---- Body / Tree ---- */

    _renderTree(nodes, container, depth) {
        nodes.forEach((node, index) => {
            const row = this._renderRow(node, depth);
            container.appendChild(row);

            // Render children if not collapsed
            if (node.children && node.children.length > 0 && !node.collapsed) {
                this._renderTree(node.children, container, depth + 1);
            }
        });
    }

    _renderRow(task, depth) {
        const isPhase = task.isPhase;
        const isMilestone = task.isMilestone;
        const hasChildren = task.children && task.children.length > 0;
        const resources = store.getResources();
        const assignees = (task.assignees || []).map(id => resources.find(r => r.id === id)).filter(Boolean);

        let rowClass = 'gantt-row';
        if (isPhase) rowClass += ' phase';

        const row = createElement('div', {
            className: rowClass,
            role: 'row',
            'aria-level': depth + 1,
            dataset: { taskId: task.id },
        });

        // ---- Task cell (left) ----
        const taskCell = createElement('div', {
            className: `gantt-task-cell${depth > 0 ? ` indent-${Math.min(depth, 3)}` : ''}`,
            role: 'gridcell',
        });

        // Expand/Collapse button
        if (hasChildren || isPhase) {
            const expandBtn = createElement('button', {
                className: `task-expand${task.collapsed ? '' : ' expanded'}`,
                'aria-label': task.collapsed ? 'Développer' : 'Réduire',
                'aria-expanded': !task.collapsed,
                onClick: (e) => {
                    e.stopPropagation();
                    store.toggleTaskCollapse(task.id);
                },
            }, '\u25B6');
            taskCell.appendChild(expandBtn);
        } else {
            taskCell.appendChild(createElement('div', { className: 'task-expand-placeholder' }));
        }

        // Color indicator
        taskCell.appendChild(createElement('div', {
            className: 'task-color',
            style: { background: task.color },
        }));

        // Task info
        const taskInfo = createElement('div', { className: 'task-info' });
        const name = isMilestone ? `\u25C6 ${task.name}` : task.name;
        taskInfo.appendChild(createElement('div', { className: 'task-name', title: task.name }, name));

        // Meta line
        const metaParts = [];
        if (assignees.length === 1) {
            metaParts.push(`@${assignees[0].name.split(' ')[0]}`);
        } else if (assignees.length > 1) {
            metaParts.push(`${assignees.length} personnes`);
        }
        if (isMilestone) {
            metaParts.push(`Jalon \u00b7 ${formatDateShort(task.startDate)}`);
        } else if (isPhase) {
            const childCount = task.children ? task.children.length : 0;
            metaParts.push(`${childCount} tâche${childCount > 1 ? 's' : ''}`);
        } else {
            const duration = daysBetween(task.startDate, task.endDate) + 1;
            metaParts.push(`${duration} jour${duration > 1 ? 's' : ''}`);
        }

        if (metaParts.length > 0) {
            taskInfo.appendChild(createElement('div', { className: 'task-meta' }, metaParts.join(' \u00b7 ')));
        }

        taskCell.appendChild(taskInfo);
        row.appendChild(taskCell);

        // ---- Timeline cell (right) ----
        const timelineCell = createElement('div', {
            className: 'gantt-timeline-cell',
            role: 'gridcell',
        });

        // Grid background
        this._renderGridBackground(timelineCell);

        // Today line
        this._renderTodayLine(timelineCell);

        // Bar or milestone
        if (isMilestone) {
            this._renderMilestone(timelineCell, task);
        } else if (isPhase) {
            this._renderPhaseBar(timelineCell, task);
        } else {
            this._renderTaskBar(timelineCell, task);
        }

        row.appendChild(timelineCell);
        return row;
    }

    /* ---- Grid Background ---- */

    _renderGridBackground(container) {
        if (this._zoomLevel !== 'day' && this._zoomLevel !== 'week') return;

        const colWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;
        const grid = createElement('div', { className: 'gantt-timeline-grid' });

        this._dayColumns.forEach(day => {
            let cls = 'gantt-timeline-grid-col';
            if (isWeekend(day)) cls += ' weekend';
            grid.appendChild(createElement('div', {
                className: cls,
                style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
            }));
        });

        container.appendChild(grid);
    }

    /* ---- Today Line ---- */

    _renderTodayLine(container) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const pos = this._dateToPosition(today);
        if (pos === null) return;

        const line = createElement('div', {
            className: 'today-line',
            style: { left: pos + 'px' },
            'aria-hidden': 'true',
        });
        container.appendChild(line);
    }

    /* ---- Task Bar ---- */

    _renderTaskBar(container, task) {
        const left = this._dateToPosition(new Date(task.startDate));
        const right = this._dateToPosition(addDays(new Date(task.endDate), 1));
        if (left === null || right === null) return;

        const width = Math.max(right - left, 20);
        const colorObj = TASK_COLORS.find(c => c.value === task.color);
        const gradient = colorObj ? colorObj.gradient : `linear-gradient(135deg, ${task.color}, ${task.color})`;

        const isCritical = this._criticalPath && this._criticalPath.includes(task.id);
        const bar = createElement('div', {
            className: 'gantt-bar' + (isCritical ? ' critical-path' : ''),
            style: { left: left + 'px', width: width + 'px', background: gradient },
            role: 'button',
            tabindex: '0',
            'aria-label': `${task.name}: ${task.progress}% complété, du ${formatDateShort(task.startDate)} au ${formatDateShort(task.endDate)}`,
            dataset: { taskId: task.id },
        });

        // Progress fill
        if (task.progress > 0) {
            bar.appendChild(createElement('div', {
                className: 'gantt-bar-progress',
                style: { width: task.progress + '%' },
            }));
        }

        // Label
        bar.appendChild(createElement('span', { className: 'gantt-bar-label' }, task.name));

        // Resize handles
        bar.appendChild(createElement('div', { className: 'gantt-bar-handle gantt-bar-handle-left' }));
        bar.appendChild(createElement('div', { className: 'gantt-bar-handle gantt-bar-handle-right' }));

        container.appendChild(bar);
    }

    /* ---- Phase Bar ---- */

    _renderPhaseBar(container, task) {
        const left = this._dateToPosition(new Date(task.startDate));
        const right = this._dateToPosition(addDays(new Date(task.endDate), 1));
        if (left === null || right === null) return;

        const width = Math.max(right - left, 20);

        const bar = createElement('div', {
            className: 'gantt-bar phase-bar',
            style: { left: left + 'px', width: width + 'px', background: task.color },
            role: 'button',
            tabindex: '0',
            'aria-label': `Phase ${task.name}: ${task.progress}% complété`,
            dataset: { taskId: task.id },
        });

        container.appendChild(bar);
    }

    /* ---- Milestone ---- */

    _renderMilestone(container, task) {
        const pos = this._dateToPosition(new Date(task.startDate));
        if (pos === null) return;

        const milestone = createElement('div', {
            className: 'gantt-milestone',
            style: { left: (pos - 8) + 'px', background: task.color },
            role: 'button',
            tabindex: '0',
            'aria-label': `Jalon: ${task.name} - ${formatDateShort(task.startDate)}`,
            title: `${task.name} - ${formatDateShort(task.startDate)}`,
            dataset: { taskId: task.id },
        });

        container.appendChild(milestone);
    }

    /* ---- Date <-> Position ---- */

    _dateToPosition(date) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        const rangeStart = new Date(this._timelineRange.start);
        rangeStart.setHours(0, 0, 0, 0);

        const diffDays = daysBetween(rangeStart, d);

        if (this._zoomLevel === 'day' || this._zoomLevel === 'week') {
            return diffDays * ZOOM_CONFIG[this._zoomLevel].colWidth;
        } else if (this._zoomLevel === 'month') {
            // Approximate: position within months
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            let offset = 0;
            for (const m of months) {
                const monthEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0);
                const daysInMonth = monthEnd.getDate();
                if (d >= m && d <= monthEnd) {
                    const dayInMonth = d.getDate() - 1;
                    return offset + (dayInMonth / daysInMonth) * ZOOM_CONFIG.month.colWidth;
                }
                offset += ZOOM_CONFIG.month.colWidth;
            }
            return offset;
        } else {
            // Quarter: 3 months = 1 column
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            let offset = 0;
            for (const m of months) {
                const monthEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0);
                const daysInMonth = monthEnd.getDate();
                if (d >= m && d <= monthEnd) {
                    const dayInMonth = d.getDate() - 1;
                    return offset + (dayInMonth / daysInMonth) * ZOOM_CONFIG.quarter.colWidth;
                }
                offset += ZOOM_CONFIG.quarter.colWidth;
            }
            return offset;
        }
    }

    /* ---- Dependency Arrows ---- */

    _renderDependencies(body, tasks) {
        const rows = body.querySelectorAll('.gantt-row');
        if (!rows.length) return;

        // Build map: taskId -> { row DOM, bar element } — skip hidden (filtered) rows
        const taskMap = {};
        rows.forEach((row) => {
            if (row.style.display === 'none') return;
            const taskId = row.dataset.taskId;
            if (taskId) {
                const bar = row.querySelector('.gantt-bar, .gantt-milestone');
                taskMap[taskId] = { row, bar };
            }
        });

        // Collect dependencies with link type
        const deps = [];
        tasks.forEach(task => {
            if (task.dependencies && task.dependencies.length) {
                task.dependencies.forEach(dep => {
                    const depId = typeof dep === 'string' ? dep : dep.taskId;
                    const type = typeof dep === 'string' ? 'FS' : (dep.type || 'FS');
                    if (taskMap[depId] && taskMap[task.id]) {
                        deps.push({ from: depId, to: task.id, type });
                    }
                });
            }
        });

        if (!deps.length) return;

        // Use actual DOM positions for Y coordinates (row.offsetTop)
        // Wait for layout to be ready
        requestAnimationFrame(() => {
            const bodyRect = body.getBoundingClientRect();
            const totalHeight = body.scrollHeight;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('gantt-dependencies-layer');
            svg.setAttribute('width', this._timelineWidth);
            svg.setAttribute('height', totalHeight);
            svg.style.width = this._timelineWidth + 'px';
            svg.style.height = totalHeight + 'px';

            deps.forEach(dep => {
                const fromInfo = taskMap[dep.from];
                const toInfo = taskMap[dep.to];
                if (!fromInfo.bar || !toInfo.bar) return;

                const fromBar = fromInfo.bar;
                const toBar = toInfo.bar;

                // Get actual Y positions via row offsetTop + half row height
                const fromRowTop = fromInfo.row.offsetTop;
                const fromRowH = fromInfo.row.offsetHeight;
                const toRowTop = toInfo.row.offsetTop;
                const toRowH = toInfo.row.offsetHeight;
                const fromY = fromRowTop + fromRowH / 2;
                const toY = toRowTop + toRowH / 2;

                // Bar X positions
                const fromLeft = parseFloat(fromBar.style.left) || 0;
                const fromWidth = parseFloat(fromBar.style.width) || 16;
                const toLeft = parseFloat(toBar.style.left) || 0;
                const toWidth = parseFloat(toBar.style.width) || 16;

                // Determine start/end points based on link type
                let startX, endX, arrowDir;
                if (dep.type === 'FS') {
                    // Fin → Début: from right edge of predecessor to left edge of successor
                    startX = fromLeft + fromWidth;
                    endX = toLeft;
                    arrowDir = 'right'; // arrow points right
                } else if (dep.type === 'SS') {
                    // Début → Début: from left edge to left edge
                    startX = fromLeft;
                    endX = toLeft;
                    arrowDir = 'right';
                } else if (dep.type === 'FF') {
                    // Fin → Fin: from right edge to right edge
                    startX = fromLeft + fromWidth;
                    endX = toLeft + toWidth;
                    arrowDir = 'left';
                } else if (dep.type === 'SF') {
                    // Début → Fin: from left edge of predecessor to right edge of successor
                    startX = fromLeft;
                    endX = toLeft + toWidth;
                    arrowDir = 'left';
                }

                // Draw elbow path
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.classList.add('dep-line');

                const gap = 12;
                const arrowSize = 6;
                const arrowEnd = arrowDir === 'right' ? endX - arrowSize : endX + arrowSize;

                if (dep.type === 'FS' || dep.type === 'SS') {
                    const midX = startX + (dep.type === 'FS' ? gap : -gap);
                    if (arrowEnd > startX + gap) {
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${toY} H${arrowEnd}`);
                    } else {
                        const detourY = fromY < toY ? Math.max(fromY + fromRowH * 0.8, toY - toRowH * 0.8) : Math.min(fromY - fromRowH * 0.8, toY + toRowH * 0.8);
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${detourY} H${arrowEnd - gap} V${toY} H${arrowEnd}`);
                    }
                } else {
                    // FF, SF
                    const midX = startX + (dep.type === 'SF' ? -gap : gap);
                    if (arrowEnd < startX - gap) {
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${toY} H${arrowEnd}`);
                    } else {
                        const detourY = fromY < toY ? Math.max(fromY + fromRowH * 0.8, toY - toRowH * 0.8) : Math.min(fromY - fromRowH * 0.8, toY + toRowH * 0.8);
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${detourY} H${arrowEnd + gap} V${toY} H${arrowEnd}`);
                    }
                }

                svg.appendChild(path);

                // Arrowhead
                const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                arrow.classList.add('dep-arrow');
                if (arrowDir === 'right') {
                    arrow.setAttribute('points', `${endX - arrowSize} ${toY - 4}, ${endX} ${toY}, ${endX - arrowSize} ${toY + 4}`);
                } else {
                    arrow.setAttribute('points', `${endX + arrowSize} ${toY - 4}, ${endX} ${toY}, ${endX + arrowSize} ${toY + 4}`);
                }
                svg.appendChild(arrow);
            });

            svg.style.position = 'absolute';
            svg.style.top = '0';
            svg.style.left = 'var(--gantt-task-col-width)';
            svg.style.pointerEvents = 'none';
            svg.style.zIndex = '4';
            body.style.position = 'relative';
            body.appendChild(svg);
        });
    }

    /* ---- Empty State ---- */

    _renderEmpty() {
        const empty = createElement('div', { className: 'gantt-empty' });
        empty.appendChild(createElement('div', { className: 'gantt-empty-icon' }, '\uD83D\uDCCA'));
        empty.appendChild(createElement('div', { className: 'gantt-empty-title' }, 'Aucune tâche'));
        empty.appendChild(createElement('div', { className: 'gantt-empty-text' },
            'Commencez par ajouter votre première tâche pour visualiser votre planning.'));
        empty.appendChild(createElement('button', {
            className: 'btn btn-primary',
            onClick: () => {
                document.dispatchEvent(new CustomEvent('gantt:addTask'));
            },
        }, [
            createElement('span', {}, '+ Nouvelle tâche'),
        ]));
        return empty;
    }

    /* ---- Public Getters ---- */

    get zoomLevel() {
        return this._zoomLevel;
    }

    get zoomConfig() {
        return ZOOM_CONFIG;
    }
}
