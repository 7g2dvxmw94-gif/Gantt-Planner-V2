    _createField(label, type, id, placeholder) {
        const group = createElement('div', { className: 'form-group' });
        group.appendChild(createElement('label', { className: 'form-label', for: id }, label));
        const input = createElement('input', {
            className: 'input',
            type: type,
            id: id,
            placeholder: placeholder || '',
        });
        group.appendChild(input);
        this['_' + id] = input;
        return group;
    }

    _createCheckbox(id, label) {
        const wrapper = createElement('label', { className: 'form-checkbox', for: id });
        const input = createElement('input', { type: 'checkbox', id: id });
        wrapper.appendChild(input);
        wrapper.appendChild(createElement('span', { className: 'form-checkbox-label' }, label));
        return { wrapper, input };
    }

    _setTaskType(type) {
        // Update visual buttons
        Object.entries(this._typeButtons).forEach(([key, btn]) => {
            btn.classList.toggle('active', key === type);
        });

        // Sync hidden checkboxes
        this._milestoneCheck.input.checked = (type === 'milestone');
        this._phaseCheck.input.checked = (type === 'phase');

        // Apply milestone-specific logic
        if (type === 'milestone') {
            this._taskEnd.disabled = true;
            this._taskEnd.value = this._taskStart.value;
            this._durationInput.value = 1;
            this._durationInput.disabled = true;
        } else {
            this._taskEnd.disabled = false;
            this._durationInput.disabled = false;
            this._updateDurationFromDates();
        }
    }

    /* ---- Events ---- */

    _bindEvents() {
        // Close on overlay click
        this._overlay.addEventListener('click', (e) => {
            if (e.target === this._overlay) this.close();
        });

        // Close on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this._overlay.classList.contains('active')) {
                this.close();
            }
        });

        // Type switcher events are handled by _setTaskType() via onClick

        // Start date change: update end date from duration
        this._taskStart.addEventListener('change', () => {
            if (this._milestoneCheck.input.checked) {
                this._taskEnd.value = this._taskStart.value;
                this._durationInput.value = 1;
            } else {
                this._updateEndFromDuration();
            }
        });

        // End date change: update duration
        this._taskEnd.addEventListener('change', () => {
            this._updateDurationFromDates();
        });

        // Duration change: update end date
        this._durationInput.addEventListener('input', () => {
            this._updateEndFromDuration();
        });
    }

    /* ---- Open / Close ---- */

    openCreate(parentId = null) {
        this._mode = 'create';
        this._editingTaskId = null;
        this._titleEl.textContent = 'Nouvelle tâche';
        this._saveBtn.textContent = 'Créer';
        this._deleteBtn.style.display = 'none';

        // Defaults
        const today = new Date();
        this._taskName.value = '';
        this._descInput.value = '';
        this._taskStart.value = formatDateISO(today);
        this._taskEnd.value = formatDateISO(addDays(today, 7));
        this._taskEnd.disabled = false;
        this._prioritySelect.value = 'medium';
        this._statusSelect.value = 'todo';
        this._progressInput.value = 0;
        this._progressLabel.textContent = '0%';
        // Type
        this._setTaskType('task');

        // Duration
        this._durationInput.value = 7;
        this._durationInput.disabled = false;

        // Reset color
        $$('.color-swatch', this._colorPicker).forEach((s, i) => s.classList.toggle('active', i === 0));

        // Populate assignees (multi)
        this._populateAssignees([]);

        // Populate predecessors/successors
        this._populatePredecessors(null, []);
        this._populateSuccessors(null);

        // Populate parent phases
        this._populateParents(parentId);
        this._parentId = parentId;

        this._show();
        this._taskName.focus();
    }

    openEdit(taskId) {
        const task = store.getTask(taskId);
        if (!task) return;

        this._mode = 'edit';
        this._editingTaskId = taskId;
        this._titleEl.textContent = 'Modifier la tâche';
        this._saveBtn.textContent = 'Enregistrer';
        this._deleteBtn.style.display = '';

        // Fill fields
        this._taskName.value = task.name;
        this._descInput.value = task.description || '';
        this._taskStart.value = task.startDate;
        this._taskEnd.value = task.endDate;
        this._taskEnd.disabled = task.isMilestone;
        this._prioritySelect.value = task.priority;
        this._statusSelect.value = task.status;
        this._progressInput.value = task.progress;
        this._progressLabel.textContent = task.progress + '%';
        // Type
        const taskType = task.isMilestone ? 'milestone' : (task.isPhase ? 'phase' : 'task');
        this._setTaskType(taskType);

        // Duration
        const days = Math.round((new Date(task.endDate) - new Date(task.startDate)) / (1000 * 60 * 60 * 24)) + 1;
        this._durationInput.value = Math.max(1, days);
        this._durationInput.disabled = task.isMilestone;

        // Color
        $$('.color-swatch', this._colorPicker).forEach(s => {
            s.classList.toggle('active', s.dataset.color === task.color);
        });

        // Assignees (multi)
        this._populateAssignees(task.assignees || (task.assignee ? [task.assignee] : []));

        // Predecessors / Successors
        this._populatePredecessors(task.id, task.dependencies || []);
        this._populateSuccessors(task.id);

        // Parent phase
        this._populateParents(task.parentId);
        this._parentId = task.parentId;

        this._show();
        this._taskName.focus();
    }

    close() {
        this._overlay.classList.remove('active');
    }

    _show() {
        this._overlay.classList.add('active');
    }

    /* ---- Populate ---- */

    _populateAssignees(selectedIds) {
        this._assigneeList.innerHTML = '';
        const ids = selectedIds || [];
        store.getResources().forEach(r => {
            const label = createElement('label', {});
            const cb = createElement('input', { type: 'checkbox', value: r.id });
            if (ids.includes(r.id)) cb.checked = true;
            label.appendChild(cb);
            const avatar = createElement('span', {
                className: 'assignee-avatar-sm',
                style: { background: `linear-gradient(135deg, ${r.color}, ${r.color}dd)` },
            }, r.avatar);
            label.appendChild(avatar);
            label.appendChild(document.createTextNode(`${r.name} (${r.role})`));
            this._assigneeList.appendChild(label);
        });
    }

    _getSelectedAssignees() {
        const checked = [];
        this._assigneeList.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            checked.push(cb.value);
        });
        return checked;
    }

    _populatePredecessors(taskId, currentDeps) {
        this._predList.innerHTML = '';
        const deps = currentDeps || [];
        const tasks = store.getTasks().filter(t => !t.isPhase && t.id !== taskId);
        if (tasks.length === 0) {
            this._predList.appendChild(createElement('div', {
                style: { fontSize: 'var(--font-size-xs)', color: 'var(--text-muted)', padding: 'var(--space-2)' },
            }, 'Aucune tâche disponible'));
            return;
        }
        const LINK_TYPES = [['FS', 'Fin→Début'], ['SS', 'Début→Début'], ['FF', 'Fin→Fin'], ['SF', 'Début→Fin']];
        tasks.forEach(t => {
            const existing = deps.find(d => d.taskId === t.id);
            const row = createElement('div', {
                style: { display: 'flex', alignItems: 'center', gap: 'var(--space-2)', padding: 'var(--space-1) var(--space-2)' },
            });
            const cb = createElement('input', { type: 'checkbox', value: t.id });
            if (existing) cb.checked = true;
            row.appendChild(cb);
            const colorDot = createElement('span', {
                style: { width: '8px', height: '8px', borderRadius: '50%', background: t.color, display: 'inline-block', flexShrink: '0' },
            });
            row.appendChild(colorDot);
            row.appendChild(createElement('span', { style: { flex: '1', fontSize: 'var(--font-size-sm)', minWidth: '0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, t.name));
            const sel = createElement('select', {
                className: 'select',
                style: { width: '120px', padding: '2px 24px 2px 6px', fontSize: 'var(--font-size-xs)', flexShrink: '0' },
                dataset: { taskId: t.id },
            });
            LINK_TYPES.forEach(([val, lbl]) => {
                const opt = createElement('option', { value: val }, lbl);
                if (existing && existing.type === val) opt.selected = true;
                sel.appendChild(opt);
            });
            sel.style.display = existing ? '' : 'none';
            cb.addEventListener('change', () => { sel.style.display = cb.checked ? '' : 'none'; });
            row.appendChild(sel);
            this._predList.appendChild(row);
        });
    }

    _getSelectedPredecessors() {
        const result = [];
        this._predList.querySelectorAll('div').forEach(row => {
            const cb = row.querySelector('input[type="checkbox"]');
            const sel = row.querySelector('select');
            if (cb && cb.checked && sel) {
                result.push({ taskId: cb.value, type: sel.value });
            }
        });
        return result;
    }

    _populateSuccessors(taskId) {
        this._succList.innerHTML = '';
        if (!taskId) {
            this._succList.appendChild(createElement('div', {
                style: { fontSize: 'var(--font-size-xs)', color: 'var(--text-muted)', padding: 'var(--space-2)' },
            }, 'Sauvegardez d\'abord pour ajouter des successeurs'));
            return;
        }
        const successors = store.getSuccessors(taskId);
        const allTasks = store.getTasks().filter(t => !t.isPhase && t.id !== taskId);
        const LINK_TYPES = [['FS', 'Fin→Début'], ['SS', 'Début→Début'], ['FF', 'Fin→Fin'], ['SF', 'Début→Fin']];

        allTasks.forEach(t => {
            const link = (t.dependencies || []).find(d => d.taskId === taskId);
            const row = createElement('div', {
                style: { display: 'flex', alignItems: 'center', gap: 'var(--space-2)', padding: 'var(--space-1) var(--space-2)' },
            });
            const cb = createElement('input', { type: 'checkbox', value: t.id });
            if (link) cb.checked = true;
            row.appendChild(cb);
            const colorDot = createElement('span', {
                style: { width: '8px', height: '8px', borderRadius: '50%', background: t.color, display: 'inline-block', flexShrink: '0' },
            });
            row.appendChild(colorDot);
            row.appendChild(createElement('span', { style: { flex: '1', fontSize: 'var(--font-size-sm)', minWidth: '0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, t.name));
            const sel = createElement('select', {
                className: 'select',
                style: { width: '120px', padding: '2px 24px 2px 6px', fontSize: 'var(--font-size-xs)', flexShrink: '0' },
                dataset: { taskId: t.id },
            });
            LINK_TYPES.forEach(([val, lbl]) => {
                const opt = createElement('option', { value: val }, lbl);
                if (link && link.type === val) opt.selected = true;
                sel.appendChild(opt);
            });
            sel.style.display = link ? '' : 'none';
            cb.addEventListener('change', () => { sel.style.display = cb.checked ? '' : 'none'; });
            row.appendChild(sel);
            this._succList.appendChild(row);
        });
    }

    _getSelectedSuccessors() {
        const result = [];
        this._succList.querySelectorAll('div').forEach(row => {
            const cb = row.querySelector('input[type="checkbox"]');
            const sel = row.querySelector('select');
            if (cb && cb.checked && sel) {
                result.push({ taskId: cb.value, type: sel.value });
            }
        });
        return result;
    }

    /* ---- Duration <-> Dates sync ---- */

    _updateEndFromDuration() {
        const start = this._taskStart.value;
        const dur = parseInt(this._durationInput.value, 10);
        if (start && dur > 0) {
            this._taskEnd.value = formatDateISO(addDays(new Date(start), dur - 1));
        }
    }

    _updateDurationFromDates() {
        const start = this._taskStart.value;
        const end = this._taskEnd.value;
        if (start && end) {
            const days = Math.round((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24)) + 1;
            this._durationInput.value = Math.max(1, days);
        }
    }

    /* ---- Populate Parents ---- */

    _populateParents(selectedParentId) {
        this._parentSelect.innerHTML = '';
        this._parentSelect.appendChild(createElement('option', { value: '' }, '— Aucune (racine) —'));
        const phases = store.getTasks().filter(t => t.isPhase);
        phases.forEach(phase => {
            // Don't allow a task to be its own parent
            if (this._editingTaskId && phase.id === this._editingTaskId) return;
            const opt = createElement('option', { value: phase.id }, phase.name);
            if (phase.id === selectedParentId) opt.selected = true;
            this._parentSelect.appendChild(opt);
        });
    }

    /* ---- Save ---- */

    _handleSave() {
        const name = this._taskName.value.trim();
        if (!name) {
            this._taskName.classList.add('input-error');
            this._taskName.focus();
            setTimeout(() => this._taskName.classList.remove('input-error'), 1500);
            return;
        }

        const activeColor = $('.color-swatch.active', this._colorPicker);
        const selectedAssignees = this._getSelectedAssignees();
        const data = {
            name,
            description: this._descInput.value.trim(),
            startDate: this._taskStart.value,
            endDate: this._milestoneCheck.input.checked ? this._taskStart.value : this._taskEnd.value,
            priority: this._prioritySelect.value,
            status: this._statusSelect.value,
            progress: parseInt(this._progressInput.value, 10),
            color: activeColor ? activeColor.dataset.color : '#6366F1',
            assignee: selectedAssignees[0] || null,
            assignees: selectedAssignees,
            dependencies: this._getSelectedPredecessors(),
            isMilestone: this._milestoneCheck.input.checked,
            isPhase: this._phaseCheck.input.checked,
        };

        // Parent from the dropdown
        const selectedParent = this._parentSelect.value || null;

        if (this._mode === 'create') {
            data.parentId = selectedParent;
            const newTask = store.addTask(data);
            // Apply predecessor constraints to position the new task
            store.applyPredecessorConstraints(newTask.id);
        } else {
            data.parentId = selectedParent;
            store.updateTask(this._editingTaskId, data);

            // Apply predecessor constraints (adjusts dates based on predecessors)
            store.applyPredecessorConstraints(this._editingTaskId);

            // Update successors: sync the reverse links (only changed ones)
            const selectedSuccessors = this._getSelectedSuccessors();
            const allTasks = store.getTasks().filter(t => !t.isPhase && t.id !== this._editingTaskId);
            allTasks.forEach(t => {
                const succEntry = selectedSuccessors.find(s => s.taskId === t.id);
                const currentLink = (t.dependencies || []).find(d => d.taskId === this._editingTaskId);

                // Skip if nothing changed
                if (!succEntry && !currentLink) return;
                if (succEntry && currentLink && succEntry.type === currentLink.type) return;

                let deps = (t.dependencies || []).filter(d => d.taskId !== this._editingTaskId);
                if (succEntry) {
                    deps.push({ taskId: this._editingTaskId, type: succEntry.type });
                }
                store.updateTask(t.id, { dependencies: deps });
                // Apply constraints on the successor too
                store.applyPredecessorConstraints(t.id);
            });
        }

        this.close();
        if (this._onSave) this._onSave();
    }

    /* ---- Delete ---- */

    _handleDelete() {
        if (!this._editingTaskId) return;
        const task = store.getTask(this._editingTaskId);
        if (!task) return;

        const hasChildren = store.getChildTasks ? store.getChildTasks(this._editingTaskId).length > 0 : false;
        const msg = hasChildren
            ? `Supprimer "${task.name}" et toutes ses sous-tâches ?`
            : `Supprimer "${task.name}" ?`;

        if (confirm(msg)) {
            store.deleteTask(this._editingTaskId);
            this.close();
            if (this._onSave) this._onSave();
        }
    }
}

var taskModal = new TaskModal();
/* ========================================
   GANTT INTERACTIONS - Drag, Resize, Click
   Gantt Planner Pro - Step 2
   ======================================== */

const AUTO_SCROLL_EDGE = 50;
const AUTO_SCROLL_MAX_SPEED = 15;

function _formatDateFR(date) {
    const d = new Date(date);
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
}

class GanttInteractions {
    constructor() {
        this._container = null;
        this._onTaskClick = null;
        this._onUpdate = null;
        this._isDragging = false;
        this._dragData = null;
        this._zoomColWidthFn = null;
        this._timelineStartFn = null;
        this._tooltip = null;
        this._dropIndicator = null;
        this._autoScrollRAF = null;
        this._autoScrollSpeed = 0;
    }

    init(opts) {
        this._container = document.getElementById('ganttContainer');
        if (!this._container) return;

        this._onTaskClick = opts.onTaskClick;
        this._onUpdate = opts.onUpdate;
        this._zoomColWidthFn = opts.getColWidth;
        this._timelineStartFn = opts.getTimelineStart;

        this._container.addEventListener('click', (e) => this._handleClick(e));
        this._container.addEventListener('mousedown', (e) => this._handleMouseDown(e));
        document.addEventListener('mousemove', (e) => this._handleMouseMove(e));
        document.addEventListener('mouseup', (e) => this._handleMouseUp(e));

        this._container.addEventListener('touchstart', (e) => this._handleTouchStart(e), { passive: false });
        document.addEventListener('touchmove', (e) => this._handleTouchMove(e), { passive: false });
        document.addEventListener('touchend', (e) => this._handleTouchEnd(e));
    }

    /* ---- Click ---- */

    _handleClick(e) {
        const bar = e.target.closest('.gantt-bar, .gantt-milestone');
        if (bar && bar.dataset.taskId) {
            if (this._justDragged) { this._justDragged = false; return; }
            if (this._onTaskClick) this._onTaskClick(bar.dataset.taskId);
            return;
        }
        const taskCell = e.target.closest('.task-info');
        if (taskCell) {
            const row = taskCell.closest('.gantt-row');
            if (row && row.dataset.taskId && this._onTaskClick) {
                this._onTaskClick(row.dataset.taskId);
            }
        }
    }

    /* ---- Drag & Resize (Mouse) ---- */

    _handleMouseDown(e) {
        const handle = e.target.closest('.gantt-bar-handle');
        const bar = e.target.closest('.gantt-bar:not(.phase-bar)');
        if (!handle && !bar) return;
        if (bar && bar.classList.contains('phase-bar')) return;

        const targetBar = handle ? handle.closest('.gantt-bar') : bar;
        if (!targetBar || !targetBar.dataset.taskId) return;

        e.preventDefault();
        const task = store.getTask(targetBar.dataset.taskId);
        if (!task) return;

        const isLeftHandle = handle && handle.classList.contains('gantt-bar-handle-left');
        const isRightHandle = handle && handle.classList.contains('gantt-bar-handle-right');
        const sourceRow = targetBar.closest('.gantt-row');
        const wrapper = this._container.closest('.gantt-wrapper');

        this._isDragging = true;
        this._justDragged = false;
        this._dragData = {
            taskId: task.id,
            bar: targetBar,
            mode: isLeftHandle ? 'resize-left' : (isRightHandle ? 'resize-right' : 'move'),
            startX: e.clientX,
            startY: e.clientY,
            origLeft: parseFloat(targetBar.style.left),
            origWidth: parseFloat(targetBar.style.width),
            origStartDate: task.startDate,
            origEndDate: task.endDate,
            origParentId: task.parentId,
            sourceRow: sourceRow,
            wrapper: wrapper,
            origScrollLeft: wrapper ? wrapper.scrollLeft : 0,
            lastDx: 0,
            lastMouseX: e.clientX,
            lastMouseY: e.clientY,
            moved: false,
            verticalMove: false,
            dropTarget: null,
        };

        targetBar.style.opacity = '0.8';
        targetBar.style.zIndex = '10';
        document.body.style.cursor = this._dragData.mode === 'move' ? 'grabbing' : 'ew-resize';
        document.body.style.userSelect = 'none';
    }

    _handleMouseMove(e) {
        if (!this._isDragging || !this._dragData) return;

        const dx = e.clientX - this._dragData.startX;
        const dy = e.clientY - this._dragData.startY;
        if (Math.abs(dx) < 3 && Math.abs(dy) < 3 && !this._dragData.moved) return;

        this._dragData.moved = true;
        this._justDragged = true;
        this._dragData.lastDx = dx;
        this._dragData.lastMouseX = e.clientX;
        this._dragData.lastMouseY = e.clientY;

        this._applyDrag(dx);

        if (this._dragData.mode === 'resize-left' || this._dragData.mode === 'resize-right') {
            this._updateResizeTooltip(e);
        }
        if (this._dragData.mode === 'move') {
            this._updateVerticalDrag(e);
        }

        this._updateAutoScroll(e);
    }

    _handleMouseUp(e) {
        if (!this._isDragging) return;
        this._finishDrag();
    }

    /* ---- Touch Support ---- */

    _handleTouchStart(e) {
        const touch = e.touches[0];
        const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY, target: e.target, preventDefault: () => e.preventDefault() };
        this._handleMouseDown(fakeEvent);
    }

    _handleTouchMove(e) {
        if (!this._isDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        this._handleMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
    }

    _handleTouchEnd() {
        if (!this._isDragging) return;
        this._finishDrag();
    }

    /* ---- Drag Logic ---- */

    _applyDrag(dx) {
        const d = this._dragData;
        const colWidth = this._zoomColWidthFn();
        const scrollDelta = d.wrapper ? d.wrapper.scrollLeft - d.origScrollLeft : 0;
        const totalDx = dx + scrollDelta;

        if (d.mode === 'move') {
            d.bar.style.left = (d.origLeft + totalDx) + 'px';
        } else if (d.mode === 'resize-left') {
            const newLeft = d.origLeft + totalDx;
            const newWidth = d.origWidth - totalDx;
            if (newWidth >= colWidth) {
                d.bar.style.left = newLeft + 'px';
                d.bar.style.width = newWidth + 'px';
            }
        } else if (d.mode === 'resize-right') {
            const newWidth = d.origWidth + totalDx;
            if (newWidth >= colWidth) {
                d.bar.style.width = newWidth + 'px';
            }
        }
    }

    /* ---- Auto-Scroll ---- */

    _updateAutoScroll(e) {
        const d = this._dragData;
        if (!d || !d.wrapper) return;

        const rect = d.wrapper.getBoundingClientRect();
        const mouseX = e.clientX;
        let speed = 0;

        if (mouseX < rect.left + AUTO_SCROLL_EDGE) {
            const distance = rect.left + AUTO_SCROLL_EDGE - mouseX;
            speed = -Math.ceil((distance / AUTO_SCROLL_EDGE) * AUTO_SCROLL_MAX_SPEED);
        } else if (mouseX > rect.right - AUTO_SCROLL_EDGE) {
            const distance = mouseX - (rect.right - AUTO_SCROLL_EDGE);
            speed = Math.ceil((distance / AUTO_SCROLL_EDGE) * AUTO_SCROLL_MAX_SPEED);
        }

        if (speed !== 0) {
            this._autoScrollSpeed = speed;
            if (!this._autoScrollRAF) {
                this._autoScrollLoop();
            }
        } else {
            this._stopAutoScroll();
        }
    }

    _autoScrollLoop() {
        const d = this._dragData;
        if (!d || !d.wrapper || !this._autoScrollSpeed) {
            this._stopAutoScroll();
            return;
        }

        d.wrapper.scrollLeft += this._autoScrollSpeed;
        this._applyDrag(d.lastDx);

        if (d.mode === 'resize-left' || d.mode === 'resize-right') {
            this._updateResizeTooltip({ clientX: d.lastMouseX, clientY: d.lastMouseY });
        }

        this._autoScrollRAF = requestAnimationFrame(() => this._autoScrollLoop());
    }

    _stopAutoScroll() {
        if (this._autoScrollRAF) {
            cancelAnimationFrame(this._autoScrollRAF);
            this._autoScrollRAF = null;
        }
        this._autoScrollSpeed = 0;
    }

    /* ---- Resize Tooltip ---- */

    _updateResizeTooltip(e) {
        const d = this._dragData;
        const colWidth = this._zoomColWidthFn();
        const timelineStart = this._timelineStartFn();
        const newLeft = parseFloat(d.bar.style.left);
        const newWidth = parseFloat(d.bar.style.width);

        let dateStr;
        if (d.mode === 'resize-left') {
            const startDayOffset = Math.round(newLeft / colWidth);
            const newStart = addDays(timelineStart, startDayOffset);
            dateStr = _formatDateFR(newStart);
        } else {
            const rightEdge = newLeft + newWidth;
            const endDayOffset = Math.round(rightEdge / colWidth) - 1;
            const newEnd = addDays(timelineStart, endDayOffset);
            dateStr = _formatDateFR(newEnd);
        }

        if (!this._tooltip) {
            this._tooltip = document.createElement('div');
            this._tooltip.className = 'gantt-drag-tooltip';
            document.body.appendChild(this._tooltip);
        }

        this._tooltip.textContent = dateStr;
        this._tooltip.style.left = (e.clientX + 12) + 'px';
        this._tooltip.style.top = (e.clientY - 32) + 'px';
    }

    _removeTooltip() {
        if (this._tooltip) { this._tooltip.remove(); this._tooltip = null; }
    }

    /* ---- Vertical Drag & Drop ---- */

    _updateVerticalDrag(e) {
        const d = this._dragData;
        const dy = Math.abs(e.clientY - d.startY);

        if (dy < 15) {
            this._removeDropIndicator();
            d.verticalMove = false;
            d.dropTarget = null;
            return;
        }

        d.verticalMove = true;

        const rows = this._container.querySelectorAll('.gantt-row');
        let targetRow = null;
        let insertPosition = null;

        for (const row of rows) {
            if (row.style.display === 'none') continue;
            const rowId = row.dataset.taskId;
            if (rowId === d.taskId) continue;

            const rect = row.getBoundingClientRect();
            if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
                const rowTask = store.getTask(rowId);
                if (!rowTask) continue;

                const third = rect.height / 3;
                if (rowTask.isPhase) {
                    if (e.clientY < rect.top + third) insertPosition = 'before';
                    else if (e.clientY > rect.bottom - third) insertPosition = 'after';
                    else insertPosition = 'inside';
                } else {
                    insertPosition = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
                }
                targetRow = row;
                break;
            }
        }

        if (targetRow) {
            d.dropTarget = { rowId: targetRow.dataset.taskId, position: insertPosition };
            this._showDropIndicator(targetRow, insertPosition);
        } else {
            d.dropTarget = null;
            this._removeDropIndicator();
        }
    }

    _showDropIndicator(targetRow, position) {
        if (!this._dropIndicator) {
            this._dropIndicator = document.createElement('div');
            this._dropIndicator.className = 'gantt-drop-indicator';
            document.body.appendChild(this._dropIndicator);
        }

        const rect = targetRow.getBoundingClientRect();
        const indicator = this._dropIndicator;

        if (position === 'inside') {
            indicator.style.left = rect.left + 'px';
            indicator.style.top = rect.top + 'px';
            indicator.style.width = rect.width + 'px';
            indicator.style.height = rect.height + 'px';
            indicator.className = 'gantt-drop-indicator inside';
        } else {
            const y = position === 'before' ? rect.top : rect.bottom;
            indicator.style.left = rect.left + 'px';
            indicator.style.top = (y - 1) + 'px';
            indicator.style.width = rect.width + 'px';
            indicator.style.height = '2px';
            indicator.className = 'gantt-drop-indicator line';
        }
    }

    _removeDropIndicator() {
        if (this._dropIndicator) { this._dropIndicator.remove(); this._dropIndicator = null; }
    }

    _applyVerticalDrop() {
        const d = this._dragData;
        if (!d.dropTarget) return;

        const { rowId, position } = d.dropTarget;
        const targetTask = store.getTask(rowId);
        if (!targetTask) return;

        const task = store.getTask(d.taskId);
        if (!task) return;

        if (task.isPhase && this._isDescendant(task.id, rowId)) return;

        let newParentId;
        let newOrder;

        if (position === 'inside' && targetTask.isPhase) {
            newParentId = targetTask.id;
            const siblings = store.getChildTasks(targetTask.id);
            newOrder = siblings.length > 0 ? Math.max(...siblings.map(s => s.order)) + 1 : 0;
        } else {
            newParentId = targetTask.parentId;
            const siblings = newParentId
                ? store.getChildTasks(newParentId)
                : store.getTasks().filter(t => !t.parentId);

            const targetOrder = targetTask.order;
            if (position === 'before') {
                newOrder = targetOrder;
                siblings.forEach(s => {
                    if (s.id !== d.taskId && s.order >= newOrder) {
                        store.updateTask(s.id, { order: s.order + 1 });
                    }
                });
            } else {
                newOrder = targetOrder + 1;
                siblings.forEach(s => {
                    if (s.id !== d.taskId && s.order > targetOrder) {
                        store.updateTask(s.id, { order: s.order + 1 });
                    }
                });
            }
        }

        store.updateTask(d.taskId, { parentId: newParentId, order: newOrder });
    }

    _isDescendant(ancestorId, taskId) {
        let current = store.getTask(taskId);
        while (current) {
            if (current.id === ancestorId) return true;
            if (!current.parentId) return false;
            current = store.getTask(current.parentId);
        }
        return false;
    }

    /* ---- Finish Drag ---- */

    _finishDrag() {
        const d = this._dragData;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';

        this._removeTooltip();
        this._removeDropIndicator();
        this._stopAutoScroll();

        if (d && d.bar) {
            d.bar.style.opacity = '';
            d.bar.style.zIndex = '';
        }

        if (d && d.moved) {
            if (d.mode === 'move' && d.verticalMove && d.dropTarget) {
                this._applyVerticalDrop();
                if (this._onUpdate) this._onUpdate();
                this._isDragging = false;
                this._dragData = null;
                return;
            }

            const colWidth = this._zoomColWidthFn();
            const timelineStart = this._timelineStartFn();
            const newLeft = parseFloat(d.bar.style.left);
            const newWidth = parseFloat(d.bar.style.width);

            const startDayOffset = Math.round(newLeft / colWidth);
            const durationDays = Math.max(1, Math.round(newWidth / colWidth) - 1);

            const newStart = addDays(timelineStart, startDayOffset);
            const newEnd = addDays(newStart, durationDays);

            const updates = {};
            if (d.mode === 'move') {
                updates.startDate = formatDateISO(newStart);
                updates.endDate = formatDateISO(newEnd);
            } else if (d.mode === 'resize-left') {
                updates.startDate = formatDateISO(newStart);
            } else if (d.mode === 'resize-right') {
                const rightEdge = newLeft + newWidth;
                const endDayOffset = Math.round(rightEdge / colWidth) - 1;
                updates.endDate = formatDateISO(addDays(timelineStart, endDayOffset));
            }

            store.updateTask(d.taskId, updates);
            if (this._onUpdate) this._onUpdate();
        }

        this._isDragging = false;
        this._dragData = null;
    }
}

/* ========================================
   APP - Main Entry Point

class App {
    constructor() {
        this._activeView = 'timeline';
        this._showCriticalPath = false;
        this._filters = { status: 'all', assignee: 'all', priority: 'all', dateStart: '', dateEnd: '', search: '' };
        this._tableSortKey = 'name';
        this._tableSortDir = 'asc';
        this._selectedTaskIds = new Set();
    }

    init() {
        // Initialize theme
        themeManager.init();

        // Initialize Gantt renderer
        ganttRenderer.init();

        // Initialize task modal
        taskModal.init(() => {
            ganttRenderer.render();
            this._renderStats();
            this._showToast('Tâche mise à jour', 'success');
        });

        // Initialize Gantt interactions (drag, resize, click)
        ganttInteractions.init({
            onTaskClick: (taskId) => taskModal.openEdit(taskId),
            onUpdate: () => {
                ganttRenderer.render();
                this._renderStats();
            },
            getColWidth: () => ganttRenderer.zoomConfig[ganttRenderer.zoomLevel]?.colWidth || 50,
            getTimelineStart: () => store.getTimelineRange().start,
        });

        // Bind UI events
        this._bindTabs();
        this._bindToolbar();
        this._bindSearch();
        this._bindMobileNav();
        this._bindZoomControls();
        this._bindKeyboardShortcuts();
        this._bindContextMenu();
        this._bindProjectSelector();
        this._bindNotifications();
        this._buildFilterBar();

        // Render stats
        this._renderStats();

        // Render project name
        this._renderProjectName();

        // Listen for store changes
        store.on('change', () => {
            this._renderStats();
            this._renderProjectName();
        });

        // Announce to screen readers
        this._announceToSR('Gantt Planner Pro chargé');
    }

    /* ---- Tab Navigation ---- */

    _bindTabs() {
        const tabs = $$('.tab[role="tab"]');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const view = tab.dataset.view;
                if (!view) return;
                this._switchView(view);

                // Update tabs
                tabs.forEach(t => {
                    t.classList.remove('active');
                    t.setAttribute('aria-selected', 'false');
                });
                tab.classList.add('active');
                tab.setAttribute('aria-selected', 'true');
            });

            // Keyboard navigation for tabs
            tab.addEventListener('keydown', (e) => {
                const currentIndex = tabs.indexOf(tab);
                let nextIndex;
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    nextIndex = (currentIndex + 1) % tabs.length;
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
                } else if (e.key === 'Home') {
                    e.preventDefault();
                    nextIndex = 0;
                } else if (e.key === 'End') {
                    e.preventDefault();
                    nextIndex = tabs.length - 1;
                }
                if (nextIndex !== undefined) {
                    tabs[nextIndex].focus();
                    tabs[nextIndex].click();
                }
            });
        });
    }

    _switchView(view) {
        this._activeView = view;
        store.updateSettings({ activeView: view });

        const ganttWrapper = $('.gantt-wrapper');
        const boardView = $('#boardView');
        const resourceView = $('#resourceView');
        const dashboardView = $('#dashboardView');

        // Hide all views
        if (ganttWrapper) ganttWrapper.style.display = 'none';
        if (boardView) boardView.style.display = 'none';
        if (resourceView) resourceView.style.display = 'none';
        if (dashboardView) dashboardView.style.display = 'none';

        // Show active view
        switch (view) {
            case 'timeline':
                if (ganttWrapper) ganttWrapper.style.display = '';
                ganttRenderer.render();
                this._applyFiltersToTimeline();
                break;
            case 'board':
                if (boardView) {
                    boardView.style.display = '';
                    this._renderBoardView();
                }
                break;
            case 'resources':
                if (resourceView) {
                    resourceView.style.display = '';
                    this._renderResourceView();
                }
                break;
            case 'dashboard':
                if (dashboardView) {
                    dashboardView.style.display = '';
                    this._renderDashboard();
                }
                break;
        }

        // Update mobile nav
        $$('.mobile-nav-item').forEach(item => {
            item.classList.toggle('active', item.dataset.view === view);
        });
    }

    _refreshCurrentView() {
        switch (this._activeView) {
            case 'timeline':
                this._applyFiltersToTimeline();
                break;
            case 'board':
                this._renderBoardView();
                break;
            case 'resources':
                this._renderResourceView();
                break;
            case 'dashboard':
                this._renderDashboard();
                break;
        }
    }

    /* ---- Board / Table View (Vue Tableau) ---- */

    _getFilteredTasks(includePhases = false) {
        var tasks = store.getTasks();
        var status = this._filters.status;
        var assignee = this._filters.assignee;
        var priority = this._filters.priority;
        var dateStart = this._filters.dateStart;
        var dateEnd = this._filters.dateEnd;
        var search = this._filters.search;

        return tasks.filter(function(task) {
            if (!includePhases && task.isPhase) return false;
            if (task.isPhase) return true;

            if (status !== 'all' && task.status !== status) return false;

            if (assignee === 'none') {
                var assigneeIds = task.assignees || (task.assignee ? [task.assignee] : []);
                if (assigneeIds.length > 0) return false;
            } else if (assignee !== 'all') {
                var assigneeIds = task.assignees || (task.assignee ? [task.assignee] : []);
                if (!assigneeIds.includes(assignee)) return false;
            }

            if (priority !== 'all' && task.priority !== priority) return false;

            if (dateStart && new Date(task.endDate) < new Date(dateStart)) return false;
            if (dateEnd && new Date(task.startDate) > new Date(dateEnd)) return false;

            if (search) {
                var q = search.toLowerCase();
                var nameMatch = task.name.toLowerCase().includes(q);
                var descMatch = (task.description || '').toLowerCase().includes(q);
                var assigneeMatch = (task.assignees || []).some(function(id) {
                    var r = store.getResource(id);
                    return r && r.name.toLowerCase().includes(q);
                });
                if (!nameMatch && !descMatch && !assigneeMatch) return false;
            }

            return true;
        });
    }

    _renderBoardView() {
        var container = $('#boardView');
        if (!container) return;

        var tasks = this._getFilteredTasks(false);
        container.innerHTML = '';
        container.className = 'table-view';

        // Sort tasks
        var self = this;
        var sorted = tasks.slice().sort(function(a, b) {
            var dir = self._tableSortDir === 'asc' ? 1 : -1;
            var key = self._tableSortKey;
            var va, vb;

            switch (key) {
                case 'name': va = a.name.toLowerCase(); vb = b.name.toLowerCase(); break;
                case 'startDate': va = a.startDate; vb = b.startDate; break;
                case 'endDate': va = a.endDate; vb = b.endDate; break;
                case 'status': va = a.status; vb = b.status; break;
                case 'priority':
                    var po = { high: 0, medium: 1, low: 2 };
                    va = po[a.priority] !== undefined ? po[a.priority] : 1;
                    vb = po[b.priority] !== undefined ? po[b.priority] : 1;
                    break;
                case 'progress': va = a.progress; vb = b.progress; break;
                case 'assignees':
                    var na = (a.assignees || []).map(function(id) { return (store.getResource(id) || {}).name || ''; }).join(',');
                    var nb = (b.assignees || []).map(function(id) { return (store.getResource(id) || {}).name || ''; }).join(',');
                    va = na.toLowerCase(); vb = nb.toLowerCase(); break;
                default: va = a.name.toLowerCase(); vb = b.name.toLowerCase();
            }
            if (va < vb) return -1 * dir;
            if (va > vb) return 1 * dir;
            return 0;
        });

        if (sorted.length === 0) {
            container.innerHTML = '<div class="table-empty">Aucune tâche ne correspond aux filtres sélectionnés.</div>';
            return;
        }

        var table = document.createElement('table');
        table.className = 'task-table';

        // Header
        var thead = document.createElement('thead');
        var headerRow = document.createElement('tr');

        // Checkbox column
        var thCb = document.createElement('th');
        thCb.className = 'table-cb-col';
        var selectAllCb = document.createElement('input');
        selectAllCb.type = 'checkbox';
        selectAllCb.id = 'tableSelectAll';
        selectAllCb.title = 'Tout sélectionner (Ctrl+A)';
        selectAllCb.addEventListener('change', function(e) {
            e.stopPropagation();
            if (selectAllCb.checked) self._selectAllTasks();
            else self._clearSelection();
        });
        thCb.appendChild(selectAllCb);
        headerRow.appendChild(thCb);

        var columns = [
            { key: 'name', label: 'Tâche' },
            { key: 'startDate', label: 'Début' },
            { key: 'endDate', label: 'Fin' },
            { key: 'assignees', label: 'Assigné(s)' },
            { key: 'status', label: 'Statut' },
            { key: 'priority', label: 'Priorité' },
            { key: 'progress', label: 'Progression' },
        ];

        columns.forEach(function(col) {
            var th = document.createElement('th');
            th.textContent = col.label;
            th.className = 'sortable';
            if (self._tableSortKey === col.key) {
                th.classList.add(self._tableSortDir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
            th.addEventListener('click', function() {
                if (self._tableSortKey === col.key) {
                    self._tableSortDir = self._tableSortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    self._tableSortKey = col.key;
                    self._tableSortDir = 'asc';
                }
                self._renderBoardView();
            });
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        // Body
        var statusLabels = { todo: 'À faire', in_progress: 'En cours', done: 'Terminé' };
        var priorityLabels = { high: 'Haute', medium: 'Moyenne', low: 'Basse' };
        var tbody = document.createElement('tbody');

        sorted.forEach(function(task) {
            var row = document.createElement('tr');
            row.dataset.taskId = task.id;
            if (self._selectedTaskIds.has(task.id)) row.classList.add('selected');
            row.addEventListener('click', function(e) {
                if (e.target.type === 'checkbox') return;
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    self._toggleTaskSelection(task.id, true);
                    return;
                }
                taskModal.openEdit(task.id);
            });

            // Checkbox
            var tdCb = document.createElement('td');
            tdCb.className = 'table-cb-col';
            var cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'table-select-cb';
            cb.dataset.taskId = task.id;
            cb.checked = self._selectedTaskIds.has(task.id);
            cb.addEventListener('change', function(e) {
                e.stopPropagation();
                self._toggleTaskSelection(task.id, true);
            });
            tdCb.appendChild(cb);
            row.appendChild(tdCb);

            // Name
            var tdName = document.createElement('td');
            var nameWrap = document.createElement('div');
            nameWrap.className = 'table-task-name';
            var colorBar = document.createElement('span');
            colorBar.className = 'table-task-color';
            colorBar.style.background = task.color;
            nameWrap.appendChild(colorBar);
            var nameText = document.createElement('span');
            nameText.textContent = task.name;
            nameWrap.appendChild(nameText);
            tdName.appendChild(nameWrap);
            if (task.parentId) {
                var phase = store.getTask(task.parentId);
                if (phase) {
                    var phaseLabel = document.createElement('div');
                    phaseLabel.className = 'table-task-phase';
                    phaseLabel.textContent = phase.name;
                    tdName.appendChild(phaseLabel);
                }
            }
            row.appendChild(tdName);

            // Start Date
            var tdStart = document.createElement('td');
            tdStart.textContent = formatDateDisplay(task.startDate);
            row.appendChild(tdStart);

            // End Date
            var tdEnd = document.createElement('td');
            tdEnd.textContent = formatDateDisplay(task.endDate);
            row.appendChild(tdEnd);

            // Assignees
            var tdAssignees = document.createElement('td');
            var assignees = (task.assignees || []).map(function(id) { return store.getResource(id); }).filter(Boolean);
            if (assignees.length) {
                var wrap = document.createElement('div');
                wrap.className = 'table-assignees';
                assignees.forEach(function(r) {
                    var chip = document.createElement('span');

                tdAssignees.textContent = '\u2014';
                tdAssignees.style.color = 'var(--text-muted)';
            }
            row.appendChild(tdAssignees);

            // Status
            var tdStatus = document.createElement('td');

            statusBadge.className = 'badge-status-' + task.status;
            statusBadge.textContent = statusLabels[task.status] || task.status;

            // Priority
            var tdPriority = document.createElement('td');

            priorityBadge.className = 'badge-priority-' + task.priority;
            priorityBadge.textContent = priorityLabels[task.priority] || task.priority;
            tdPriority.appendChild(priorityBadge);
            row.appendChild(tdPriority);

            // Progress
            var tdProgress = document.createElement('td');
            var progressWrap = document.createElement('div');
            progressWrap.className = 'table-progress';
            var track = document.createElement('div');
            track.className = 'table-progress-track';
            var bar = document.createElement('div');
            bar.className = 'table-progress-bar';
            bar.style.width = task.progress + '%';
            bar.style.background = task.color;
            track.appendChild(bar);
            progressWrap.appendChild(track);
            var label = document.createElement('span');
            label.className = 'table-progress-label';
            label.textContent = task.progress + '%';
            progressWrap.appendChild(label);
            tdProgress.appendChild(progressWrap);
            row.appendChild(tdProgress);

            tbody.appendChild(row);
        });

        table.appendChild(tbody);
        container.appendChild(table);
    }

    /* ---- Resource View (Vue Ressources) ---- */

    _calculateResourceWorkload(resource, assignedTasks) {
        if (assignedTasks.length === 0) return { percent: 0, concurrent: 0 };

        var project = store.getActiveProject();
        if (!project) return { percent: 0, concurrent: 0 };

        var projectStart = new Date(project.startDate);
        var projectEnd = new Date(project.endDate);

        var totalWorkDays = 0;
        var allocatedDays = 0;
        var maxConcurrent = 0;

        var current = new Date(projectStart);
        while (current <= projectEnd) {
            var day = current.getDay();
            if (day !== 0 && day !== 6) {
                totalWorkDays++;
                var active = assignedTasks.filter(function(t) {
                    var ts = new Date(t.startDate);
                    var te = new Date(t.endDate);
                    return current >= ts && current <= te;
                }).length;
                allocatedDays += active;
                if (active > maxConcurrent) maxConcurrent = active;
            }
            current.setDate(current.getDate() + 1);
        }

        var percent = totalWorkDays > 0 ? Math.round((allocatedDays / totalWorkDays) * 100) : 0;
        return { percent: percent, concurrent: maxConcurrent, totalWorkDays: totalWorkDays, allocatedDays: allocatedDays };
    }

    _renderResourceView() {
        var container = $('#resourceView');
        if (!container) return;

        var resources = store.getResources();
        var allTasks = this._getFilteredTasks(false);

        container.innerHTML = '';
        container.className = 'resource-view';

        if (resources.length === 0) {
            container.innerHTML = '<div class="table-empty">Aucune ressource disponible.</div>';
            return;
        }

        var self = this;

        resources.forEach(function(resource) {
            var assignedTasks = allTasks.filter(function(t) {
                return (t.assignees || []).includes(resource.id) || t.assignee === resource.id;
            });

            var workload = self._calculateResourceWorkload(resource, assignedTasks);

            var card = document.createElement('div');
            card.className = 'resource-card';

            // Header
            var header = document.createElement('div');
            header.className = 'resource-card-header';
            var avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.style.background = 'linear-gradient(135deg, ' + resource.color + ', ' + resource.color + 'dd)';
            avatar.textContent = resource.avatar;
            header.appendChild(avatar);

            var info = document.createElement('div');
            info.className = 'resource-card-info';
            var nameEl = document.createElement('div');
            nameEl.className = 'resource-card-name';
            nameEl.textContent = resource.name;
            info.appendChild(nameEl);
            var roleEl = document.createElement('div');
            roleEl.className = 'resource-card-role';
            roleEl.textContent = resource.role;
            info.appendChild(roleEl);
            header.appendChild(info);

            var countBadge = document.createElement('div');
            countBadge.className = 'resource-card-count';
            countBadge.textContent = assignedTasks.length + ' tâche' + (assignedTasks.length !== 1 ? 's' : '');
            header.appendChild(countBadge);
            card.appendChild(header);

            // Workload bar
            var workloadSection = document.createElement('div');
            workloadSection.className = 'resource-workload';

            var workloadHeader = document.createElement('div');
            workloadHeader.className = 'resource-workload-header';
            var workloadLabel = document.createElement('span');
            workloadLabel.textContent = 'Charge de travail';
            workloadHeader.appendChild(workloadLabel);
            var workloadValue = document.createElement('span');
            workloadValue.textContent = workload.percent + '%';
            if (workload.percent > 100) workloadValue.className = 'overload';
            workloadHeader.appendChild(workloadValue);
            workloadSection.appendChild(workloadHeader);

            var workloadTrack = document.createElement('div');
            workloadTrack.className = 'resource-workload-track';
            var workloadFill = document.createElement('div');
            workloadFill.className = 'resource-workload-fill';
            if (workload.percent > 100) workloadFill.classList.add('overload');
            else if (workload.percent > 80) workloadFill.classList.add('warning');
            workloadFill.style.width = Math.min(workload.percent, 100) + '%';
            workloadTrack.appendChild(workloadFill);
            workloadSection.appendChild(workloadTrack);

            if (workload.percent > 100) {
                var warning = document.createElement('div');
                warning.className = 'resource-overload-warning';
                warning.textContent = 'Surcharge détectée (' + workload.concurrent + ' tâches simultanées)';
                workloadSection.appendChild(warning);
            }

            card.appendChild(workloadSection);

            // Task list
            if (assignedTasks.length > 0) {
                var taskList = document.createElement('div');
                taskList.className = 'resource-task-list';

                assignedTasks.forEach(function(task) {
                    var item = document.createElement('div');
                    item.className = 'resource-task-item';
                    item.dataset.taskId = task.id;

                    var colorDot = document.createElement('span');
                    colorDot.className = 'resource-task-color';
                    colorDot.style.background = task.color;
                    item.appendChild(colorDot);

                    var taskName = document.createElement('span');
                    taskName.className = 'resource-task-name';
                    taskName.textContent = task.name;
                    item.appendChild(taskName);

                    var dates = document.createElement('span');
                    dates.className = 'resource-task-dates';
                    var daysLeft = daysBetween(new Date(), task.endDate);
                    if (task.status === 'done') {
                        dates.textContent = 'Terminé';
                    } else if (daysLeft < 0) {
                        dates.textContent = 'En retard';
                        dates.style.color = '#EF4444';
                    } else {
                        dates.textContent = daysLeft + 'j';
                    }
                    item.appendChild(dates);

                    var badge = document.createElement('span');
                    badge.className = 'badge-status-' + task.status;
                    badge.textContent = task.progress + '%';
                    item.appendChild(badge);

                    item.addEventListener('click', function() { taskModal.openEdit(task.id); });
                    taskList.appendChild(item);
                });

                card.appendChild(taskList);
            }

            container.appendChild(card);
        });
    }

    _showExportDropdown(btn) {
        var existing = document.getElementById('exportDropdown');
        if (existing) { existing.remove(); return; }

        var self = this;
        var rect = btn.getBoundingClientRect();
        var dd = document.createElement('div');
        dd.id = 'exportDropdown';

        dd.style.right = (window.innerWidth - rect.right) + 'px';

        var formats = [
            { label: 'JSON', icon: '{ }', desc: 'Réimportable', action: function() { self._exportJSON(); } },
            { label: 'CSV', icon: 'CSV', desc: 'MS Project / Excel / Tableur', action: function() { self._exportCSV(); } },
            { label: 'XML', icon: 'XML', desc: 'MS Project (recommandé)', action: function() { self._exportMSProjectXML(); } },
            { label: 'PDF', icon: 'PDF', desc: 'Impression', action: function() { self._showPDFExportDialog(); } },
        ];

        formats.forEach(function(f) {

    _exportJSON() {
        var project = store.getActiveProject();
        var tasks = store.getTasks();
        var resources = store.getResources();

        var data = { project: project, tasks: tasks, resources: resources, exportedAt: new Date().toISOString() };
        var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        this._downloadBlob(blob, project.name.replace(/\s+/g, '_') + '_export.json');
        this._showToast('Projet exporté en JSON', 'success');
    }

    _exportCSV() {
        var self = this;
        var project = store.getActiveProject();
        var allTasks = store.getTasks();
        var resources = store.getResources();
        var SEP = ';';

        var fmtDate = function(d) {
            if (!d) return '';
            var parts = d.split('-');
            return parts[2] + '/' + parts[1] + '/' + parts[0];
        };
        var dur = function(task) {
            if (!task.startDate || !task.endDate) return '';
            var days = Math.max(1, Math.round((new Date(task.endDate) - new Date(task.startDate)) / 86400000) + 1);
            return days + ' jour' + (days > 1 ? 's' : '');
        };
        var assigneeNames = function(task) {
            return (task.assignees || []).map(function(id) {
                var r = resources.find(function(r) { return r.id === id; });
                return r ? r.name : '';
            }).filter(Boolean).join(', ');
        };
        var makeRow = function(task, level) {
            return [
                level,
                self._csvEscape(task.name, SEP),
                dur(task),
                fmtDate(task.startDate),
                fmtDate(task.endDate),
                self._csvEscape(assigneeNames(task), SEP),
                task.progress,
            ].join(SEP);
        };

        var headers = ['Niveau hiérarchique', 'Nom', 'Durée', 'Début', 'Fin', 'Noms ressources', '% achevé'];
        var rows = [];
        allTasks.filter(function(t) { return !t.parentId; }).sort(function(a, b) { return a.order - b.order; }).forEach(function(task) {
            rows.push(makeRow(task, 1));
            if (task.isPhase) {
                allTasks.filter(function(t) { return t.parentId === task.id; }).sort(function(a, b) { return a.order - b.order; })
                    .forEach(function(child) { rows.push(makeRow(child, 2)); });
            }
        });

        var csvStr = headers.join(SEP) + '\n' + rows.join('\n');
        var bytes = new Uint8Array(csvStr.length);
        for (var i = 0; i < csvStr.length; i++) {
            bytes[i] = csvStr.charCodeAt(i) & 0xFF;
        }
        var blob = new Blob([bytes], { type: 'text/csv;charset=windows-1252' });
        this._downloadBlob(blob, project.name.replace(/\s+/g, '_') + '_msproject.csv');
        this._showToast('Projet exporté en CSV (compatible MS Project)', 'success');
        this._showMSProjectImportHelp();
    }

    _exportMSProjectXML() {
        var self = this;
        var project = store.getActiveProject();
        var allTasks = store.getTasks();
        var resources = store.getResources();

        var esc = function(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); };
        var fmtDateTime = function(d, time) { return d ? d + 'T' + time : ''; };
        var durISO = function(task) {
            if (!task.startDate || !task.endDate) return 'PT8H0M0S';
            var days = Math.max(1, Math.round((new Date(task.endDate) - new Date(task.startDate)) / 86400000) + 1);
            return 'PT' + (days * 8) + 'H0M0S';
        };

        var taskUID = 0;
        var assignUID = 0;
        var taskUIDMap = {};
        var resUIDMap = {};

        var taskLines = [];
        taskLines.push('      <Task><UID>0</UID><ID>0</ID><Name>' + esc(project.name) + '</Name><OutlineLevel>0</OutlineLevel><Summary>1</Summary></Task>');
        taskUID = 1;

        var rootTasks = allTasks.filter(function(t) { return !t.parentId; }).sort(function(a, b) { return a.order - b.order; });
        rootTasks.forEach(function(task) {
            taskUIDMap[task.id] = taskUID;
            taskLines.push('      <Task>' +
                '<UID>' + taskUID + '</UID><ID>' + taskUID + '</ID>' +
                '<Name>' + esc(task.name) + '</Name>' +
                '<OutlineLevel>1</OutlineLevel>' +
                (task.isPhase ? '<Summary>1</Summary>' : '') +
                (task.startDate ? '<Start>' + fmtDateTime(task.startDate, '08:00:00') + '</Start>' : '') +
                (task.endDate ? '<Finish>' + fmtDateTime(task.endDate, '17:00:00') + '</Finish>' : '') +
                '<Duration>' + durISO(task) + '</Duration>' +
                '<PercentComplete>' + (task.progress || 0) + '</PercentComplete>' +
                '</Task>');
            taskUID++;

            if (task.isPhase) {
                allTasks.filter(function(t) { return t.parentId === task.id; }).sort(function(a, b) { return a.order - b.order; }).forEach(function(child) {
                    taskUIDMap[child.id] = taskUID;
                    taskLines.push('      <Task>' +
                        '<UID>' + taskUID + '</UID><ID>' + taskUID + '</ID>' +
                        '<Name>' + esc(child.name) + '</Name>' +
                        '<OutlineLevel>2</OutlineLevel>' +
                        (child.startDate ? '<Start>' + fmtDateTime(child.startDate, '08:00:00') + '</Start>' : '') +
                        (child.endDate ? '<Finish>' + fmtDateTime(child.endDate, '17:00:00') + '</Finish>' : '') +
                        '<Duration>' + durISO(child) + '</Duration>' +
                        '<PercentComplete>' + (child.progress || 0) + '</PercentComplete>' +
                        '</Task>');
                    taskUID++;
                });
            }
        });

        var resLines = [];
        resLines.push('      <Resource><UID>0</UID><ID>0</ID><Name/></Resource>');
        resources.forEach(function(r, i) {
            resUIDMap[r.id] = i + 1;
            resLines.push('      <Resource><UID>' + (i + 1) + '</UID><ID>' + (i + 1) + '</ID><Name>' + esc(r.name) + '</Name></Resource>');
        });

        var assignLines = [];
        allTasks.forEach(function(task) {
            var tUID = taskUIDMap[task.id];
            if (tUID === undefined) return;
            (task.assignees || []).forEach(function(resId) {
                var rUID = resUIDMap[resId];
                if (rUID === undefined) return;
                assignLines.push('      <Assignment><UID>' + assignUID + '</UID><TaskUID>' + tUID + '</TaskUID><ResourceUID>' + rUID + '</ResourceUID></Assignment>');
                assignUID++;
            });
        });

        var xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
            '<Project xmlns="http://schemas.microsoft.com/project">\n' +
            '   <Name>' + esc(project.name) + '</Name>\n' +
            '   <Tasks>\n' + taskLines.join('\n') + '\n   </Tasks>\n' +
            '   <Resources>\n' + resLines.join('\n') + '\n   </Resources>\n' +
            '   <Assignments>\n' + assignLines.join('\n') + '\n   </Assignments>\n' +
            '</Project>';

        var blob = new Blob([xml], { type: 'application/xml;charset=utf-8' });
        self._downloadBlob(blob, project.name.replace(/\s+/g, '_') + '_msproject.xml');
        self._showToast('Projet exporté en XML MS Project', 'success');
    }

    _csvEscape(value, sep) {
        if (!value) return '';
        sep = sep || ',';
        var str = String(value);
        if (str.indexOf(sep) !== -1 || str.indexOf('"') !== -1 || str.indexOf('\n') !== -1) {
            return '"' + str.replace(/"/g, '""') + '"';
        }
        return str;
    }
