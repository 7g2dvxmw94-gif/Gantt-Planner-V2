/* ---- Constants ---- */
var ZOOM_CONFIG = {
    day:     { colWidth: 36,  label: 'Jour' },
    week:    { colWidth: 50,  label: 'Semaine' },
    month:   { colWidth: 120, label: 'Mois' },
    quarter: { colWidth: 200, label: 'Trimestre' },
};

class GanttRenderer {
    constructor() {
        this._container = null;
        this._zoomLevel = 'week';
        this._timelineRange = null;
        this._dayColumns = [];
        this._criticalPath = null;
    }

    init() {
        this._container = document.getElementById('ganttContainer');
        if (!this._container) return;

        // Listen for store changes
        store.on('change', () => this.render());

        // Initial render
        const settings = store.getSettings();
        this._zoomLevel = settings.zoomLevel || 'week';
        this.render();
    }

    setZoom(level) {
        if (!ZOOM_CONFIG[level]) return;
        this._zoomLevel = level;
        store.updateSettings({ zoomLevel: level });
    }

    setCriticalPath(taskIds) {
        this._criticalPath = taskIds;
    }

    render() {
        if (!this._container) return;

        const tasks = store.getTasks();
        const tree = store.getTaskTree();
        this._timelineRange = store.getTimelineRange();

        // Calculate day columns for positioning
        this._dayColumns = getDaysBetween(this._timelineRange.start, this._timelineRange.end);

        // Calculate total timeline width for horizontal scrolling
        const colWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;
        this._timelineWidth = this._dayColumns.length * colWidth;

        this._container.innerHTML = '';

        // Build header
        this._container.appendChild(this._renderHeader());

        // Build body
        const body = createElement('div', { className: 'gantt-body', role: 'treegrid', 'aria-label': 'Diagramme de Gantt' });

        if (tree.length === 0) {
            body.appendChild(this._renderEmpty());
        } else {
            this._renderTree(tree, body, 0);
        }

        // Set min-width on container so the timeline never collapses when rows are filtered
        const taskColWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gantt-task-col-width')) || 280;
        this._container.style.minWidth = (this._timelineWidth + taskColWidth) + 'px';

        this._container.appendChild(body);

        // Render dependency arrows
        this._lastBody = body;
        this._lastTasks = tasks;
        this._renderDependencies(body, tasks);
    }

    /** Re-render dependency arrows (called after filter changes) */
    refreshDependencies() {
        if (!this._lastBody || !this._lastTasks) return;
        const existing = this._lastBody.querySelector('.gantt-dependencies-layer');
        if (existing) existing.remove();
        this._renderDependencies(this._lastBody, this._lastTasks);
    }

    /* ---- Header ---- */

    _renderHeader() {
        const header = createElement('div', { className: 'gantt-header', role: 'row' });

        // Task column header
        const taskHeader = createElement('div', {
            className: 'gantt-header-task',
            role: 'columnheader',
        }, 'Tâche');
        header.appendChild(taskHeader);

        // Timeline header
        const timelineHeader = createElement('div', { className: 'gantt-timeline-header' });

        if (this._zoomLevel === 'day' || this._zoomLevel === 'week') {
            // Show months on top, weeks/days below
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);

            months.forEach((monthDate) => {
                const monthEnd = new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0);
                const visibleStart = new Date(Math.max(monthDate.getTime(), this._timelineRange.start.getTime()));
                const visibleEnd = new Date(Math.min(monthEnd.getTime(), this._timelineRange.end.getTime()));
                const daysInVisibleMonth = daysBetween(visibleStart, visibleEnd) + 1;

                const colWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;
                const monthWidth = daysInVisibleMonth * colWidth;

                const monthEl = createElement('div', {
                    className: 'timeline-month',
                    style: { width: monthWidth + 'px', minWidth: monthWidth + 'px' },
                });

                // Month name
                const monthName = createElement('div', { className: 'timeline-month-name' },
                    `${getMonthName(monthDate).charAt(0).toUpperCase() + getMonthName(monthDate).slice(1)} ${monthDate.getFullYear()}`
                );
                monthEl.appendChild(monthName);

                // Sub-row: weeks or days
                const subRow = createElement('div', { className: 'timeline-weeks' });

                if (this._zoomLevel === 'week') {
                    // Show week numbers
                    const weeks = getWeeksBetween(visibleStart, visibleEnd);
                    weeks.forEach(weekDate => {
                        const weekNum = getWeekNumber(weekDate);
                        const weekEl = createElement('div', {
                            className: 'timeline-week',
                            style: { width: (colWidth * 7) + 'px', minWidth: (colWidth * 7) + 'px' },
                        }, `S${weekNum}`);
                        subRow.appendChild(weekEl);
                    });
                } else {
                    // Show day numbers
                    const days = getDaysBetween(visibleStart, visibleEnd);
                    days.forEach(dayDate => {
                        let cls = 'timeline-day';
                        if (isWeekend(dayDate)) cls += ' weekend';
                        if (isToday(dayDate)) cls += ' today';
                        const dayEl = createElement('div', {
                            className: cls,
                            style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
                        }, dayDate.getDate().toString());
                        subRow.appendChild(dayEl);
                    });
                }

                monthEl.appendChild(subRow);
                timelineHeader.appendChild(monthEl);
            });
        } else {
            // Month or Quarter view
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            const colWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;

            months.forEach(monthDate => {
                const monthEl = createElement('div', {
                    className: 'timeline-month',
                    style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
                });
                const label = `${getMonthName(monthDate).charAt(0).toUpperCase() + getMonthName(monthDate).slice(1)} ${monthDate.getFullYear()}`;
                monthEl.appendChild(createElement('div', { className: 'timeline-month-name' }, label));
                timelineHeader.appendChild(monthEl);
            });
        }

        header.appendChild(timelineHeader);
        return header;
    }

    /* ---- Body / Tree ---- */

    _renderTree(nodes, container, depth) {
        nodes.forEach((node, index) => {
            const row = this._renderRow(node, depth);
            container.appendChild(row);

            // Render children if not collapsed
            if (node.children && node.children.length > 0 && !node.collapsed) {
                this._renderTree(node.children, container, depth + 1);
            }
        });
    }

    _renderRow(task, depth) {
        const isPhase = task.isPhase;
        const isMilestone = task.isMilestone;
        const hasChildren = task.children && task.children.length > 0;
        const resources = store.getResources();
        const assignees = (task.assignees || []).map(id => resources.find(r => r.id === id)).filter(Boolean);

        let rowClass = 'gantt-row';
        if (isPhase) rowClass += ' phase';

        const row = createElement('div', {
            className: rowClass,
            role: 'row',
            'aria-level': depth + 1,
            dataset: { taskId: task.id },
        });

        // ---- Task cell (left) ----
        const taskCell = createElement('div', {
            className: `gantt-task-cell${depth > 0 ? ` indent-${Math.min(depth, 3)}` : ''}`,
            role: 'gridcell',
        });

        // Expand/Collapse button
        if (hasChildren || isPhase) {
            const expandBtn = createElement('button', {
                className: `task-expand${task.collapsed ? '' : ' expanded'}`,
                'aria-label': task.collapsed ? 'Développer' : 'Réduire',
                'aria-expanded': !task.collapsed,
                onClick: (e) => {
                    e.stopPropagation();
                    store.toggleTaskCollapse(task.id);
                },
            }, '\u25B6');
            taskCell.appendChild(expandBtn);
        } else {
            taskCell.appendChild(createElement('div', { className: 'task-expand-placeholder' }));
        }

        // Color indicator
        taskCell.appendChild(createElement('div', {
            className: 'task-color',
            style: { background: task.color },
        }));

        // Task info
        const taskInfo = createElement('div', { className: 'task-info' });
        const name = isMilestone ? `\u25C6 ${task.name}` : task.name;
        taskInfo.appendChild(createElement('div', { className: 'task-name', title: task.name }, name));

        // Meta line
        const metaParts = [];
        if (assignees.length === 1) {
            metaParts.push(`@${assignees[0].name.split(' ')[0]}`);
        } else if (assignees.length > 1) {
            metaParts.push(`${assignees.length} personnes`);
        }
        if (isMilestone) {
            metaParts.push(`Jalon \u00b7 ${formatDateShort(task.startDate)}`);
        } else if (isPhase) {
            const childCount = task.children ? task.children.length : 0;
            metaParts.push(`${childCount} tâche${childCount > 1 ? 's' : ''}`);
        } else {
            const duration = daysBetween(task.startDate, task.endDate) + 1;
            metaParts.push(`${duration} jour${duration > 1 ? 's' : ''}`);
        }

        if (metaParts.length > 0) {
            taskInfo.appendChild(createElement('div', { className: 'task-meta' }, metaParts.join(' \u00b7 ')));
        }

        taskCell.appendChild(taskInfo);
        row.appendChild(taskCell);

        // ---- Timeline cell (right) ----
        const timelineCell = createElement('div', {
            className: 'gantt-timeline-cell',
            role: 'gridcell',
        });

        // Grid background
        this._renderGridBackground(timelineCell);

        // Today line
        this._renderTodayLine(timelineCell);

        // Bar or milestone
        if (isMilestone) {
            this._renderMilestone(timelineCell, task);
        } else if (isPhase) {
            this._renderPhaseBar(timelineCell, task);
        } else {
            this._renderTaskBar(timelineCell, task);
        }

        row.appendChild(timelineCell);
        return row;
    }

    /* ---- Grid Background ---- */

    _renderGridBackground(container) {
        if (this._zoomLevel !== 'day' && this._zoomLevel !== 'week') return;

        const colWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;
        const grid = createElement('div', { className: 'gantt-timeline-grid' });

        this._dayColumns.forEach(day => {
            let cls = 'gantt-timeline-grid-col';
            if (isWeekend(day)) cls += ' weekend';
            grid.appendChild(createElement('div', {
                className: cls,
                style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
            }));
        });

        container.appendChild(grid);
    }

    /* ---- Today Line ---- */

    _renderTodayLine(container) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const pos = this._dateToPosition(today);
        if (pos === null) return;

        const line = createElement('div', {
            className: 'today-line',
            style: { left: pos + 'px' },
            'aria-hidden': 'true',
        });
        container.appendChild(line);
    }

    /* ---- Task Bar ---- */

    _renderTaskBar(container, task) {
        const left = this._dateToPosition(new Date(task.startDate));
        const right = this._dateToPosition(addDays(new Date(task.endDate), 1));
        if (left === null || right === null) return;

        const width = Math.max(right - left, 20);
        const colorObj = TASK_COLORS.find(c => c.value === task.color);
        const gradient = colorObj ? colorObj.gradient : `linear-gradient(135deg, ${task.color}, ${task.color})`;

        const isCritical = this._criticalPath && this._criticalPath.includes(task.id);
        const bar = createElement('div', {
            className: 'gantt-bar' + (isCritical ? ' critical-path' : ''),
            style: { left: left + 'px', width: width + 'px', background: gradient },
            role: 'button',
            tabindex: '0',
            'aria-label': `${task.name}: ${task.progress}% complété, du ${formatDateShort(task.startDate)} au ${formatDateShort(task.endDate)}`,
            dataset: { taskId: task.id },
        });

        // Progress fill
        if (task.progress > 0) {
            bar.appendChild(createElement('div', {
                className: 'gantt-bar-progress',
                style: { width: task.progress + '%' },
            }));
        }

        // Label
        bar.appendChild(createElement('span', { className: 'gantt-bar-label' }, task.name));

        // Resize handles
        bar.appendChild(createElement('div', { className: 'gantt-bar-handle gantt-bar-handle-left' }));
        bar.appendChild(createElement('div', { className: 'gantt-bar-handle gantt-bar-handle-right' }));

        container.appendChild(bar);
    }

    /* ---- Phase Bar ---- */

    _renderPhaseBar(container, task) {
        const left = this._dateToPosition(new Date(task.startDate));
        const right = this._dateToPosition(addDays(new Date(task.endDate), 1));
        if (left === null || right === null) return;

        const width = Math.max(right - left, 20);

        const bar = createElement('div', {
            className: 'gantt-bar phase-bar',
            style: { left: left + 'px', width: width + 'px', background: task.color },
            role: 'button',
            tabindex: '0',
            'aria-label': `Phase ${task.name}: ${task.progress}% complété`,
            dataset: { taskId: task.id },
        });

        container.appendChild(bar);
    }

    /* ---- Milestone ---- */

    _renderMilestone(container, task) {
        const pos = this._dateToPosition(new Date(task.startDate));
        if (pos === null) return;

        const milestone = createElement('div', {
            className: 'gantt-milestone',
            style: { left: (pos - 8) + 'px', background: task.color },
            role: 'button',
            tabindex: '0',
            'aria-label': `Jalon: ${task.name} - ${formatDateShort(task.startDate)}`,
            title: `${task.name} - ${formatDateShort(task.startDate)}`,
            dataset: { taskId: task.id },
        });

        container.appendChild(milestone);
    }

    /* ---- Date <-> Position ---- */

    _dateToPosition(date) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        const rangeStart = new Date(this._timelineRange.start);
        rangeStart.setHours(0, 0, 0, 0);

        const diffDays = daysBetween(rangeStart, d);

        if (this._zoomLevel === 'day' || this._zoomLevel === 'week') {
            return diffDays * ZOOM_CONFIG[this._zoomLevel].colWidth;
        } else if (this._zoomLevel === 'month') {
            // Approximate: position within months
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            let offset = 0;
            for (const m of months) {
                const monthEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0);
                const daysInMonth = monthEnd.getDate();
                if (d >= m && d <= monthEnd) {
                    const dayInMonth = d.getDate() - 1;
                    return offset + (dayInMonth / daysInMonth) * ZOOM_CONFIG.month.colWidth;
                }
                offset += ZOOM_CONFIG.month.colWidth;
            }
            return offset;
        } else {
            // Quarter: 3 months = 1 column
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            let offset = 0;
            for (const m of months) {
                const monthEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0);
                const daysInMonth = monthEnd.getDate();
                if (d >= m && d <= monthEnd) {
                    const dayInMonth = d.getDate() - 1;
                    return offset + (dayInMonth / daysInMonth) * ZOOM_CONFIG.quarter.colWidth;
                }
                offset += ZOOM_CONFIG.quarter.colWidth;
            }
            return offset;
        }
    }

    /* ---- Dependency Arrows ---- */

    _renderDependencies(body, tasks) {
        const rows = body.querySelectorAll('.gantt-row');
        if (!rows.length) return;

        // Build map: taskId -> { row DOM, bar element } — skip hidden (filtered) rows
        const taskMap = {};
        rows.forEach((row) => {
            if (row.style.display === 'none') return;
            const taskId = row.dataset.taskId;
            if (taskId) {
                const bar = row.querySelector('.gantt-bar, .gantt-milestone');
                taskMap[taskId] = { row, bar };
            }
        });

        // Collect dependencies with link type
        const deps = [];
        tasks.forEach(task => {
            if (task.dependencies && task.dependencies.length) {
                task.dependencies.forEach(dep => {
                    const depId = typeof dep === 'string' ? dep : dep.taskId;
                    const type = typeof dep === 'string' ? 'FS' : (dep.type || 'FS');
                    if (taskMap[depId] && taskMap[task.id]) {
                        deps.push({ from: depId, to: task.id, type });
                    }
                });
            }
        });

        if (!deps.length) return;

        // Use actual DOM positions for Y coordinates (row.offsetTop)
        // Wait for layout to be ready
        requestAnimationFrame(() => {
            const bodyRect = body.getBoundingClientRect();
            const totalHeight = body.scrollHeight;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('gantt-dependencies-layer');
            svg.setAttribute('width', this._timelineWidth);
            svg.setAttribute('height', totalHeight);
            svg.style.width = this._timelineWidth + 'px';
            svg.style.height = totalHeight + 'px';

            deps.forEach(dep => {
                const fromInfo = taskMap[dep.from];
                const toInfo = taskMap[dep.to];
                if (!fromInfo.bar || !toInfo.bar) return;

                const fromBar = fromInfo.bar;
                const toBar = toInfo.bar;

                // Get actual Y positions via row offsetTop + half row height
                const fromRowTop = fromInfo.row.offsetTop;
                const fromRowH = fromInfo.row.offsetHeight;
                const toRowTop = toInfo.row.offsetTop;
                const toRowH = toInfo.row.offsetHeight;
                const fromY = fromRowTop + fromRowH / 2;
                const toY = toRowTop + toRowH / 2;

                // Bar X positions
                const fromLeft = parseFloat(fromBar.style.left) || 0;
                const fromWidth = parseFloat(fromBar.style.width) || 16;
                const toLeft = parseFloat(toBar.style.left) || 0;
                const toWidth = parseFloat(toBar.style.width) || 16;

                // Determine start/end points based on link type
                let startX, endX, arrowDir;
                if (dep.type === 'FS') {
                    // Fin → Début: from right edge of predecessor to left edge of successor
                    startX = fromLeft + fromWidth;
                    endX = toLeft;
                    arrowDir = 'right'; // arrow points right
                } else if (dep.type === 'SS') {
                    // Début → Début: from left edge to left edge
                    startX = fromLeft;
                    endX = toLeft;
                    arrowDir = 'right';
                } else if (dep.type === 'FF') {
                    // Fin → Fin: from right edge to right edge
                    startX = fromLeft + fromWidth;
                    endX = toLeft + toWidth;
                    arrowDir = 'left';
                } else if (dep.type === 'SF') {
                    // Début → Fin: from left edge of predecessor to right edge of successor
                    startX = fromLeft;
                    endX = toLeft + toWidth;
                    arrowDir = 'left';
                }

                // Draw elbow path
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.classList.add('dep-line');

                const gap = 12;
                const arrowSize = 6;
                const arrowEnd = arrowDir === 'right' ? endX - arrowSize : endX + arrowSize;

                if (dep.type === 'FS' || dep.type === 'SS') {
                    const midX = startX + (dep.type === 'FS' ? gap : -gap);
                    if (arrowEnd > startX + gap) {
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${toY} H${arrowEnd}`);
                    } else {
                        const detourY = fromY < toY ? Math.max(fromY + fromRowH * 0.8, toY - toRowH * 0.8) : Math.min(fromY - fromRowH * 0.8, toY + toRowH * 0.8);
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${detourY} H${arrowEnd - gap} V${toY} H${arrowEnd}`);
                    }
                } else {
                    // FF, SF
                    const midX = startX + (dep.type === 'SF' ? -gap : gap);
                    if (arrowEnd < startX - gap) {
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${toY} H${arrowEnd}`);
                    } else {
                        const detourY = fromY < toY ? Math.max(fromY + fromRowH * 0.8, toY - toRowH * 0.8) : Math.min(fromY - fromRowH * 0.8, toY + toRowH * 0.8);
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${detourY} H${arrowEnd + gap} V${toY} H${arrowEnd}`);
                    }
                }

                svg.appendChild(path);

                // Arrowhead
                const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                arrow.classList.add('dep-arrow');
                if (arrowDir === 'right') {
                    arrow.setAttribute('points', `${endX - arrowSize} ${toY - 4}, ${endX} ${toY}, ${endX - arrowSize} ${toY + 4}`);
                } else {
                    arrow.setAttribute('points', `${endX + arrowSize} ${toY - 4}, ${endX} ${toY}, ${endX + arrowSize} ${toY + 4}`);
                }
                svg.appendChild(arrow);
            });

            svg.style.position = 'absolute';
            svg.style.top = '0';
            svg.style.left = 'var(--gantt-task-col-width)';
            svg.style.pointerEvents = 'none';
            svg.style.zIndex = '4';
            body.style.position = 'relative';
            body.appendChild(svg);
        });
    }

    /* ---- Empty State ---- */

    _renderEmpty() {
        const empty = createElement('div', { className: 'gantt-empty' });
        empty.appendChild(createElement('div', { className: 'gantt-empty-icon' }, '\uD83D\uDCCA'));
        empty.appendChild(createElement('div', { className: 'gantt-empty-title' }, 'Aucune tâche'));
        empty.appendChild(createElement('div', { className: 'gantt-empty-text' },
            'Commencez par ajouter votre première tâche pour visualiser votre planning.'));
        empty.appendChild(createElement('button', {
            className: 'btn btn-primary',
            onClick: () => {
                document.dispatchEvent(new CustomEvent('gantt:addTask'));
            },
        }, [
            createElement('span', {}, '+ Nouvelle tâche'),
        ]));
        return empty;
    }

    /* ---- Public Getters ---- */

    get zoomLevel() {
        return this._zoomLevel;
    }

    get zoomConfig() {
        return ZOOM_CONFIG;
    }
}

class TaskModal {
    constructor() {
        this._overlay = null;
        this._mode = 'create'; // 'create' | 'edit'

        this._onSave = null;

        this._onSave = onSave;

    /* ---- Build Modal DOM ---- */

    _buildDOM() {

            className: 'modal-overlay',

        const header = createElement('div', { className: 'modal-header' });

            className: 'icon-btn',
            'aria-label': 'Fermer',
            onClick: () => this.close(),

        header.appendChild(closeBtn);
        modal.appendChild(header);

        // Body
        const body = createElement('div', { className: 'modal-body' });

        // Task name
        body.appendChild(this._createField('Nom de la tâche', 'text', 'taskName', 'Ex: Design de la page d\'accueil'));

        // Description
        const descGroup = createElement('div', { className: 'form-group' });
        descGroup.appendChild(createElement('label', { className: 'form-label', for: 'taskDesc' }, 'Description'));
        this._descInput = createElement('textarea', {
            className: 'input',
            id: 'taskDesc',
            rows: '3',
            placeholder: 'Description optionnelle...',
            style: { resize: 'vertical', minHeight: '60px' },
        });
        descGroup.appendChild(this._descInput);
        body.appendChild(descGroup);

        // Dates row
        const datesRow = createElement('div', { className: 'form-row' });
        datesRow.appendChild(this._createField('Date de début', 'date', 'taskStart'));
        datesRow.appendChild(this._createField('Date de fin', 'date', 'taskEnd'));
        body.appendChild(datesRow);

        // Duration row
        const durationRow = createElement('div', { className: 'form-row' });
        const durationGroup = createElement('div', { className: 'form-group' });
        durationGroup.appendChild(createElement('label', { className: 'form-label', for: 'taskDuration' }, 'Durée (jours)'));
        this._durationInput = createElement('input', {
            className: 'input',
            type: 'number',
            id: 'taskDuration',
            min: '1',
            value: '7',
            placeholder: 'Nombre de jours',
        });
        durationGroup.appendChild(this._durationInput);
        durationRow.appendChild(durationGroup);

        // Parent phase selector
        const parentGroup = createElement('div', { className: 'form-group' });
        parentGroup.appendChild(createElement('label', { className: 'form-label', for: 'taskParent' }, 'Phase parente'));
        this._parentSelect = createElement('select', { className: 'select', id: 'taskParent' });
        parentGroup.appendChild(this._parentSelect);
        durationRow.appendChild(parentGroup);
        body.appendChild(durationRow);

        // Type row
        const typeRow = createElement('div', { className: 'form-row' });

        // Priority
        const priorityGroup = createElement('div', { className: 'form-group' });
        priorityGroup.appendChild(createElement('label', { className: 'form-label', for: 'taskPriority' }, 'Priorité'));
        this._prioritySelect = createElement('select', { className: 'select', id: 'taskPriority' });
        [['low', 'Basse'], ['medium', 'Moyenne'], ['high', 'Haute']].forEach(([val, lbl]) => {
            const opt = createElement('option', { value: val }, lbl);

        priorityGroup.appendChild(this._prioritySelect);
        typeRow.appendChild(priorityGroup);

        // Status
        const statusGroup = createElement('div', { className: 'form-group' });
        statusGroup.appendChild(createElement('label', { className: 'form-label', for: 'taskStatus' }, 'Statut'));
        this._statusSelect = createElement('select', { className: 'select', id: 'taskStatus' });
        [['todo', 'À faire'], ['in_progress', 'En cours'], ['done', 'Terminé']].forEach(([val, lbl]) => {
            this._statusSelect.appendChild(createElement('option', { value: val }, lbl));
        });
        statusGroup.appendChild(this._statusSelect);
        typeRow.appendChild(statusGroup);
        body.appendChild(typeRow);

        // Progress + Assignee row
        const progressRow = createElement('div', { className: 'form-row' });

        // Progress
        const progressGroup = createElement('div', { className: 'form-group' });
        progressGroup.appendChild(createElement('label', { className: 'form-label', for: 'taskProgress' }, 'Progression'));
        const progressWrap = createElement('div', { className: 'progress-input-wrap' });

            className: 'input',
            type: 'range',
            id: 'taskProgress',

            value: '0',

        progressWrap.appendChild(this._progressLabel);
        progressGroup.appendChild(progressWrap);

        // Assignees (multi-select checkboxes)
        const assigneeGroup = createElement('div', { className: 'form-group' });
        assigneeGroup.appendChild(createElement('label', { className: 'form-label' }, 'Assigné à'));
        this._assigneeList = createElement('div', { className: 'assignee-list' });
        assigneeGroup.appendChild(this._assigneeList);
        progressRow.appendChild(assigneeGroup);
        body.appendChild(progressRow);

        // Predecessors (with link type)
        const predGroup = createElement('div', { className: 'form-group' });
        predGroup.appendChild(createElement('label', { className: 'form-label' }, 'Précédée par'));
        this._predList = createElement('div', { className: 'dep-list' });
        predGroup.appendChild(this._predList);
        body.appendChild(predGroup);

        // Successors (with link type)
        const succGroup = createElement('div', { className: 'form-group' });
        succGroup.appendChild(createElement('label', { className: 'form-label' }, 'Succédée par'));
        this._succList = createElement('div', { className: 'dep-list' });
        succGroup.appendChild(this._succList);

            const swatch = createElement('button', {
                className: 'color-swatch' + (idx === 0 ? ' active' : ''),
                style: { background: color.value },
                'aria-label': color.name,
                title: color.name,
                dataset: { color: color.value },
                onClick: (e) => {
                    e.preventDefault();
                    $$('.color-swatch', this._colorPicker).forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                },
            });
            this._colorPicker.appendChild(swatch);
        });
        colorGroup.appendChild(this._colorPicker);
        body.appendChild(colorGroup);

        // Checkboxes row
        const checkRow = createElement('div', { className: 'form-row form-check-row' });
        this._milestoneCheck = this._createCheckbox('taskMilestone', 'Jalon (milestone)');
        this._phaseCheck = this._createCheckbox('taskPhase', 'Phase (groupe)');
        checkRow.appendChild(this._milestoneCheck.wrapper);
        checkRow.appendChild(this._phaseCheck.wrapper);

        // Footer
        const footer = createElement('div', { className: 'modal-footer' });
        this._deleteBtn = createElement('button', {
            className: 'btn btn-danger',
            style: { marginRight: 'auto', display: 'none' },
            onClick: () => this._handleDelete(),
        }, 'Supprimer');
        footer.appendChild(this._deleteBtn);
        footer.appendChild(createElement('button', {
            className: 'btn btn-secondary',
            onClick: () => this.close(),
        }, 'Annuler'));
        this._saveBtn = createElement('button', {
            className: 'btn btn-primary',
            onClick: () => this._handleSave(),
        }, 'Créer');
        footer.appendChild(this._saveBtn);
        modal.appendChild(footer);

        this._overlay.appendChild(modal);
        document.body.appendChild(this._overlay);
    }

    _createField(label, type, id, placeholder) {
        const group = createElement('div', { className: 'form-group' });
        group.appendChild(createElement('label', { className: 'form-label', for: id }, label));
        const input = createElement('input', {
            className: 'input',
            type: type,
            id: id,
            placeholder: placeholder || '',
        });
        group.appendChild(input);
        this['_' + id] = input;
        return group;
    }

    _createCheckbox(id, label) {
        const wrapper = createElement('label', { className: 'form-checkbox', for: id });
        const input = createElement('input', { type: 'checkbox', id: id });
        wrapper.appendChild(input);
        wrapper.appendChild(createElement('span', { className: 'form-checkbox-label' }, label));
        return { wrapper, input };
    }

    /* ---- Events ---- */

    _bindEvents() {
        // Close on overlay click
        this._overlay.addEventListener('click', (e) => {
            if (e.target === this._overlay) this.close();
        });

        // Close on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this._overlay.classList.contains('active')) {
                this.close();
            }
        });

        // Milestone checkbox: auto-sync end date and duration
        this._milestoneCheck.input.addEventListener('change', () => {
            if (this._milestoneCheck.input.checked) {
                this._taskEnd.disabled = true;
                this._taskEnd.value = this._taskStart.value;
                this._durationInput.value = 1;
                this._durationInput.disabled = true;
                this._phaseCheck.input.checked = false;
            } else {
                this._taskEnd.disabled = false;
                this._durationInput.disabled = false;
                this._updateDurationFromDates();
            }
        });

        // Phase checkbox: uncheck milestone
        this._phaseCheck.input.addEventListener('change', () => {
            if (this._phaseCheck.input.checked) {
                this._milestoneCheck.input.checked = false;
                this._taskEnd.disabled = false;
                this._durationInput.disabled = false;
            }
        });

        // Start date change: update end date from duration
        this._taskStart.addEventListener('change', () => {
            if (this._milestoneCheck.input.checked) {
                this._taskEnd.value = this._taskStart.value;
                this._durationInput.value = 1;
            } else {
                this._updateEndFromDuration();
            }
        });

        // End date change: update duration
        this._taskEnd.addEventListener('change', () => {
            this._updateDurationFromDates();
        });

        // Duration change: update end date
        this._durationInput.addEventListener('input', () => {
            this._updateEndFromDuration();
        });
    }

    /* ---- Open / Close ---- */

    openCreate(parentId = null) {
        this._mode = 'create';
        this._editingTaskId = null;
        this._titleEl.textContent = 'Nouvelle tâche';
        this._saveBtn.textContent = 'Créer';
        this._deleteBtn.style.display = 'none';

        // Defaults
        const today = new Date();
        this._taskName.value = '';
        this._descInput.value = '';
        this._taskStart.value = formatDateISO(today);
        this._taskEnd.value = formatDateISO(addDays(today, 7));
        this._taskEnd.disabled = false;
        this._prioritySelect.value = 'medium';
        this._statusSelect.value = 'todo';
        this._progressInput.value = 0;
        this._progressLabel.textContent = '0%';
        this._milestoneCheck.input.checked = false;
        this._phaseCheck.input.checked = false;

        // Duration
        this._durationInput.value = 7;
        this._durationInput.disabled = false;

        // Reset color
        $$('.color-swatch', this._colorPicker).forEach((s, i) => s.classList.toggle('active', i === 0));

        // Populate assignees (multi)
        this._populateAssignees([]);

        // Populate predecessors/successors
        this._populatePredecessors(null, []);
        this._populateSuccessors(null);

        // Populate parent phases
        this._populateParents(parentId);
        this._parentId = parentId;

        this._show();
        this._taskName.focus();
    }

    openEdit(taskId) {
        const task = store.getTask(taskId);
        if (!task) return;

        this._mode = 'edit';
        this._editingTaskId = taskId;
        this._titleEl.textContent = 'Modifier la tâche';
        this._saveBtn.textContent = 'Enregistrer';
        this._deleteBtn.style.display = '';

        // Fill fields
        this._taskName.value = task.name;
        this._descInput.value = task.description || '';
        this._taskStart.value = task.startDate;
        this._taskEnd.value = task.endDate;
        this._taskEnd.disabled = task.isMilestone;
        this._prioritySelect.value = task.priority;
        this._statusSelect.value = task.status;
        this._progressInput.value = task.progress;
        this._progressLabel.textContent = task.progress + '%';
        this._milestoneCheck.input.checked = task.isMilestone;
        this._phaseCheck.input.checked = task.isPhase;

        // Duration
        const days = Math.round((new Date(task.endDate) - new Date(task.startDate)) / (1000 * 60 * 60 * 24)) + 1;
        this._durationInput.value = Math.max(1, days);
        this._durationInput.disabled = task.isMilestone;

        // Color
        $$('.color-swatch', this._colorPicker).forEach(s => {
            s.classList.toggle('active', s.dataset.color === task.color);
        });

        // Assignees (multi)
        this._populateAssignees(task.assignees || (task.assignee ? [task.assignee] : []));

        // Predecessors / Successors
        this._populatePredecessors(task.id, task.dependencies || []);
        this._populateSuccessors(task.id);

        // Parent phase
        this._populateParents(task.parentId);
        this._parentId = task.parentId;

        this._show();
        this._taskName.focus();
    }

    close() {
        this._overlay.classList.remove('active');
    }

    _show() {
        this._overlay.classList.add('active');
    }

    /* ---- Populate ---- */

    _populateAssignees(selectedIds) {
        this._assigneeList.innerHTML = '';
        const ids = selectedIds || [];
        store.getResources().forEach(r => {
            const label = createElement('label', {});
            const cb = createElement('input', { type: 'checkbox', value: r.id });
            if (ids.includes(r.id)) cb.checked = true;
            label.appendChild(cb);
            const avatar = createElement('span', {
                className: 'assignee-avatar-sm',
                style: { background: `linear-gradient(135deg, ${r.color}, ${r.color}dd)` },
            }, r.avatar);
            label.appendChild(avatar);
            label.appendChild(document.createTextNode(`${r.name} (${r.role})`));
            this._assigneeList.appendChild(label);
        });
    }

    _getSelectedAssignees() {
        const checked = [];
        this._assigneeList.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            checked.push(cb.value);
        });
        return checked;
    }

    _populatePredecessors(taskId, currentDeps) {
        this._predList.innerHTML = '';
        const deps = currentDeps || [];
        const tasks = store.getTasks().filter(t => !t.isPhase && t.id !== taskId);
        if (tasks.length === 0) {
            this._predList.appendChild(createElement('div', {
                style: { fontSize: 'var(--font-size-xs)', color: 'var(--text-muted)', padding: 'var(--space-2)' },
            }, 'Aucune tâche disponible'));
            return;
        }
        const LINK_TYPES = [['FS', 'Fin→Début'], ['SS', 'Début→Début'], ['FF', 'Fin→Fin'], ['SF', 'Début→Fin']];
        tasks.forEach(t => {
            const existing = deps.find(d => d.taskId === t.id);
            const row = createElement('div', {
                style: { display: 'flex', alignItems: 'center', gap: 'var(--space-2)', padding: 'var(--space-1) var(--space-2)' },
            });
            const cb = createElement('input', { type: 'checkbox', value: t.id });
            if (existing) cb.checked = true;
            row.appendChild(cb);
            const colorDot = createElement('span', {
                style: { width: '8px', height: '8px', borderRadius: '50%', background: t.color, display: 'inline-block', flexShrink: '0' },
            });
            row.appendChild(colorDot);
            row.appendChild(createElement('span', { style: { flex: '1', fontSize: 'var(--font-size-sm)', minWidth: '0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, t.name));
            const sel = createElement('select', {
                className: 'select',
                style: { width: '120px', padding: '2px 24px 2px 6px', fontSize: 'var(--font-size-xs)', flexShrink: '0' },
                dataset: { taskId: t.id },
            });
            LINK_TYPES.forEach(([val, lbl]) => {
                const opt = createElement('option', { value: val }, lbl);
                if (existing && existing.type === val) opt.selected = true;
                sel.appendChild(opt);
            });
            sel.style.display = existing ? '' : 'none';
            cb.addEventListener('change', () => { sel.style.display = cb.checked ? '' : 'none'; });
            row.appendChild(sel);
            this._predList.appendChild(row);
        });
    }

    _getSelectedPredecessors() {
        const result = [];
        this._predList.querySelectorAll('div').forEach(row => {
            const cb = row.querySelector('input[type="checkbox"]');
            const sel = row.querySelector('select');
            if (cb && cb.checked && sel) {
                result.push({ taskId: cb.value, type: sel.value });
            }
        });
        return result;
    }

    _populateSuccessors(taskId) {
        this._succList.innerHTML = '';
        if (!taskId) {
            this._succList.appendChild(createElement('div', {
                style: { fontSize: 'var(--font-size-xs)', color: 'var(--text-muted)', padding: 'var(--space-2)' },
            }, 'Sauvegardez d\'abord pour ajouter des successeurs'));
            return;
        }
        const successors = store.getSuccessors(taskId);
        const allTasks = store.getTasks().filter(t => !t.isPhase && t.id !== taskId);
        const LINK_TYPES = [['FS', 'Fin→Début'], ['SS', 'Début→Début'], ['FF', 'Fin→Fin'], ['SF', 'Début→Fin']];

        allTasks.forEach(t => {
            const link = (t.dependencies || []).find(d => d.taskId === taskId);
            const row = createElement('div', {
                style: { display: 'flex', alignItems: 'center', gap: 'var(--space-2)', padding: 'var(--space-1) var(--space-2)' },
            });
            const cb = createElement('input', { type: 'checkbox', value: t.id });
            if (link) cb.checked = true;
            row.appendChild(cb);
            const colorDot = createElement('span', {
                style: { width: '8px', height: '8px', borderRadius: '50%', background: t.color, display: 'inline-block', flexShrink: '0' },
            });
            row.appendChild(colorDot);
            row.appendChild(createElement('span', { style: { flex: '1', fontSize: 'var(--font-size-sm)', minWidth: '0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, t.name));
            const sel = createElement('select', {
                className: 'select',
                style: { width: '120px', padding: '2px 24px 2px 6px', fontSize: 'var(--font-size-xs)', flexShrink: '0' },
                dataset: { taskId: t.id },
            });
            LINK_TYPES.forEach(([val, lbl]) => {
                const opt = createElement('option', { value: val }, lbl);
                if (link && link.type === val) opt.selected = true;
                sel.appendChild(opt);
            });
            sel.style.display = link ? '' : 'none';
            cb.addEventListener('change', () => { sel.style.display = cb.checked ? '' : 'none'; });
            row.appendChild(sel);
            this._succList.appendChild(row);
        });
    }

    _getSelectedSuccessors() {
        const result = [];
        this._succList.querySelectorAll('div').forEach(row => {
            const cb = row.querySelector('input[type="checkbox"]');
            const sel = row.querySelector('select');
            if (cb && cb.checked && sel) {
                result.push({ taskId: cb.value, type: sel.value });
            }
        });
        return result;
    }

    /* ---- Duration <-> Dates sync ---- */

    _updateEndFromDuration() {
        const start = this._taskStart.value;
        const dur = parseInt(this._durationInput.value, 10);
        if (start && dur > 0) {
            this._taskEnd.value = formatDateISO(addDays(new Date(start), dur - 1));
        }
    }

    _updateDurationFromDates() {
        const start = this._taskStart.value;
        const end = this._taskEnd.value;
        if (start && end) {
            const days = Math.round((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24)) + 1;
            this._durationInput.value = Math.max(1, days);
        }
    }

    /* ---- Populate Parents ---- */

    _populateParents(selectedParentId) {
        this._parentSelect.innerHTML = '';
        this._parentSelect.appendChild(createElement('option', { value: '' }, '— Aucune (racine) —'));
        const phases = store.getTasks().filter(t => t.isPhase);
        phases.forEach(phase => {
            // Don't allow a task to be its own parent
            if (this._editingTaskId && phase.id === this._editingTaskId) return;
            const opt = createElement('option', { value: phase.id }, phase.name);
            if (phase.id === selectedParentId) opt.selected = true;
            this._parentSelect.appendChild(opt);
        });
    }

    /* ---- Save ---- */

    _handleSave() {
        const name = this._taskName.value.trim();
        if (!name) {
            this._taskName.classList.add('input-error');
            this._taskName.focus();
            setTimeout(() => this._taskName.classList.remove('input-error'), 1500);
            return;
        }

        const activeColor = $('.color-swatch.active', this._colorPicker);
        const selectedAssignees = this._getSelectedAssignees();
        const data = {
            name,
            description: this._descInput.value.trim(),
            startDate: this._taskStart.value,
            endDate: this._milestoneCheck.input.checked ? this._taskStart.value : this._taskEnd.value,
            priority: this._prioritySelect.value,
            status: this._statusSelect.value,
            progress: parseInt(this._progressInput.value, 10),
            color: activeColor ? activeColor.dataset.color : '#6366F1',
            assignee: selectedAssignees[0] || null,
            assignees: selectedAssignees,
            dependencies: this._getSelectedPredecessors(),
            isMilestone: this._milestoneCheck.input.checked,
            isPhase: this._phaseCheck.input.checked,
        };

        // Parent from the dropdown
        const selectedParent = this._parentSelect.value || null;

        if (this._mode === 'create') {
            data.parentId = selectedParent;
            const newTask = store.addTask(data);
            // Apply predecessor constraints to position the new task
            store.applyPredecessorConstraints(newTask.id);
        } else {
            data.parentId = selectedParent;
            store.updateTask(this._editingTaskId, data);

            // Apply predecessor constraints (adjusts dates based on predecessors)
            store.applyPredecessorConstraints(this._editingTaskId);

            // Update successors: sync the reverse links (only changed ones)
            const selectedSuccessors = this._getSelectedSuccessors();
            const allTasks = store.getTasks().filter(t => !t.isPhase && t.id !== this._editingTaskId);
            allTasks.forEach(t => {
                const succEntry = selectedSuccessors.find(s => s.taskId === t.id);
                const currentLink = (t.dependencies || []).find(d => d.taskId === this._editingTaskId);

                // Skip if nothing changed
                if (!succEntry && !currentLink) return;
                if (succEntry && currentLink && succEntry.type === currentLink.type) return;

                let deps = (t.dependencies || []).filter(d => d.taskId !== this._editingTaskId);
                if (succEntry) {
                    deps.push({ taskId: this._editingTaskId, type: succEntry.type });
                }
                store.updateTask(t.id, { dependencies: deps });
                // Apply constraints on the successor too
                store.applyPredecessorConstraints(t.id);
            });
        }

        this.close();
        if (this._onSave) this._onSave();
    }

    /* ---- Delete ---- */

    _handleDelete() {
        if (!this._editingTaskId) return;
        const task = store.getTask(this._editingTaskId);
        if (!task) return;

        const hasChildren = store.getChildTasks ? store.getChildTasks(this._editingTaskId).length > 0 : false;
        const msg = hasChildren
            ? `Supprimer "${task.name}" et toutes ses sous-tâches ?`
            : `Supprimer "${task.name}" ?`;

        if (confirm(msg)) {
            store.deleteTask(this._editingTaskId);
            this.close();
            if (this._onSave) this._onSave();
        }
    }
}

/* ========================================
   GANTT INTERACTIONS - Drag, Resize, Click
   Gantt Planner Pro - Step 2
   ======================================== */


class GanttInteractions {
    constructor() {
        this._container = null;
        this._onTaskClick = null;
        this._onUpdate = null;
        this._isDragging = false;
        this._dragData = null;
        this._zoomColWidthFn = null;
        this._timelineStartFn = null;
    }

    /**
     * @param {Object} opts
     * @param {Function} opts.onTaskClick - Called when a task bar/milestone is clicked
     * @param {Function} opts.onUpdate - Called after drag/resize completes
     * @param {Function} opts.getColWidth - Returns pixel width of one day column
     * @param {Function} opts.getTimelineStart - Returns the timeline start Date
     */
    init(opts) {
        this._container = document.getElementById('ganttContainer');
        if (!this._container) return;

        this._onTaskClick = opts.onTaskClick;
        this._onUpdate = opts.onUpdate;
        this._zoomColWidthFn = opts.getColWidth;
        this._timelineStartFn = opts.getTimelineStart;

        // Delegate click events
        this._container.addEventListener('click', (e) => this._handleClick(e));

        // Delegate mousedown for drag/resize
        this._container.addEventListener('mousedown', (e) => this._handleMouseDown(e));

        // Global mouse events for dragging
        document.addEventListener('mousemove', (e) => this._handleMouseMove(e));
        document.addEventListener('mouseup', (e) => this._handleMouseUp(e));

        // Touch support
        this._container.addEventListener('touchstart', (e) => this._handleTouchStart(e), { passive: false });
        document.addEventListener('touchmove', (e) => this._handleTouchMove(e), { passive: false });
        document.addEventListener('touchend', (e) => this._handleTouchEnd(e));
    }

    /* ---- Click ---- */

    _handleClick(e) {
        // Find the closest bar, milestone, or row with a task-id
        const bar = e.target.closest('.gantt-bar, .gantt-milestone');
        if (bar && bar.dataset.taskId) {
            // Don't fire click if we just finished dragging
            if (this._justDragged) {
                this._justDragged = false;
                return;
            }
            if (this._onTaskClick) this._onTaskClick(bar.dataset.taskId);
            return;
        }

        // Click on task name in left column
        const taskCell = e.target.closest('.task-info');
        if (taskCell) {
            const row = taskCell.closest('.gantt-row');
            if (row && row.dataset.taskId && this._onTaskClick) {
                this._onTaskClick(row.dataset.taskId);
            }
        }
    }

    /* ---- Drag & Resize (Mouse) ---- */

    _handleMouseDown(e) {
        const handle = e.target.closest('.gantt-bar-handle');
        const bar = e.target.closest('.gantt-bar:not(.phase-bar)');

        if (!handle && !bar) return;
        if (bar && bar.classList.contains('phase-bar')) return;

        const targetBar = handle ? handle.closest('.gantt-bar') : bar;
        if (!targetBar || !targetBar.dataset.taskId) return;

        e.preventDefault();

        const task = store.getTask(targetBar.dataset.taskId);
        if (!task) return;

        const isLeftHandle = handle && handle.classList.contains('gantt-bar-handle-left');
        const isRightHandle = handle && handle.classList.contains('gantt-bar-handle-right');

        this._isDragging = true;
        this._justDragged = false;
        this._dragData = {
            taskId: task.id,
            bar: targetBar,
            mode: isLeftHandle ? 'resize-left' : (isRightHandle ? 'resize-right' : 'move'),
            startX: e.clientX,
            origLeft: parseFloat(targetBar.style.left),
            origWidth: parseFloat(targetBar.style.width),
            origStartDate: task.startDate,
            origEndDate: task.endDate,
            moved: false,
        };

        targetBar.style.opacity = '0.8';
        targetBar.style.zIndex = '10';
        document.body.style.cursor = this._dragData.mode === 'move' ? 'grabbing' : 'ew-resize';
        document.body.style.userSelect = 'none';
    }

    _handleMouseMove(e) {
        if (!this._isDragging || !this._dragData) return;

        const dx = e.clientX - this._dragData.startX;
        if (Math.abs(dx) < 3 && !this._dragData.moved) return;

        this._dragData.moved = true;
        this._justDragged = true;
        this._applyDrag(dx);
    }

    _handleMouseUp(e) {
        if (!this._isDragging) return;
        this._finishDrag();
    }

    /* ---- Touch Support ---- */

    _handleTouchStart(e) {
        const touch = e.touches[0];
        const fakeEvent = { clientX: touch.clientX, target: e.target, preventDefault: () => e.preventDefault() };
        this._handleMouseDown(fakeEvent);
    }

    _handleTouchMove(e) {
        if (!this._isDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        this._handleMouseMove({ clientX: touch.clientX });
    }

    _handleTouchEnd() {
        if (!this._isDragging) return;
        this._finishDrag();
    }

    /* ---- Drag Logic ---- */

    _applyDrag(dx) {
        const d = this._dragData;
        const colWidth = this._zoomColWidthFn();

        if (d.mode === 'move') {
            d.bar.style.left = (d.origLeft + dx) + 'px';
        } else if (d.mode === 'resize-left') {
            const newLeft = d.origLeft + dx;
            const newWidth = d.origWidth - dx;
            if (newWidth >= colWidth) {
                d.bar.style.left = newLeft + 'px';
                d.bar.style.width = newWidth + 'px';
            }
        } else if (d.mode === 'resize-right') {
            const newWidth = d.origWidth + dx;
            if (newWidth >= colWidth) {
                d.bar.style.width = newWidth + 'px';
            }
        }
    }

    _finishDrag() {
        const d = this._dragData;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';

        if (d && d.bar) {
            d.bar.style.opacity = '';
            d.bar.style.zIndex = '';
        }

        if (d && d.moved) {
            // Calculate date changes
            const colWidth = this._zoomColWidthFn();
            const timelineStart = this._timelineStartFn();
            const newLeft = parseFloat(d.bar.style.left);
            const newWidth = parseFloat(d.bar.style.width);

            const startDayOffset = Math.round(newLeft / colWidth);
            const durationDays = Math.max(1, Math.round(newWidth / colWidth) - 1);

            const newStart = addDays(timelineStart, startDayOffset);
            const newEnd = addDays(newStart, durationDays);

            const updates = {};
            if (d.mode === 'move') {
                updates.startDate = formatDateISO(newStart);
                updates.endDate = formatDateISO(newEnd);
            } else if (d.mode === 'resize-left') {
                updates.startDate = formatDateISO(newStart);
            } else if (d.mode === 'resize-right') {
                const origStartLeft = d.origLeft;
                const rightEdge = newLeft + newWidth;
                const endDayOffset = Math.round(rightEdge / colWidth) - 1;
                updates.endDate = formatDateISO(addDays(timelineStart, endDayOffset));
            }

            store.updateTask(d.taskId, updates);

            if (this._onUpdate) this._onUpdate();
        }

        this._isDragging = false;
        this._dragData = null;
    }
}

                if (!view) return;
                this._switchView(view);

                // Update tabs
                tabs.forEach(t => {
                    t.classList.remove('active');
                    t.setAttribute('aria-selected', 'false');
                });
                tab.classList.add('active');
                tab.setAttribute('aria-selected', 'true');
            });

            // Keyboard navigation for tabs
            tab.addEventListener('keydown', (e) => {
                const currentIndex = tabs.indexOf(tab);
                let nextIndex;
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    nextIndex = (currentIndex + 1) % tabs.length;
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
                } else if (e.key === 'Home') {
                    e.preventDefault();
                    nextIndex = 0;
                } else if (e.key === 'End') {
                    e.preventDefault();
                    nextIndex = tabs.length - 1;

                    tabs[nextIndex].focus();
                    tabs[nextIndex].click();
                }
