<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gantly - Outil de planification de projets avec diagramme de Gantt interactif">
    <meta name="theme-color" content="#6366F1" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#818CF8" media="(prefers-color-scheme: dark)">
    <title>Gantly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/gantt.css">
    <link rel="stylesheet" href="css/settings-panel.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <a href="#mainContent" class="skip-link" data-i18n="skip.link">Aller au contenu principal</a>
    <div id="srAnnouncer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <header class="header" role="banner">
        <div class="logo" aria-label="Gantly" style="width:220px;height:56px;background:url('assets/Logo%20Gantly.png') center/auto 24px no-repeat;"></div>

        <button class="project-selector" tabindex="0" role="button" aria-haspopup="listbox" data-i18n-aria-label="project.select">
            <span class="project-name" id="projectName">…</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M6 9l6 6 6-6"/>
            </svg>
        </button>

        <div class="header-spacer"></div>

        <div class="search-box" role="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="search" id="searchInput" data-i18n-placeholder="header.search" placeholder="Rechercher... (Ctrl/⌘+F)" aria-label="Rechercher dans le projet">
        </div>

        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" aria-label="Passer en mode sombre" data-i18n-title="header.theme">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sun-icon" aria-hidden="true">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="moon-icon" style="display:none" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>

            <div class="avatar" id="settingsBtn" tabindex="0" role="button" data-i18n-aria-label="header.settings" data-i18n-title="header.settingsTitle">JD</div>

            <!-- User menu -->
            <div style="display:flex;align-items:center;gap:0.5rem;margin-left:0.25rem;">
                <span id="userEmail" style="font-size:0.78rem;color:var(--text-secondary);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                <button id="signOutBtn" title="Se déconnecter" aria-label="Se déconnecter"
                    style="display:flex;align-items:center;padding:0.35rem;background:none;border:none;color:var(--text-secondary);cursor:pointer;border-radius:6px;transition:color 0.15s;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <nav class="toolbar" role="navigation" data-i18n-aria-label="toolbar.navAriaLabel">
            <div class="tabs" role="tablist" data-i18n-aria-label="toolbar.tabsAriaLabel">
                <button class="tab active" role="tab" aria-selected="true" data-view="timeline" tabindex="0" id="tabTimeline" aria-controls="mainContent">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
                        <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
                    </svg>
                    <span data-i18n="tab.timeline">Timeline</span>
                </button>
                <button class="tab" role="tab" aria-selected="false" data-view="board" tabindex="-1" id="tabBoard" aria-controls="mainContent">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <span data-i18n="tab.board">Tableau</span>
                </button>
                <button class="tab" role="tab" aria-selected="false" data-view="resources" tabindex="-1" id="tabResources" aria-controls="mainContent">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span data-i18n="tab.resources">Ressources</span>
                </button>
                <button class="tab" role="tab" aria-selected="false" data-view="dashboard" tabindex="-1" id="tabDashboard" aria-controls="mainContent">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/>
                        <rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>
                    </svg>
                    <span data-i18n="tab.dashboard">Dashboard</span>
                </button>
                <button class="tab" role="tab" aria-selected="false" data-view="costs" tabindex="-1" id="tabCosts" aria-controls="mainContent">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="2" y="13" width="4" height="8" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/>
                        <rect x="18" y="4" width="4" height="17" rx="1"/>
                    </svg>
                    <span data-i18n="tab.costs">Co&ucirc;ts</span>
                </button>
            </div>

            <div class="toolbar-actions">
                <div class="undo-redo-group" role="group" data-i18n-aria-label="toolbar.undoGroup">
                    <button class="icon-btn" id="undoBtn" data-i18n-aria-label="toolbar.undo" data-i18n-title="toolbar.undo">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="redoBtn" data-i18n-aria-label="toolbar.redo" data-i18n-title="toolbar.redo">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
                        </svg>
                    </button>
                </div>

                <button class="btn btn-secondary" id="criticalPathBtn" data-i18n-aria-label="toolbar.criticalPath" data-i18n-title="toolbar.criticalPathTooltip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" width="16" height="16">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                    <span data-i18n="toolbar.criticalPath">Chemin critique</span>
                </button>

                <div class="baseline-wrap" id="baselineWrap">
                    <button class="btn btn-secondary" id="baselineBtn" data-i18n-aria-label="toolbar.baseline" data-i18n-title="toolbar.baselineTooltip" aria-haspopup="true" aria-expanded="false">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" width="16" height="16">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                        </svg>
                        <span data-i18n="toolbar.baseline">Baseline</span>
                    </button>
                    <div class="baseline-popover" id="baselinePopover" role="dialog" data-i18n-aria-label="toolbar.baselineDialog" style="display:none;"></div>
                </div>

                <div class="zoom-controls" role="group" data-i18n-aria-label="zoom.group">
                    <button class="zoom-btn" data-zoom="day" data-i18n-aria-label="zoom.dayAria" data-i18n-title="zoom.dayLabel" data-i18n="zoom.dayShort">J</button>
                    <button class="zoom-btn active" data-zoom="week" data-i18n-aria-label="zoom.weekAria" data-i18n-title="zoom.weekLabel" data-i18n="zoom.weekShort">S</button>
                    <button class="zoom-btn" data-zoom="month" data-i18n-aria-label="zoom.monthAria" data-i18n-title="zoom.monthLabel" data-i18n="zoom.monthShort">M</button>
                    <button class="zoom-btn" data-zoom="quarter" data-i18n-aria-label="zoom.quarterAria" data-i18n-title="zoom.quarterLabel" data-i18n="zoom.quarterShort">T</button>
                    <span class="zoom-label" aria-live="polite" data-i18n="zoom.week">Semaine</span>
                </div>

                <button class="btn btn-secondary" id="importBtn" data-i18n-aria-label="toolbar.importAriaLabel" data-i18n-title="toolbar.importTooltip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span data-i18n="toolbar.import">Importer</span>
                </button>

                <button class="btn btn-secondary" id="exportBtn" data-i18n-aria-label="toolbar.exportAriaLabel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span data-i18n="toolbar.export">Exporter</span>
                </button>

                <button class="icon-btn" id="shareBtn" title="Partager le projet" aria-label="Partager le projet">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                </button>

                <button class="icon-btn" id="historyBtn" title="Journal du projet (7 derniers jours)" aria-label="Journal du projet" style="position: relative;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </button>

                <button class="icon-btn" id="notifBtn" data-i18n-aria-label="toolbar.notifications" data-i18n-title="toolbar.notifications" style="position: relative;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                </button>

                <button class="btn btn-primary" id="addTaskBtn" data-i18n-aria-label="toolbar.addTaskAriaLabel" data-i18n-title="toolbar.addTaskTooltip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    <span data-i18n="toolbar.addTask">Nouvelle tâche</span>
                </button>
            </div>
        </nav>

        <main class="content" role="main" id="mainContent" data-i18n-aria-label="main.ariaLabel">
            <div class="gantt-wrapper">
                <div class="gantt-container" id="ganttContainer" aria-label="Diagramme de Gantt"></div>
            </div>
            <div id="boardView" style="display: none;" aria-label="Vue tableau Kanban"></div>
            <div id="resourceView" style="display: none;" aria-label="Vue ressources"></div>
            <div id="dashboardView" style="display: none;" aria-label="Dashboard multi-projets"></div>
            <div id="costsView" style="display: none;" aria-label="Vue des coûts du projet"></div>
        </main>
    </div>

    <nav class="mobile-nav" aria-label="Navigation mobile">
        <div class="mobile-nav-items">
            <button class="mobile-nav-item active" data-view="timeline" aria-label="Vue Timeline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
                    <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
                </svg>
                <span>Timeline</span>
            </button>
            <button class="mobile-nav-item" data-view="board" aria-label="Vue Tableau">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                <span>Tableau</span>
            </button>
            <button class="mobile-nav-item" data-view="resources" aria-label="Vue Équipe">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                </svg>
                <span>Équipe</span>
            </button>
            <button class="mobile-nav-item" data-view="dashboard" aria-label="Vue Dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/>
                    <rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>
                </svg>
                <span>Dashboard</span>
            </button>
            <button class="mobile-nav-item" data-view="costs" aria-label="Vue Coûts">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <span>Co&ucirc;ts</span>
            </button>
        </div>
    </nav>

    <script src="js/i18n.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/app-session.js"></script>
</body>
</html>
