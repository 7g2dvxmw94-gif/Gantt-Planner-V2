    /* ---- Duration <-> Dates sync ---- */

    _updateEndFromDuration() {
        const start = this._taskStart.value;
        const dur = parseInt(this._durationInput.value, 10);
        if (start && dur > 0) {
            this._taskEnd.value = formatDateISO(addDays(new Date(start), dur - 1));
        }
    }

    _updateDurationFromDates() {
        const start = this._taskStart.value;
        const end = this._taskEnd.value;
        if (start && end) {
            const days = Math.round((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24)) + 1;
            this._durationInput.value = Math.max(1, days);
        }
    }

    /* ---- Permit Deadlines ---- */

    _updatePermitDeadlines() {
        if (!this._permitDeadlinesPanel) return;
        this._permitDeadlinesPanel.innerHTML = '';

        const permitData = {
            permitType: this._permitTypeSelect.value,
            abfSector: this._abfCheck.checked,
            depositDate: this._permitDeposit.value || null,
            completenessDate: this._permitCompleteness.value || null,
            additionalDocsRequestDate: this._permitAddDocsReq.value || null,
            additionalDocsResponseDate: this._permitAddDocsResp.value || null,
            decisionDate: this._permitDecision.value || null,
            displayStartDate: this._permitDisplay.value || null,
            permitStatus: this._permitStatusSelect.value,
        };

        const deadlines = calculatePermitDeadlines(permitData);
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const items = [];
        const typeInfo = PERMIT_TYPES[permitData.permitType];
        if (typeInfo) {
            const days = deadlines.instructionDays || typeInfo.instructionDays;
            const instrLabel = permitData.abfSector
                ? t('permit.deadline.instructionDaysABF', { days })
                : t('permit.deadline.instructionDays', { days });
            items.push({ label: t('permit.deadline.instruction'), value: instrLabel });
        }

        if (deadlines.completenessDeadline) {
            items.push({ label: t('permit.deadline.completenessLimit'), value: formatDateDisplay(deadlines.completenessDeadline) });
        }

        if (deadlines.suspended) {
            items.push({ label: t('permit.deadline.provisional'), value: t('permit.deadline.suspended'), cls: 'warning' });
        } else if (deadlines.decisionDeadline) {
            const dl = new Date(deadlines.decisionDeadline);
            const daysLeft = Math.ceil((dl - today) / (1000 * 60 * 60 * 24));
            let cls = '';
            if (daysLeft <= 7 && daysLeft >= 0) cls = 'urgent';
            else if (daysLeft <= 15 && daysLeft >= 0) cls = 'warning';
            const suffix = daysLeft >= 0
                ? ' ' + t('permit.deadline.daysLeft', { days: daysLeft })
                : ' ' + t('permit.deadline.daysExceeded', { days: Math.abs(daysLeft) });
            items.push({ label: t('permit.deadline.provisional'), value: formatDateDisplay(deadlines.decisionDeadline) + suffix, cls });
        }

        if (deadlines.tacitApprovalDate && !deadlines.suspended) {
            items.push({ label: t('permit.deadline.tacitApproval'), value: formatDateDisplay(deadlines.tacitApprovalDate) });
        }

        if (deadlines.appealEndDate) {
            const appeal = new Date(deadlines.appealEndDate);
            const daysLeft = Math.ceil((appeal - today) / (1000 * 60 * 60 * 24));
            let cls = daysLeft < 0 ? '' : (daysLeft <= 7 ? 'urgent' : '');
            const label = daysLeft < 0 ? t('permit.deadline.appealPurged') : t('permit.deadline.appealEnd', { days: daysLeft });
            items.push({ label, value: formatDateDisplay(deadlines.appealEndDate), cls });
        }

        if (deadlines.expiryDate) {
            items.push({ label: t('permit.deadline.expiry'), value: formatDateDisplay(deadlines.expiryDate) });
        }

        if (items.length === 0) {
            this._permitDeadlinesPanel.appendChild(
                createElement('div', { style: { gridColumn: '1 / -1', fontSize: 'var(--font-size-xs)', color: 'var(--text-muted)' } },
                    t('permit.deadlines.noDate'))
            );
            return;
        }

        items.forEach(item => {
            const el = createElement('div', { className: 'permit-deadline-item' });
            el.appendChild(createElement('div', { className: 'permit-deadline-label' }, item.label));
            el.appendChild(createElement('div', { className: 'permit-deadline-value' + (item.cls ? ` ${item.cls}` : '') }, item.value));
            this._permitDeadlinesPanel.appendChild(el);
        });
    }

    _fillPermitFields(task) {
        if (!task.isPermit) return;
        this._permitTypeSelect.value = task.permitType || 'PC';
        this._permitDossier.value = task.permitDossier || '';
        this._permitCommune.value = task.permitCommune || '';
        this._permitService.value = task.permitService || '';
        this._permitStatusSelect.value = task.permitStatus || 'draft';
        this._abfCheck.checked = !!task.abfSector;
        this._permitDeposit.value = task.depositDate || '';
        this._permitCompleteness.value = task.completenessDate || '';
        this._permitAddDocsReq.value = task.additionalDocsRequestDate || '';
        this._permitAddDocsResp.value = task.additionalDocsResponseDate || '';
        this._permitDecision.value = task.decisionDate || '';
        this._permitDisplay.value = task.displayStartDate || '';
        this._updatePermitDeadlines();
    }

    _resetPermitFields() {
        this._permitTypeSelect.value = 'PC';
        this._permitDossier.value = '';
        this._permitCommune.value = '';
        this._permitService.value = '';
        this._permitStatusSelect.value = 'draft';
        this._abfCheck.checked = false;
        this._permitDeposit.value = '';
        this._permitCompleteness.value = '';
        this._permitAddDocsReq.value = '';
        this._permitAddDocsResp.value = '';
        this._permitDecision.value = '';
        this._permitDisplay.value = '';
        if (this._permitDeadlinesPanel) this._permitDeadlinesPanel.innerHTML = '';
    }

    _getPermitData() {
        return {
            isPermit: true,
            permitType: this._permitTypeSelect.value,
            permitDossier: this._permitDossier.value.trim(),
            permitCommune: this._permitCommune.value.trim(),
            permitService: this._permitService.value.trim(),
            permitStatus: this._permitStatusSelect.value,
            abfSector: this._abfCheck.checked,
            depositDate: this._permitDeposit.value || null,
            completenessDate: this._permitCompleteness.value || null,
            additionalDocsRequestDate: this._permitAddDocsReq.value || null,
            additionalDocsResponseDate: this._permitAddDocsResp.value || null,
            decisionDate: this._permitDecision.value || null,
            displayStartDate: this._permitDisplay.value || null,
        };
    }

    /* ---- Populate Parents ---- */

    _populateParents(selectedParentId) {
        this._parentSelect.innerHTML = '';
        this._parentSelect.appendChild(createElement('option', { value: '' }, t('task.parent.none')));
        const phases = store.getTasks().filter(t => t.isPhase);
        phases.forEach(phase => {
            // Don't allow a task to be its own parent
            if (this._editingTaskId && phase.id === this._editingTaskId) return;
            const opt = createElement('option', { value: phase.id }, phase.name);
            if (phase.id === selectedParentId) opt.selected = true;
            this._parentSelect.appendChild(opt);
        });
    }

    /* ---- Save ---- */

    _handleSave() {
        const name = this._taskName.value.trim();
        if (!name) {
            this._taskName.classList.add('input-error');
            this._taskName.focus();
            setTimeout(() => this._taskName.classList.remove('input-error'), 1500);
            return;
        }

        const activeColor = $('.color-swatch.active', this._colorPicker);
        const selectedAssignees = this._getSelectedAssignees();
        const isPermit = this._typeButtons.permit && this._typeButtons.permit.classList.contains('active');
        const data = {
            name,
            description: this._descInput.value.trim(),
            startDate: this._taskStart.value,
            endDate: this._milestoneCheck.input.checked ? this._taskStart.value : this._taskEnd.value,
            priority: this._prioritySelect.value,
            status: this._statusSelect.value,
            progress: parseInt(this._progressInput.value, 10),
            color: activeColor ? activeColor.dataset.color : '#6366F1',
            assignee: selectedAssignees[0] || null,
            assignees: selectedAssignees,
            fixedCosts: this._getFixedCosts(),
            dependencies: this._getSelectedPredecessors(),
            isMilestone: this._milestoneCheck.input.checked,
            isPhase: this._phaseCheck.input.checked,
            isPermit: isPermit,
        };

        // Add permit-specific data
        if (isPermit) {
            Object.assign(data, this._getPermitData());
            // Set color based on permit status
            const statusInfo = PERMIT_STATUSES[data.permitStatus];
            if (statusInfo) data.color = statusInfo.color;
        } else {
            data.isPermit = false;
        }

        // Parent from the dropdown
        const selectedParent = this._parentSelect.value || null;

        if (this._mode === 'create') {
            data.parentId = selectedParent;
            const newTask = store.addTask(data);
            // Apply predecessor constraints to position the new task
            store.applyPredecessorConstraints(newTask.id);
        } else {
            data.parentId = selectedParent;
            store.updateTask(this._editingTaskId, data);

            // Apply predecessor constraints (adjusts dates based on predecessors)
            store.applyPredecessorConstraints(this._editingTaskId);

            // Update successors: sync the reverse links (only changed ones)
            const selectedSuccessors = this._getSelectedSuccessors();
            const allTasks = store.getTasks().filter(t => !t.isPhase && t.id !== this._editingTaskId);
            allTasks.forEach(t => {
                const succEntry = selectedSuccessors.find(s => s.taskId === t.id);
                const currentLink = (t.dependencies || []).find(d => d.taskId === this._editingTaskId);

                // Skip if nothing changed
                if (!succEntry && !currentLink) return;
                if (succEntry && currentLink && succEntry.type === currentLink.type) return;

                let deps = (t.dependencies || []).filter(d => d.taskId !== this._editingTaskId);
                if (succEntry) {
                    deps.push({ taskId: this._editingTaskId, type: succEntry.type });
                }
                store.updateTask(t.id, { dependencies: deps });
                // Apply constraints on the successor too
                store.applyPredecessorConstraints(t.id);
            });
        }

        this.close();
        if (this._onSave) this._onSave();
    }

    /* ---- Fixed Costs ---- */

    _populateFixedCosts(costs) {
        this._fixedCostsList.innerHTML = '';
        if (costs.length === 0) {
            // Add one empty row by default for convenience
            this._addFixedCostRow('', 0, true);
        } else {
            costs.forEach(fc => this._addFixedCostRow(fc.name || '', fc.amount || 0));
        }
        this._updateFixedCostsTotal();
    }

    _addFixedCostRow(name = '', amount = 0, isEmpty = false) {
        const row = createElement('div', { className: 'fixed-cost-row' });

        const nameInput = createElement('input', {
            className: 'input fixed-cost-name',
            type: 'text',
            placeholder: t('task.fixedCosts.namePlaceholder'),
            value: name,
        });

        const amountInput = createElement('input', {
            className: 'input fixed-cost-amount',
            type: 'number',
            min: '0',
            step: '1',
            placeholder: '0',
            value: isEmpty ? '' : (amount || ''),
        });
        amountInput.addEventListener('input', () => this._updateFixedCostsTotal());

        const removeBtn = createElement('button', {
            className: 'btn btn-xs btn-icon fixed-cost-remove',
            type: 'button',
            title: t('task.fixedCosts.removeTitle'),
        }, '×');
        removeBtn.addEventListener('click', () => {
            row.remove();
            if (this._fixedCostsList.children.length === 0) {
                this._addFixedCostRow('', 0, true);
            }
            this._updateFixedCostsTotal();
        });

        row.appendChild(nameInput);
        row.appendChild(amountInput);
        row.appendChild(removeBtn);
        this._fixedCostsList.appendChild(row);
        return row;
    }

    _updateFixedCostsTotal() {
        const costs = this._getFixedCosts();
        const total = costs.reduce((s, fc) => s + fc.amount, 0);
        const symbol = getCurrencySymbol();
        if (total > 0) {
            this._fixedCostsTotalEl.textContent = t('task.fixedCosts.total', { total: total.toLocaleString('fr-FR'), symbol });
            this._fixedCostsTotalEl.style.display = '';
        } else {
            this._fixedCostsTotalEl.style.display = 'none';
        }
    }

    _getFixedCosts() {
        const rows = this._fixedCostsList.querySelectorAll('.fixed-cost-row');
        const costs = [];
        rows.forEach(row => {
            const name = row.querySelector('.fixed-cost-name').value.trim();
            const amount = parseFloat(row.querySelector('.fixed-cost-amount').value) || 0;
            if (amount > 0) {
                costs.push({ name: name || t('task.fixedCosts.defaultName'), amount });
            }
        });
        return costs;
    }

    /* ---- Delete ---- */

    _handleDelete() {
        if (!this._editingTaskId) return;
        const task = store.getTask(this._editingTaskId);
        if (!task) return;

        const hasChildren = store.getChildTasks ? store.getChildTasks(this._editingTaskId).length > 0 : false;
        const msg = hasChildren
            ? t('confirm.deleteTaskWithChildren', { name: task.name })
            : t('confirm.deleteTask', { name: task.name });

        if (confirm(msg)) {
            store.deleteTask(this._editingTaskId);
            this.close();
            if (this._onSave) this._onSave();
        }
    }
}

// ====== js/gantt-renderer.js ======
/* ========================================
   GANTT CHART RENDERER
   Gantt Planner Pro
   ======================================== */


/* ---- Constants ---- */
const ZOOM_CONFIG = {
    day:     { colWidth: 36,  labelKey: 'zoom.day' },
    week:    { colWidth: 50,  labelKey: 'zoom.week' },
    month:   { colWidth: 120, labelKey: 'zoom.month' },
    quarter: { colWidth: 80,  labelKey: 'zoom.quarter' },
};

const VIRTUAL_THRESHOLD = 80;  // Enable virtualisation above this row count
const ROW_HEIGHT = 48;         // Must match --gantt-row-height
const BUFFER_ROWS = 10;        // Extra rows rendered above/below viewport

class GanttRenderer {
    constructor() {
        this._container = null;
        this._zoomLevel = 'week';
        this._timelineRange = null;
        this._dayColumns = [];
        this._effectiveColWidth = ZOOM_CONFIG.week.colWidth;
        this._criticalPath = null;
        this._flatNodes = [];
        this._virtualActive = false;
        this._tooltipEl = null;
        this._tooltipTaskId = null;
        this._visibleTaskIds = null;
    }

    init() {
        this._container = document.getElementById('ganttContainer');
        if (!this._container) return;

        // Listen for store changes
        store.on('change', () => this.render());

        // Bind virtual scroll
        const wrapper = this._container.closest('.gantt-wrapper');
        if (wrapper) {
            this._scrollWrapper = wrapper;
            let ticking = false;
            wrapper.addEventListener('scroll', () => {
                if (!this._virtualActive || ticking) return;
                ticking = true;
                requestAnimationFrame(() => {
                    this._updateVirtualRows();
                    ticking = false;
                });
            });
        }

        // Re-render on window resize for dynamic column sizing (month/quarter)
        let resizeTimer;
        window.addEventListener('resize', () => {
            if (this._zoomLevel !== 'month' && this._zoomLevel !== 'quarter') return;
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => this.render(), 150);
        });

        // Initial render
        const settings = store.getSettings();
        this._zoomLevel = settings.zoomLevel || 'week';
        this.render();
        this._scrollToToday();
    }

    _scrollToToday() {
        const wrapper = this._scrollWrapper;
        if (!wrapper) return;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const pos = this._dateToPosition(today);
        if (pos === null) return;
        // Center today's line in the visible area
        const taskColWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gantt-task-col-width')) || 280;
        const visibleWidth = wrapper.clientWidth - taskColWidth;
        wrapper.scrollLeft = Math.max(0, pos - visibleWidth / 3);
    }

    scrollToToday() {
        this._scrollToToday();
    }

    setZoom(level) {
        if (!ZOOM_CONFIG[level]) return;
        this._zoomLevel = level;
        store.updateSettings({ zoomLevel: level });
    }

    setCriticalPath(taskIds) {
        this._criticalPath = taskIds;
    }

    render() {
        if (!this._container) return;

        const tasks = store.getTasks();
        const tree = store.getTaskTree();
        this._timelineRange = store.getTimelineRange(this._zoomLevel);
        // Cache baseline state for this render pass
        const settings = store.getSettings();
        this._activeBaseline = (settings.showBaseline) ? store.getActiveBaseline() : null;

        // Calculate day columns for positioning
        this._dayColumns = getDaysBetween(this._timelineRange.start, this._timelineRange.end);

        // Calculate total timeline width for horizontal scrolling
        if (this._zoomLevel === 'month' || this._zoomLevel === 'quarter') {
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            const minColWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;
            // Fill available viewport width: expand columns to avoid empty space
            const taskColWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gantt-task-col-width')) || 280;
            const wrapper = this._container.closest('.gantt-wrapper');
            const availableWidth = wrapper ? wrapper.clientWidth - taskColWidth : 0;
            const dynamicColWidth = months.length > 0 ? Math.floor(availableWidth / months.length) : minColWidth;
            this._effectiveColWidth = Math.max(minColWidth, dynamicColWidth);
            this._timelineWidth = months.length * this._effectiveColWidth;
        } else {
            this._effectiveColWidth = ZOOM_CONFIG[this._zoomLevel].colWidth;
            this._timelineWidth = this._dayColumns.length * this._effectiveColWidth;
        }

        this._container.innerHTML = '';

        // Build header
        this._container.appendChild(this._renderHeader());

        // Flatten tree for virtualisation
        this._flatNodes = [];
        this._flattenTree(tree, 0);

        // Build body
        const body = createElement('div', { className: 'gantt-body', role: 'treegrid', 'aria-label': 'Diagramme de Gantt' });

        if (tree.length === 0) {
            body.appendChild(this._renderEmpty());
            this._virtualActive = false;
            // Don't stretch the container to the full timeline width when empty —
            // the empty state would be hidden behind the scroll offset.
            this._container.style.minWidth = '';
            this._container.appendChild(body);
            if (this._scrollWrapper) this._scrollWrapper.scrollLeft = 0;
            return;
        } else if (this._flatNodes.length > VIRTUAL_THRESHOLD) {
            // Virtual scrolling mode
            this._virtualActive = true;
            const totalHeight = this._flatNodes.length * ROW_HEIGHT;
            body.style.height = totalHeight + 'px';
            body.style.position = 'relative';
            this._virtualBody = body;
            this._renderedRange = { start: -1, end: -1 };
            // Set min-width before first virtual update
            const taskColWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gantt-task-col-width')) || 280;
            this._container.style.minWidth = (this._timelineWidth + taskColWidth) + 'px';
            this._container.appendChild(body);
            this._updateVirtualRows();
            // Render dependency arrows
            this._lastBody = body;
            this._lastTasks = tasks;
            this._renderDependencies(body, tasks);
            return;
        } else {
            this._virtualActive = false;
            this._flatNodes.forEach(({ node, depth }) => {
                body.appendChild(this._renderRow(node, depth));
            });
        }

        // Set min-width on container so the timeline never collapses when rows are filtered
        const taskColWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gantt-task-col-width')) || 280;
        this._container.style.minWidth = (this._timelineWidth + taskColWidth) + 'px';

        this._container.appendChild(body);

        // Render dependency arrows
        this._lastBody = body;
        this._lastTasks = tasks;
        this._renderDependencies(body, tasks);
    }

    _flattenTree(nodes, depth) {
        nodes.forEach(node => {
            this._flatNodes.push({ node, depth });
            if (node.children && node.children.length > 0 && !node.collapsed) {
                this._flattenTree(node.children, depth + 1);
            }
        });
    }

    _updateVirtualRows() {
        const body = this._virtualBody;
        if (!body || !this._scrollWrapper) return;

        const scrollTop = this._scrollWrapper.scrollTop;
        const viewHeight = this._scrollWrapper.clientHeight;
        const total = this._flatNodes.length;

        let startIdx = Math.floor(scrollTop / ROW_HEIGHT) - BUFFER_ROWS;
        let endIdx = Math.ceil((scrollTop + viewHeight) / ROW_HEIGHT) + BUFFER_ROWS;
        startIdx = Math.max(0, startIdx);
        endIdx = Math.min(total, endIdx);

        // Skip re-render if range hasn't changed
        if (startIdx === this._renderedRange.start && endIdx === this._renderedRange.end) return;
        this._renderedRange = { start: startIdx, end: endIdx };

        // Remove old rows (keep non-row children like SVG dep layer)
        body.querySelectorAll('.gantt-row').forEach(r => r.remove());

        // Render visible rows
        for (let i = startIdx; i < endIdx; i++) {
            const { node, depth } = this._flatNodes[i];
            const row = this._renderRow(node, depth);
            row.style.position = 'absolute';
            row.style.top = (i * ROW_HEIGHT) + 'px';
            row.style.left = '0';
            row.style.right = '0';
            row.style.height = ROW_HEIGHT + 'px';
            body.appendChild(row);
        }

        // Re-apply visibility filter if active
        if (this._visibleTaskIds) {
            body.querySelectorAll('.gantt-row').forEach(row => {
                const taskId = row.dataset.taskId;
                if (taskId && !this._visibleTaskIds.has(taskId)) {
                    row.style.display = 'none';
                }
            });
        }

        this.refreshDependencies();
    }

    /** Re-render dependency arrows (called after filter changes) */
    refreshDependencies() {
        if (!this._lastBody || !this._lastTasks) return;
        this._renderDependencies(this._lastBody, this._lastTasks);
    }

    setVisibleTaskIds(ids) {
        this._visibleTaskIds = ids || null;
    }

    /* ---- Header ---- */

    _renderHeader() {
        const header = createElement('div', { className: 'gantt-header', role: 'row' });

        // Task column header
        const taskHeader = createElement('div', {
            className: 'gantt-header-task',
            role: 'columnheader',
        }, t('gantt.taskColumnHeader'));
        header.appendChild(taskHeader);

        // Timeline header
        const timelineHeader = createElement('div', { className: 'gantt-timeline-header' });

        if (this._zoomLevel === 'day' || this._zoomLevel === 'week') {
            // Show months on top, weeks/days below
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);

            months.forEach((monthDate) => {
                const monthEnd = new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0);
                const visibleStart = new Date(Math.max(monthDate.getTime(), this._timelineRange.start.getTime()));
                const visibleEnd = new Date(Math.min(monthEnd.getTime(), this._timelineRange.end.getTime()));
                const daysInVisibleMonth = daysBetween(visibleStart, visibleEnd) + 1;

                const colWidth = this._effectiveColWidth;
                const monthWidth = daysInVisibleMonth * colWidth;

                const monthEl = createElement('div', {
                    className: 'timeline-month',
                    style: { width: monthWidth + 'px', minWidth: monthWidth + 'px' },
                });

                // Month name
                const monthName = createElement('div', { className: 'timeline-month-name' },
                    `${getMonthName(monthDate).charAt(0).toUpperCase() + getMonthName(monthDate).slice(1)} ${monthDate.getFullYear()}`
                );
                monthEl.appendChild(monthName);

                // Sub-row: weeks or days
                const subRow = createElement('div', { className: 'timeline-weeks' });

                if (this._zoomLevel === 'week') {
                    // Show week numbers, clipped to month boundaries
                    const weeks = getWeeksBetween(visibleStart, visibleEnd);
                    weeks.forEach(weekDate => {
                        const weekEnd = addDays(weekDate, 6); // Sunday
                        // Clip week to visible month range
                        const clippedStart = new Date(Math.max(weekDate.getTime(), visibleStart.getTime()));
                        const clippedEnd = new Date(Math.min(weekEnd.getTime(), visibleEnd.getTime()));
                        const visibleDays = daysBetween(clippedStart, clippedEnd) + 1;
                        if (visibleDays <= 0) return;
                        const weekNum = getWeekNumber(weekDate);
                        const weekEl = createElement('div', {
                            className: 'timeline-week',
                            style: { width: (colWidth * visibleDays) + 'px', minWidth: (colWidth * visibleDays) + 'px' },
                        }, `S${weekNum}`);
                        subRow.appendChild(weekEl);
                    });
                } else {
                    // Show day numbers
                    const days = getDaysBetween(visibleStart, visibleEnd);
                    days.forEach(dayDate => {
                        let cls = 'timeline-day';
                        if (isWeekend(dayDate)) cls += ' weekend';
                        if (isToday(dayDate)) cls += ' today';
                        const dayEl = createElement('div', {
                            className: cls,
                            style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
                        }, dayDate.getDate().toString());
                        subRow.appendChild(dayEl);
                    });
                }

                monthEl.appendChild(subRow);
                timelineHeader.appendChild(monthEl);
            });
        } else if (this._zoomLevel === 'quarter') {
            // Quarter view: group months into quarters with T1-T4 labels
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            const colWidth = this._effectiveColWidth;

            // Group months by quarter
            const quarters = [];
            months.forEach(monthDate => {
                const q = Math.floor(monthDate.getMonth() / 3);
                const year = monthDate.getFullYear();
                const key = `${year}-Q${q}`;
                let existing = quarters.find(qr => qr.key === key);
                if (!existing) {
                    existing = { key, quarter: q + 1, year, monthCount: 0 };
                    quarters.push(existing);
                }
                existing.monthCount++;
            });

            quarters.forEach(q => {
                const width = q.monthCount * colWidth;
                const quarterEl = createElement('div', {
                    className: 'timeline-month',
                    style: { width: width + 'px', minWidth: width + 'px' },
                });
                const label = `T${q.quarter} ${q.year}`;
                quarterEl.appendChild(createElement('div', { className: 'timeline-month-name' }, label));
                timelineHeader.appendChild(quarterEl);
            });
        } else {
            // Month view
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            const colWidth = this._effectiveColWidth;

            months.forEach(monthDate => {
                const monthEl = createElement('div', {
                    className: 'timeline-month',
                    style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
                });
                const label = `${getMonthName(monthDate).charAt(0).toUpperCase() + getMonthName(monthDate).slice(1)} ${monthDate.getFullYear()}`;
                monthEl.appendChild(createElement('div', { className: 'timeline-month-name' }, label));
                timelineHeader.appendChild(monthEl);
            });
        }

        header.appendChild(timelineHeader);
        return header;
    }

    /* ---- Body / Tree ---- */

    _renderTree(nodes, container, depth) {
        nodes.forEach((node, index) => {
            const row = this._renderRow(node, depth);
            container.appendChild(row);

            // Render children if not collapsed
            if (node.children && node.children.length > 0 && !node.collapsed) {
                this._renderTree(node.children, container, depth + 1);
            }
        });
    }

    _renderRow(task, depth) {
        const isPhase = task.isPhase;
        const isMilestone = task.isMilestone;
        const isPermit = task.isPermit;
        const hasChildren = task.children && task.children.length > 0;
        const resources = store.getResources();
        const assignees = (task.assignees || []).map(id => resources.find(r => r.id === id)).filter(Boolean);

        let rowClass = 'gantt-row';
        if (isPhase) rowClass += ' phase';
        if (isPermit) rowClass += ' permit';

        const row = createElement('div', {
            className: rowClass,
            role: 'row',
            'aria-level': depth + 1,
            dataset: { taskId: task.id },
        });

        // ---- Task cell (left) ----
        const taskCell = createElement('div', {
            className: `gantt-task-cell${depth > 0 ? ` indent-${Math.min(depth, 3)}` : ''}`,
            role: 'gridcell',
        });

        // Expand/Collapse button
        if (hasChildren || isPhase) {
            const expandBtn = createElement('button', {
                className: `task-expand${task.collapsed ? '' : ' expanded'}`,
                'aria-label': task.collapsed ? t('gantt.expand') : t('gantt.collapse'),
                'aria-expanded': !task.collapsed,
                onClick: (e) => {
                    e.stopPropagation();
                    store.toggleTaskCollapse(task.id);
                },
            }, '\u25B6');
            taskCell.appendChild(expandBtn);
        } else {
            taskCell.appendChild(createElement('div', { className: 'task-expand-placeholder' }));
        }

        // Color indicator
        taskCell.appendChild(createElement('div', {
            className: 'task-color',
            style: { background: task.color },
        }));

        // Task info
        const taskInfo = createElement('div', { className: 'task-info' });
        let displayName = task.name;
        if (isMilestone) displayName = `\u25C6 ${task.name}`;
        else if (isPermit) displayName = `\uD83D\uDCC4 ${task.name}`;

        taskInfo.appendChild(createElement('div', { className: 'task-name', title: task.name }, displayName));

        // Meta line
        const metaParts = [];
        if (assignees.length === 1) {
            metaParts.push(`@${assignees[0].name.split(' ')[0]}`);
        } else if (assignees.length > 1) {
            metaParts.push(`${assignees.length} personnes`);
        }
        if (isPermit) {
            const statusInfo = PERMIT_STATUSES[task.permitStatus];
            if (statusInfo) metaParts.push(statusInfo.label);
            if (task.permitDossier) metaParts.push(task.permitDossier);
        } else if (isMilestone) {
            metaParts.push(`Jalon \u00b7 ${formatDateShort(task.startDate)}`);
        } else if (isPhase) {
            const childCount = task.children ? task.children.length : 0;
            metaParts.push(`${childCount} tâche${childCount > 1 ? 's' : ''}`);
        } else {
            const duration = daysBetween(task.startDate, task.endDate) + 1;
            metaParts.push(`${duration} jour${duration > 1 ? 's' : ''}`);
        }

        if (metaParts.length > 0) {
            taskInfo.appendChild(createElement('div', { className: 'task-meta' }, metaParts.join(' \u00b7 ')));
        }

        taskCell.appendChild(taskInfo);
        row.appendChild(taskCell);

        // ---- Timeline cell (right) ----
        const timelineCell = createElement('div', {
            className: 'gantt-timeline-cell',
            role: 'gridcell',
        });

        // Grid background
        this._renderGridBackground(timelineCell);

        // Today line
        this._renderTodayLine(timelineCell);

        // Bar or milestone or permit
        if (isPermit) {
            this._renderPermitBar(timelineCell, task);
        } else if (isMilestone) {
            this._renderMilestone(timelineCell, task);
        } else if (isPhase) {
            this._renderPhaseBar(timelineCell, task);
        } else {
            this._renderTaskBar(timelineCell, task);
        }

        row.appendChild(timelineCell);
        return row;
    }

    /* ---- Grid Background ---- */

    _renderGridBackground(container) {
        const colWidth = this._effectiveColWidth;
        const grid = createElement('div', { className: 'gantt-timeline-grid' });

        if (this._zoomLevel === 'month' || this._zoomLevel === 'quarter') {
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            months.forEach(() => {
                grid.appendChild(createElement('div', {
                    className: 'gantt-timeline-grid-col',
                    style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
                }));
            });
        } else {
            this._dayColumns.forEach(day => {
                let cls = 'gantt-timeline-grid-col';
                if (isWeekend(day)) cls += ' weekend';
                if (this._zoomLevel === 'week' && day.getDay() === 1) cls += ' week-start';
                grid.appendChild(createElement('div', {
                    className: cls,
                    style: { width: colWidth + 'px', minWidth: colWidth + 'px' },
                }));
            });
        }

        container.appendChild(grid);
    }

    /* ---- Today Line ---- */

    _renderTodayLine(container) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const pos = this._dateToPosition(today);
        if (pos === null) return;

        const line = createElement('div', {
            className: 'today-line',
            style: { left: pos + 'px' },
            'aria-hidden': 'true',
        });
        container.appendChild(line);
    }

    /* ---- Task Bar ---- */

    _renderTaskBar(container, task) {
        const left = this._dateToPosition(new Date(task.startDate));
        const right = this._dateToPosition(addDays(new Date(task.endDate), 1));
        if (left === null || right === null) return;

        const width = Math.max(right - left, 20);
        const colorObj = TASK_COLORS.find(c => c.value === task.color);
        const gradient = colorObj ? colorObj.gradient : `linear-gradient(135deg, ${task.color}, ${task.color})`;

        const isCritical = this._criticalPath && this._criticalPath.includes(task.id);
        const bar = createElement('div', {
            className: 'gantt-bar' + (isCritical ? ' critical-path' : ''),
            style: { left: left + 'px', width: width + 'px', background: gradient },
            role: 'button',
            tabindex: '0',
            'aria-label': `${task.name}: ${task.progress}% complété, du ${formatDateShort(task.startDate)} au ${formatDateShort(task.endDate)}`,
            dataset: { taskId: task.id },
        });

        // Progress fill
        if (task.progress > 0) {
            bar.appendChild(createElement('div', {
                className: 'gantt-bar-progress',
                style: { width: task.progress + '%' },
            }));
        }

        // Label
        bar.appendChild(createElement('span', { className: 'gantt-bar-label' }, task.name));

        // Resize handles
        bar.appendChild(createElement('div', { className: 'gantt-bar-handle gantt-bar-handle-left' }));
        bar.appendChild(createElement('div', { className: 'gantt-bar-handle gantt-bar-handle-right' }));

        container.appendChild(bar);

        // Baseline ghost bar
        if (this._activeBaseline) {
            const blTask = this._activeBaseline.tasks.find(t => t.id === task.id);
            if (blTask) this._renderBaselineBar(container, task, blTask);
        }
    }

    /* ---- Phase Bar ---- */

    _renderPhaseBar(container, task) {
        const left = this._dateToPosition(new Date(task.startDate));
        const right = this._dateToPosition(addDays(new Date(task.endDate), 1));
        if (left === null || right === null) return;

        const width = Math.max(right - left, 20);

        const bar = createElement('div', {
            className: 'gantt-bar phase-bar',
            style: { left: left + 'px', width: width + 'px', background: task.color },
            role: 'button',
            tabindex: '0',
            'aria-label': `Phase ${task.name}: ${task.progress}% complété`,
            dataset: { taskId: task.id },
        });

        container.appendChild(bar);

        // Baseline ghost bar
        if (this._activeBaseline) {
            const blTask = this._activeBaseline.tasks.find(t => t.id === task.id);
            if (blTask) this._renderBaselineBar(container, task, blTask);
        }
    }

    /* ---- Milestone ---- */

    _renderMilestone(container, task) {
        const pos = this._dateToPosition(new Date(task.startDate));
        if (pos === null) return;

        const milestone = createElement('div', {
            className: 'gantt-milestone',
            style: { left: (pos - 8) + 'px', background: task.color },
            role: 'button',
            tabindex: '0',
            'aria-label': `Jalon: ${task.name} - ${formatDateShort(task.startDate)}`,
            dataset: { taskId: task.id },
        });

        container.appendChild(milestone);

        // Baseline ghost milestone
        if (this._activeBaseline) {
            const blTask = this._activeBaseline.tasks.find(t => t.id === task.id);
            if (blTask) this._renderBaselineMilestone(container, task, blTask);
        }
    }

    /* ---- Permit Bar ---- */

    _renderPermitBar(container, task) {
        const left = this._dateToPosition(new Date(task.startDate));
        const right = this._dateToPosition(addDays(new Date(task.endDate), 1));
        if (left === null || right === null) return;

        const width = Math.max(right - left, 40);
        const statusInfo = PERMIT_STATUSES[task.permitStatus] || PERMIT_STATUSES.draft;
        const color = statusInfo.color;

        const bar = createElement('div', {
            className: 'gantt-permit',
            style: { left: left + 'px', width: width + 'px', background: `linear-gradient(135deg, ${color}, ${color}dd)` },
            role: 'button',
            tabindex: '0',
            'aria-label': `Permis: ${task.name} - ${statusInfo.label}`,
            title: `${task.name}\n${statusInfo.label}${task.permitDossier ? '\nN°' + task.permitDossier : ''}`,
            dataset: { taskId: task.id },
        });

        // Sub-sections: instruction | decision | display | appeal
        const deadlines = calculatePermitDeadlines(task);
        if (task.depositDate && deadlines.decisionDeadline) {
            const sections = createElement('div', { className: 'gantt-permit-sections' });
            const totalDays = daysBetween(task.startDate, task.endDate) || 1;

            // Instruction phase: deposit -> decision
            const instrDays = daysBetween(task.startDate, deadlines.decisionDeadline);
            if (instrDays > 0) {
                sections.appendChild(createElement('div', {
                    className: 'gantt-permit-section instruction',
                    style: { width: Math.min(100, (instrDays / totalDays) * 100) + '%' },
                    title: t('gantt.permit.instruction'),
                }));
            }

            // Appeal phase if applicable
            if (deadlines.appealEndDate && task.decisionDate) {
                const appealStart = task.displayStartDate || task.decisionDate;
                const appealDays = daysBetween(appealStart, deadlines.appealEndDate);
                const appealOffset = daysBetween(task.startDate, appealStart);
                if (appealDays > 0) {
                    sections.appendChild(createElement('div', {
                        className: 'gantt-permit-section appeal',
                        style: { width: Math.min(100 - (appealOffset / totalDays) * 100, (appealDays / totalDays) * 100) + '%' },
                        title: t('gantt.permit.appeal'),
                    }));
                }
            }

            bar.appendChild(sections);
        }

        // Icon
        bar.appendChild(createElement('div', { className: 'gantt-permit-icon' }, '\uD83D\uDCC4'));

        // Label
        bar.appendChild(createElement('span', { className: 'gantt-permit-label' }, task.name));

        // Progress fill (based on permit status order)
        const progress = (statusInfo.order / 9) * 100;
        if (progress > 0) {
            bar.appendChild(createElement('div', {
                className: 'gantt-permit-progress',
                style: { width: Math.min(progress, 100) + '%' },
            }));
        }

        container.appendChild(bar);
    }

    /* ---- Baseline Rendering ---- */

    _renderBaselineBar(container, task, blTask) {
        const left = this._dateToPosition(new Date(blTask.startDate));
        const right = this._dateToPosition(addDays(new Date(blTask.endDate), 1));
        if (left === null || right === null) return;

        const width = Math.max(right - left, 10);
        const bar = createElement('div', {
            className: 'gantt-baseline-bar',
            style: { left: left + 'px', width: width + 'px' },
            'aria-hidden': 'true',
        });
        container.appendChild(bar);

        // Variance tag
        const variance = Math.round((new Date(task.endDate) - new Date(blTask.endDate)) / 86400000);
        if (variance !== 0) {
            const tag = createElement('div', {
                className: 'gantt-variance-tag ' + (variance > 0 ? 'gantt-variance-late' : 'gantt-variance-early'),
                style: { left: (left + width + 4) + 'px' },
                'aria-hidden': 'true',
            }, (variance > 0 ? '+' : '') + variance + 'j');
            container.appendChild(tag);
        }
    }

    _renderBaselineMilestone(container, task, blTask) {
        const pos = this._dateToPosition(new Date(blTask.startDate));
        if (pos === null) return;

        const diamond = createElement('div', {
            className: 'gantt-baseline-milestone',
            style: { left: (pos - 7) + 'px' },
            'aria-hidden': 'true',
        });
        container.appendChild(diamond);

        const variance = Math.round((new Date(task.startDate) - new Date(blTask.startDate)) / 86400000);
        if (variance !== 0) {
            const tag = createElement('div', {
                className: 'gantt-variance-tag ' + (variance > 0 ? 'gantt-variance-late' : 'gantt-variance-early'),
                style: { left: (pos + 14) + 'px' },
                'aria-hidden': 'true',
            }, (variance > 0 ? '+' : '') + variance + 'j');
            container.appendChild(tag);
        }
    }

    /* ---- Date <-> Position ---- */

    _dateToPosition(date) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        const rangeStart = new Date(this._timelineRange.start);
        rangeStart.setHours(0, 0, 0, 0);

        const diffDays = daysBetween(rangeStart, d);

        const effectiveColWidth = this._effectiveColWidth;

        if (this._zoomLevel === 'day' || this._zoomLevel === 'week') {
            return diffDays * effectiveColWidth;
        } else {
            // Month or Quarter: position within month columns
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            let offset = 0;
            for (const m of months) {
                const monthEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0);
                const daysInMonth = monthEnd.getDate();
                if (d >= m && d <= monthEnd) {
                    const dayInMonth = d.getDate() - 1;
                    return offset + (dayInMonth / daysInMonth) * effectiveColWidth;
                }
                offset += effectiveColWidth;
            }
            return offset;
        }
    }

    /**
     * Convert a pixel position (from timeline left edge) back to a Date.
     * Inverse of _dateToPosition().
     */
    positionToDate(px) {
        const effectiveColWidth = this._effectiveColWidth;
        const rangeStart = new Date(this._timelineRange.start);
        rangeStart.setHours(0, 0, 0, 0);

        if (this._zoomLevel === 'day' || this._zoomLevel === 'week') {
            const dayOffset = Math.round(px / effectiveColWidth);
            return addDays(rangeStart, dayOffset);
        } else {
            const months = getMonthsBetween(this._timelineRange.start, this._timelineRange.end);
            let offset = 0;
            for (const m of months) {
                const monthEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0);
                const daysInMonth = monthEnd.getDate();
                if (px < offset + effectiveColWidth) {
                    const fraction = (px - offset) / effectiveColWidth;
                    const dayInMonth = Math.round(fraction * daysInMonth);
                    return new Date(m.getFullYear(), m.getMonth(), 1 + Math.min(dayInMonth, daysInMonth - 1));
                }
                offset += effectiveColWidth;
            }
            // Past the end – clamp to last day
            const last = months[months.length - 1];
            return new Date(last.getFullYear(), last.getMonth() + 1, 0);
        }
    }

    /* ---- Dependency Arrows ---- */

    _renderDependencies(body, tasks) {
        // Check if links are hidden via settings
        const settings = store.getSettings();
        if (settings.customization?.showLinks === false) return;

        const rows = body.querySelectorAll('.gantt-row');
        if (!rows.length) return;

        // Build map: taskId -> { row DOM, bar element } — skip hidden (filtered) rows
        const taskMap = {};
        rows.forEach((row) => {
            if (row.style.display === 'none') return;
            const taskId = row.dataset.taskId;
            if (taskId) {
                const bar = row.querySelector('.gantt-bar, .gantt-milestone, .gantt-permit');
                taskMap[taskId] = { row, bar };
            }
        });

        // Collect dependencies with link type
        const deps = [];
        tasks.forEach(task => {
            if (task.dependencies && task.dependencies.length) {
                task.dependencies.forEach(dep => {
                    const depId = typeof dep === 'string' ? dep : dep.taskId;
                    const type = typeof dep === 'string' ? 'FS' : (dep.type || 'FS');
                    if (taskMap[depId] && taskMap[task.id]) {
                        deps.push({ from: depId, to: task.id, type });
                    }
                });
            }
        });

        // Use actual DOM positions for Y coordinates (row.offsetTop)
        // Wait for layout to be ready
        requestAnimationFrame(() => {
            const stale = body.querySelector('.gantt-dependencies-layer');
            if (stale) stale.remove();
            if (!deps.length) return;
            const bodyRect = body.getBoundingClientRect();
            const totalHeight = body.scrollHeight;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('gantt-dependencies-layer');
            svg.setAttribute('width', this._timelineWidth);
            svg.setAttribute('height', totalHeight);
            svg.style.width = this._timelineWidth + 'px';
            svg.style.height = totalHeight + 'px';

            deps.forEach(dep => {
                const fromInfo = taskMap[dep.from];
                const toInfo = taskMap[dep.to];
                if (!fromInfo.bar || !toInfo.bar) return;

                const fromBar = fromInfo.bar;
                const toBar = toInfo.bar;

                // Get actual Y positions via row offsetTop + half row height
                const fromRowTop = fromInfo.row.offsetTop;
                const fromRowH = fromInfo.row.offsetHeight;
                const toRowTop = toInfo.row.offsetTop;
                const toRowH = toInfo.row.offsetHeight;
                const fromY = fromRowTop + fromRowH / 2;
                const toY = toRowTop + toRowH / 2;

                // Bar X positions
                const fromLeft = parseFloat(fromBar.style.left) || 0;
                const fromWidth = parseFloat(fromBar.style.width) || 16;
                const toLeft = parseFloat(toBar.style.left) || 0;
                const toWidth = parseFloat(toBar.style.width) || 16;

                // Determine start/end points based on link type
                let startX, endX, arrowDir;
                if (dep.type === 'FS') {
                    // Fin → Début: from right edge of predecessor to left edge of successor
                    startX = fromLeft + fromWidth;
                    endX = toLeft;
                    arrowDir = 'right'; // arrow points right
                } else if (dep.type === 'SS') {
                    // Début → Début: from left edge to left edge
                    startX = fromLeft;
                    endX = toLeft;
                    arrowDir = 'right';
                } else if (dep.type === 'FF') {
                    // Fin → Fin: from right edge to right edge
                    startX = fromLeft + fromWidth;
                    endX = toLeft + toWidth;
                    arrowDir = 'left';
                } else if (dep.type === 'SF') {
                    // Début → Fin: from left edge of predecessor to right edge of successor
                    startX = fromLeft;
                    endX = toLeft + toWidth;
                    arrowDir = 'left';
                }

                // Draw elbow path
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.classList.add('dep-line');

                const gap = 12;
                const arrowSize = 6;
                const arrowEnd = arrowDir === 'right' ? endX - arrowSize : endX + arrowSize;

                if (dep.type === 'FS' || dep.type === 'SS') {
                    const midX = startX + (dep.type === 'FS' ? gap : -gap);
                    if (arrowEnd > startX + gap) {
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${toY} H${arrowEnd}`);
                    } else {
                        const detourY = fromY < toY ? Math.max(fromY + fromRowH * 0.8, toY - toRowH * 0.8) : Math.min(fromY - fromRowH * 0.8, toY + toRowH * 0.8);
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${detourY} H${arrowEnd - gap} V${toY} H${arrowEnd}`);
                    }
                } else {
                    // FF, SF
                    const midX = startX + (dep.type === 'SF' ? -gap : gap);
                    if (arrowEnd < startX - gap) {
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${toY} H${arrowEnd}`);
                    } else {
                        const detourY = fromY < toY ? Math.max(fromY + fromRowH * 0.8, toY - toRowH * 0.8) : Math.min(fromY - fromRowH * 0.8, toY + toRowH * 0.8);
                        path.setAttribute('d', `M${startX} ${fromY} H${midX} V${detourY} H${arrowEnd + gap} V${toY} H${arrowEnd}`);
                    }
                }

                svg.appendChild(path);

                // Arrowhead
                const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                arrow.classList.add('dep-arrow');
                if (arrowDir === 'right') {
                    arrow.setAttribute('points', `${endX - arrowSize} ${toY - 4}, ${endX} ${toY}, ${endX - arrowSize} ${toY + 4}`);
                } else {
                    arrow.setAttribute('points', `${endX + arrowSize} ${toY - 4}, ${endX} ${toY}, ${endX + arrowSize} ${toY + 4}`);
                }
                svg.appendChild(arrow);
            });

            svg.style.position = 'absolute';
            svg.style.top = '0';
            svg.style.left = 'var(--gantt-task-col-width)';
            svg.style.pointerEvents = 'none';
            svg.style.zIndex = '4';
            body.style.position = 'relative';
            body.appendChild(svg);
        });
    }

    /* ---- Empty State ---- */

    _renderEmpty() {
        const empty = createElement('div', { className: 'gantt-empty' });
        empty.appendChild(createElement('div', { className: 'gantt-empty-icon' }, '\uD83D\uDCCA'));
        empty.appendChild(createElement('div', { className: 'gantt-empty-title' }, t('gantt.empty.title')));
        empty.appendChild(createElement('div', { className: 'gantt-empty-text' }, t('gantt.empty.text')));
        empty.appendChild(createElement('button', {
            className: 'btn btn-primary',
            onClick: () => {
                document.dispatchEvent(new CustomEvent('gantt:addTask'));
            },
        }, [
            createElement('span', {}, t('gantt.empty.addBtn')),
        ]));
        return empty;
    }

    /* ---- Public Getters ---- */

    get zoomLevel() {
        return this._zoomLevel;
    }

    get zoomConfig() {
        return ZOOM_CONFIG;
    }

    get effectiveColWidth() {
        return this._effectiveColWidth || ZOOM_CONFIG[this._zoomLevel].colWidth;
    }

    get minBarWidth() {
        const col = this.effectiveColWidth;
        if (this._zoomLevel === 'month' || this._zoomLevel === 'quarter') {
            // 1 day within a month column (assume ~30 days)
            return Math.max(4, Math.round(col / 30));
        }
        return col; // day/week: 1 column = 1 day
    }
}
