/* ========================================
   GANTT INTERACTIONS - Drag, Resize, Click
   Gantt Planner Pro - Step 2
   ======================================== */


const AUTO_SCROLL_EDGE = 50;       // px from wrapper edge to trigger
const AUTO_SCROLL_MAX_SPEED = 15;  // max px per animation frame

class GanttInteractions {
    constructor() {
        this._container = null;
        this._onTaskClick = null;
        this._onUpdate = null;
        this._isDragging = false;
        this._dragData = null;
        this._zoomColWidthFn = null;
        this._zoomLevelFn = null;
        this._timelineStartFn = null;
        this._positionToDateFn = null;
        this._minBarWidthFn = null;
        this._tooltip = null;
        this._dropIndicator = null;
        this._autoScrollRAF = null;
        this._autoScrollSpeed = 0;
        this._tooltipEl = null;
        this._tooltipTaskId = null;
    }

    /**
     * @param {Object} opts
     * @param {Function} opts.onTaskClick - Called when a task bar/milestone is clicked
     * @param {Function} opts.onUpdate - Called after drag/resize completes
     * @param {Function} opts.getColWidth - Returns pixel width of one day column
     * @param {Function} opts.getTimelineStart - Returns the timeline start Date
     */
    init(opts) {
        this._container = document.getElementById('ganttContainer');
        if (!this._container) return;

        this._onTaskClick = opts.onTaskClick;
        this._onUpdate = opts.onUpdate;
        this._onPinchZoom = opts.onPinchZoom || null;
        this._zoomColWidthFn = opts.getColWidth;
        this._zoomLevelFn = opts.getZoomLevel || null;
        this._timelineStartFn = opts.getTimelineStart;
        this._positionToDateFn = opts.positionToDate;
        this._minBarWidthFn = opts.getMinBarWidth || null;

        // Delegate click events
        this._container.addEventListener('click', (e) => this._handleClick(e));

        // Delegate mousedown for drag/resize
        this._container.addEventListener('mousedown', (e) => this._handleMouseDown(e));

        // Global mouse events for dragging
        document.addEventListener('mousemove', (e) => this._handleMouseMove(e));
        document.addEventListener('mouseup', (e) => this._handleMouseUp(e));

        // Touch support
        this._container.addEventListener('touchstart', (e) => this._handleTouchStart(e), { passive: false });
        document.addEventListener('touchmove', (e) => this._handleTouchMove(e), { passive: false });
        document.addEventListener('touchend', (e) => this._handleTouchEnd(e));

        // Hover tooltips
        this._container.addEventListener('mouseover', (e) => this._handleBarMouseOver(e));
        this._container.addEventListener('mouseout', (e) => this._handleBarMouseOut(e));
        this._container.addEventListener('mousemove', (e) => this._handleBarMouseMove(e));
    }

    /* ---- Click ---- */

    _handleClick(e) {
        // Find the closest bar, milestone, or row with a task-id
        const bar = e.target.closest('.gantt-bar, .gantt-milestone, .gantt-permit');
        if (bar && bar.dataset.taskId) {
            // Don't fire click if we just finished dragging
            if (this._justDragged) {
                this._justDragged = false;
                return;
            }
            if (this._onTaskClick) this._onTaskClick(bar.dataset.taskId);
            return;
        }

        // Click on task name in left column
        const taskCell = e.target.closest('.task-info');
        if (taskCell) {
            const row = taskCell.closest('.gantt-row');
            if (row && row.dataset.taskId && this._onTaskClick) {
                this._onTaskClick(row.dataset.taskId);
            }
        }
    }

    /* ---- Drag & Resize (Mouse) ---- */

    _handleMouseDown(e) {
        const handle = e.target.closest('.gantt-bar-handle');
        const bar = e.target.closest('.gantt-bar:not(.phase-bar)');
        const milestone = e.target.closest('.gantt-milestone');
        const permit = e.target.closest('.gantt-permit');

        if (!handle && !bar && !milestone && !permit) return;
        if (bar && bar.classList.contains('phase-bar')) return;

        const targetBar = permit || milestone || (handle ? handle.closest('.gantt-bar') : bar);
        if (!targetBar || !targetBar.dataset.taskId) return;

        e.preventDefault();

        const task = store.getTask(targetBar.dataset.taskId);
        if (!task) return;

        const isMilestone = !!milestone;
        const isPermit = !!permit;
        const isLeftHandle = !isMilestone && !isPermit && handle && handle.classList.contains('gantt-bar-handle-left');
        const isRightHandle = !isMilestone && !isPermit && handle && handle.classList.contains('gantt-bar-handle-right');

        // Get the source row for vertical drag
        const sourceRow = targetBar.closest('.gantt-row');
        const wrapper = this._container.closest('.gantt-wrapper');

        this._isDragging = true;
        this._justDragged = false;
        this._dragData = {
            taskId: task.id,
            bar: targetBar,
            isMilestone: isMilestone,
            mode: isLeftHandle ? 'resize-left' : (isRightHandle ? 'resize-right' : 'move'),
            startX: e.clientX,
            startY: e.clientY,
            origLeft: parseFloat(targetBar.style.left),
            origWidth: isMilestone ? 0 : parseFloat(targetBar.style.width),
            origStartDate: task.startDate,
            origEndDate: task.endDate,
            origParentId: task.parentId,
            sourceRow: sourceRow,
            wrapper: wrapper,
            origScrollLeft: wrapper ? wrapper.scrollLeft : 0,
            lastDx: 0,
            lastMouseX: e.clientX,
            lastMouseY: e.clientY,
            moved: false,
            verticalMove: false,
            dropTarget: null,
        };

        targetBar.style.opacity = '0.8';
        targetBar.style.zIndex = '10';
        document.body.style.cursor = this._dragData.mode === 'move' ? 'grabbing' : 'ew-resize';
        document.body.style.userSelect = 'none';
    }

    _handleMouseMove(e) {
        if (!this._isDragging || !this._dragData) return;

        const dx = e.clientX - this._dragData.startX;
        const dy = e.clientY - this._dragData.startY;
        if (Math.abs(dx) < 3 && Math.abs(dy) < 3 && !this._dragData.moved) return;

        this._dragData.moved = true;
        this._justDragged = true;
        this._dragData.lastDx = dx;
        this._dragData.lastMouseX = e.clientX;
        this._dragData.lastMouseY = e.clientY;

        this._applyDrag(dx);

        // Update tooltip for resize modes
        if (this._dragData.mode === 'resize-left' || this._dragData.mode === 'resize-right') {
            this._updateResizeTooltip(e);
        }

        // Vertical drag for move mode
        if (this._dragData.mode === 'move') {
            this._updateVerticalDrag(e);
        }

        // Auto-scroll when near edges
        this._updateAutoScroll(e);
    }

    _handleMouseUp(e) {
        if (!this._isDragging) return;
        this._finishDrag();
    }

    /* ---- Touch Support ---- */

    _handleTouchStart(e) {
        // Pinch-to-zoom: 2 fingers
        if (e.touches.length === 2) {
            e.preventDefault();
            this._pinchStartDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            this._pinching = true;
            return;
        }
        const touch = e.touches[0];
        const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY, target: e.target, preventDefault: () => e.preventDefault() };
        this._handleMouseDown(fakeEvent);
    }

    _handleTouchMove(e) {
        // Pinch-to-zoom handling
        if (this._pinching && e.touches.length === 2) {
            e.preventDefault();
            const dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            const ratio = dist / this._pinchStartDist;
            if (ratio > 1.3 && !this._pinchFired) {
                this._pinchFired = true;
                if (this._onPinchZoom) this._onPinchZoom('in');
            } else if (ratio < 0.7 && !this._pinchFired) {
                this._pinchFired = true;
                if (this._onPinchZoom) this._onPinchZoom('out');
            }
            return;
        }
        if (!this._isDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        this._handleMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
    }

    _handleTouchEnd() {
        if (this._pinching) {
            this._pinching = false;
            this._pinchFired = false;
            this._pinchStartDist = 0;
            return;
        }
        if (!this._isDragging) return;
        this._finishDrag();
    }

    /* ---- Drag Logic ---- */

    _applyDrag(dx) {
        const d = this._dragData;
        const colWidth = this._zoomColWidthFn();
        // Account for wrapper scroll delta so the bar tracks the cursor
        const scrollDelta = d.wrapper ? d.wrapper.scrollLeft - d.origScrollLeft : 0;
        const totalDx = dx + scrollDelta;

        // Minimum bar width: 1 day in pixels
        // In day/week views colWidth already represents 1 day.
        // In month/quarter views colWidth is a full month, so use ~1/28.
        const minWidth = this._minBarWidthFn ? this._minBarWidthFn() : colWidth;

        // Snap to day gridlines in day/week views for precise positioning
        const zoomLevel = this._zoomLevelFn ? this._zoomLevelFn() : null;
        const snap = (zoomLevel === 'day' || zoomLevel === 'week');

        if (d.mode === 'move') {
            let newLeft = d.origLeft + totalDx;
            if (snap) newLeft = Math.round(newLeft / colWidth) * colWidth;
            d.bar.style.left = newLeft + 'px';
        } else if (d.mode === 'resize-left') {
            let newLeft = d.origLeft + totalDx;
            if (snap) newLeft = Math.round(newLeft / colWidth) * colWidth;
            const newWidth = d.origLeft + d.origWidth - newLeft;
            if (newWidth >= minWidth) {
                d.bar.style.left = newLeft + 'px';
                d.bar.style.width = newWidth + 'px';
            }
        } else if (d.mode === 'resize-right') {
            let rawRight = d.origLeft + d.origWidth + totalDx;
            if (snap) rawRight = Math.round(rawRight / colWidth) * colWidth;
            const newWidth = rawRight - d.origLeft;
            if (newWidth >= minWidth) {
                d.bar.style.width = newWidth + 'px';
            }
        }
    }

    /* ---- Auto-Scroll ---- */

    _updateAutoScroll(e) {
        const d = this._dragData;
        if (!d || !d.wrapper) return;

        const rect = d.wrapper.getBoundingClientRect();
        const mouseX = e.clientX;
        let speed = 0;

        if (mouseX < rect.left + AUTO_SCROLL_EDGE) {
            // Near left edge — scroll left
            const distance = rect.left + AUTO_SCROLL_EDGE - mouseX;
            speed = -Math.ceil((distance / AUTO_SCROLL_EDGE) * AUTO_SCROLL_MAX_SPEED);
        } else if (mouseX > rect.right - AUTO_SCROLL_EDGE) {
            // Near right edge — scroll right
            const distance = mouseX - (rect.right - AUTO_SCROLL_EDGE);
            speed = Math.ceil((distance / AUTO_SCROLL_EDGE) * AUTO_SCROLL_MAX_SPEED);
        }

        if (speed !== 0) {
            this._autoScrollSpeed = speed;
            if (!this._autoScrollRAF) {
                this._autoScrollLoop();
            }
        } else {
            this._stopAutoScroll();
        }
    }

    _autoScrollLoop() {
        const d = this._dragData;
        if (!d || !d.wrapper || !this._autoScrollSpeed) {
            this._stopAutoScroll();
            return;
        }

        d.wrapper.scrollLeft += this._autoScrollSpeed;

        // Re-apply drag to update bar position with new scroll offset
        this._applyDrag(d.lastDx);

        // Update tooltip content (date changed due to scroll)
        if (d.mode === 'resize-left' || d.mode === 'resize-right') {
            this._updateResizeTooltip({
                clientX: d.lastMouseX,
                clientY: d.lastMouseY,
            });
        }

        this._autoScrollRAF = requestAnimationFrame(() => this._autoScrollLoop());
    }

    _stopAutoScroll() {
        if (this._autoScrollRAF) {
            cancelAnimationFrame(this._autoScrollRAF);
            this._autoScrollRAF = null;
        }
        this._autoScrollSpeed = 0;
    }

    /* ---- Hover Tooltips ---- */

    _handleBarMouseOver(e) {
        if (this._isDragging) return;
        const bar = e.target.closest('.gantt-bar, .gantt-milestone, .gantt-permit');
        if (!bar) return;
        const taskId = bar.dataset.taskId;
        if (!taskId || taskId === this._tooltipTaskId) return;
        this._tooltipTaskId = taskId;
        const task = store.getTask(taskId);
        if (task) this._showHoverTooltip(task, e);
    }

    _handleBarMouseOut(e) {
        const bar = e.target.closest('.gantt-bar, .gantt-milestone, .gantt-permit');
        if (!bar) return;
        if (!bar.contains(e.relatedTarget)) {
            this._tooltipTaskId = null;
            this._hideHoverTooltip();
        }
    }

    _handleBarMouseMove(e) {
        if (this._tooltipEl) this._positionHoverTooltip(e.clientX, e.clientY);
    }

    _showHoverTooltip(task, e) {
        this._hideHoverTooltip();
        const el = document.createElement('div');
        el.className = 'gantt-hover-tooltip';
        el.innerHTML = this._buildTooltipHTML(task);
        document.body.appendChild(el);
        this._tooltipEl = el;
        this._positionHoverTooltip(e.clientX, e.clientY);
        requestAnimationFrame(() => el.classList.add('visible'));
    }

    _hideHoverTooltip() {
        if (this._tooltipEl) {
            this._tooltipEl.remove();
            this._tooltipEl = null;
        }
        this._tooltipTaskId = null;
    }

    _positionHoverTooltip(x, y) {
        if (!this._tooltipEl) return;
        const margin = 14;
        const el = this._tooltipEl;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const rect = el.getBoundingClientRect();
        let left = x + margin;
        let top = y - rect.height / 2;
        if (left + rect.width > vw - 8) left = x - rect.width - margin;
        if (top < 8) top = 8;
        if (top + rect.height > vh - 8) top = vh - rect.height - 8;
        el.style.left = left + 'px';
        el.style.top = top + 'px';
    }

    _buildTooltipHTML(task) {
        const resources = store.getResources();
        const assigneeNames = (task.assignees || [])
            .map(id => resources.find(r => r.id === id))
            .filter(Boolean)
            .map(r => r.name);

        const fmt = (iso) => {
            if (!iso) return '\u2014';
            const d = new Date(iso);
            return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
        };

        const dot = `<span class="gtt-dot" style="background:${task.color || '#6366F1'}"></span>`;
        let html = `<div class="gtt-header">${dot}<span class="gtt-title">${task.name}</span></div>`;
        html += `<div class="gtt-body">`;

        if (task.isMilestone) {
            html += `<div class="gtt-row"><span class="gtt-icon">\ud83d\udcc5</span><span>${fmt(task.startDate)}</span></div>`;
            const franchi = task.progress >= 100;
            const statusColor = franchi ? '#10B981' : '#F59E0B';
            const statusIcon  = franchi ? '✓' : '○';
            const statusLabel = franchi ? t('gantt.milestone.reached') : t('gantt.milestone.pending');
            html += `<div class="gtt-row"><span class="gtt-icon" style="color:${statusColor};font-weight:700;">${statusIcon}</span><span style="color:${statusColor};font-weight:600;">${statusLabel}</span></div>`;
        } else if (task.isPermit) {
            html += `<div class="gtt-row"><span class="gtt-icon">\ud83d\udcc5</span><span>${fmt(task.depositDate || task.startDate)} \u2192 ${fmt(task.decisionDate || task.endDate)}</span></div>`;
            if (task.permitStatus) html += `<div class="gtt-row"><span class="gtt-icon">\ud83c\udff7</span><span>${task.permitStatus}</span></div>`;
            if (task.permitDossier) html += `<div class="gtt-row"><span class="gtt-icon">\ud83d\udccb</span><span>N\u00b0 ${task.permitDossier}</span></div>`;
        } else {
            html += `<div class="gtt-row"><span class="gtt-icon">\ud83d\udcc5</span><span>${fmt(task.startDate)} \u2192 ${fmt(task.endDate)}</span></div>`;
            const dur = (task.startDate && task.endDate)
                ? Math.round((new Date(task.endDate) - new Date(task.startDate)) / 86400000) + 1
                : null;
            if (dur !== null) html += `<div class="gtt-row"><span class="gtt-icon">\u23f1</span><span>${dur} jour${dur > 1 ? 's' : ''}</span></div>`;
            if (typeof task.progress === 'number') {
                const pct = task.progress;
                const bar = `<span class="gtt-progress-bar"><span class="gtt-progress-fill" style="width:${pct}%"></span></span>`;
                html += `<div class="gtt-row"><span class="gtt-icon">\ud83d\udcca</span>${bar}<span class="gtt-progress-label">${pct}%</span></div>`;
            }
        }

        if (assigneeNames.length > 0) {
            html += `<div class="gtt-row"><span class="gtt-icon">\ud83d\udc64</span><span>${assigneeNames.join(', ')}</span></div>`;
        }

        // Baseline section — shown whenever a baseline is active (independent of showBaseline toggle)
        const baseline = store.getActiveBaseline();
        if (baseline) {
            const blTask = baseline.tasks.find(t => t.id === task.id);
            if (blTask) {
                const variance = task.isMilestone
                    ? Math.round((new Date(task.startDate) - new Date(blTask.startDate)) / 86400000)
                    : Math.round((new Date(task.endDate) - new Date(blTask.endDate)) / 86400000);
                const varColor = variance > 0 ? '#FCA5A5' : variance < 0 ? '#6EE7B7' : '#94A3B8';
                const varBg = variance > 0 ? 'rgba(239,68,68,.15)' : variance < 0 ? 'rgba(16,185,129,.15)' : 'rgba(148,163,184,.1)';
                const varLabel = variance > 0 ? `▲ +${variance}j de retard` : variance < 0 ? `▼ ${variance}j d'avance` : '✓ Dans les délais';
                html += `<div class="gtt-sep"></div>`;
                html += `<div class="gtt-bl-title">${baseline.name}</div>`;
                if (task.isMilestone) {
                    html += `<div class="gtt-row"><span class="gtt-icon">◈</span><span style="color:#94A3B8">${fmt(blTask.startDate)}</span></div>`;
                } else {
                    html += `<div class="gtt-row"><span class="gtt-icon">◈</span><span style="color:#94A3B8">${fmt(blTask.startDate)} → ${fmt(blTask.endDate)}</span></div>`;
                }
                html += `<div class="gtt-row"><span class="gtt-bl-variance" style="background:${varBg};color:${varColor}">${varLabel}</span></div>`;
            }
        }

        html += `</div>`;
        return html;
    }

    /* ---- Resize Tooltip ---- */

    _updateResizeTooltip(e) {
        const d = this._dragData;
        const newLeft = parseFloat(d.bar.style.left);
        const newWidth = parseFloat(d.bar.style.width);

        let dateStr;
        if (d.mode === 'resize-left') {
            dateStr = _formatDateFR(this._positionToDateFn(newLeft));
        } else {
            const rightEdge = newLeft + newWidth;
            // Bar right edge = _dateToPosition(endDate + 1), so subtract 1 day
            dateStr = _formatDateFR(addDays(this._positionToDateFn(rightEdge), -1));
        }

        if (!this._tooltip) {
            this._tooltip = document.createElement('div');
            this._tooltip.className = 'gantt-drag-tooltip';
            document.body.appendChild(this._tooltip);
        }

        this._tooltip.textContent = dateStr;
        this._tooltip.style.left = (e.clientX + 12) + 'px';
        this._tooltip.style.top = (e.clientY - 32) + 'px';
    }

    _removeTooltip() {
        if (this._tooltip) {
            this._tooltip.remove();
            this._tooltip = null;
        }
    }

    /* ---- Vertical Drag & Drop ---- */

    _updateVerticalDrag(e) {
        const d = this._dragData;
        const dy = Math.abs(e.clientY - d.startY);

        // Only activate vertical mode after sufficient vertical movement
        if (dy < 15) {
            this._removeDropIndicator();
            d.verticalMove = false;
            d.dropTarget = null;
            return;
        }

        d.verticalMove = true;

        // Find which row the mouse is over
        const rows = this._container.querySelectorAll('.gantt-row');
        let targetRow = null;
        let insertPosition = null; // 'before', 'inside', 'after'

        for (const row of rows) {
            if (row.style.display === 'none') continue;
            const rowId = row.dataset.taskId;
            if (rowId === d.taskId) continue; // skip self

            const rect = row.getBoundingClientRect();
            if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
                const rowTask = store.getTask(rowId);
                if (!rowTask) continue;

                // Determine drop zone: top third = before, middle = inside (if phase), bottom third = after
                const third = rect.height / 3;
                if (rowTask.isPhase) {
                    if (e.clientY < rect.top + third) {
                        insertPosition = 'before';
                    } else if (e.clientY > rect.bottom - third) {
                        insertPosition = 'after';
                    } else {
                        insertPosition = 'inside';
                    }
                } else {
                    if (e.clientY < rect.top + rect.height / 2) {
                        insertPosition = 'before';
                    } else {
                        insertPosition = 'after';
                    }
                }
                targetRow = row;
                break;
            }
        }

        if (targetRow) {
            d.dropTarget = { rowId: targetRow.dataset.taskId, position: insertPosition };
            this._showDropIndicator(targetRow, insertPosition);
        } else {
            d.dropTarget = null;
            this._removeDropIndicator();
        }
    }

    _showDropIndicator(targetRow, position) {
        if (!this._dropIndicator) {
            this._dropIndicator = document.createElement('div');
            this._dropIndicator.className = 'gantt-drop-indicator';
            document.body.appendChild(this._dropIndicator);
        }

        const rect = targetRow.getBoundingClientRect();
        const indicator = this._dropIndicator;

        if (position === 'inside') {
            // Highlight the whole row
            indicator.style.left = rect.left + 'px';
            indicator.style.top = rect.top + 'px';
            indicator.style.width = rect.width + 'px';
            indicator.style.height = rect.height + 'px';
            indicator.className = 'gantt-drop-indicator inside';
        } else {
            // Show a line above or below
            const y = position === 'before' ? rect.top : rect.bottom;
            indicator.style.left = rect.left + 'px';
            indicator.style.top = (y - 1) + 'px';
            indicator.style.width = rect.width + 'px';
            indicator.style.height = '2px';
            indicator.className = 'gantt-drop-indicator line';
        }
    }

    _removeDropIndicator() {
        if (this._dropIndicator) {
            this._dropIndicator.remove();
            this._dropIndicator = null;
        }
    }

    _applyVerticalDrop() {
        const d = this._dragData;
        if (!d.dropTarget) return;

        const { rowId, position } = d.dropTarget;
        const targetTask = store.getTask(rowId);
        if (!targetTask) return;

        const task = store.getTask(d.taskId);
        if (!task) return;

        // Prevent dropping a phase into itself or its descendants
        if (task.isPhase && this._isDescendant(task.id, rowId)) return;

        let newParentId;
        let newOrder;

        if (position === 'inside' && targetTask.isPhase) {
            // Drop inside a phase
            newParentId = targetTask.id;
            const siblings = store.getChildTasks(targetTask.id);
            newOrder = siblings.length > 0 ? Math.max(...siblings.map(s => s.order)) + 1 : 0;
        } else {
            // Drop before or after a task - adopt its parent
            newParentId = targetTask.parentId;
            const siblings = newParentId
                ? store.getChildTasks(newParentId)
                : store.getTasks().filter(t => !t.parentId);

            const targetOrder = targetTask.order;
            if (position === 'before') {
                newOrder = targetOrder;
                // Shift siblings at or after this order
                siblings.forEach(s => {
                    if (s.id !== d.taskId && s.order >= newOrder) {
                        store.updateTask(s.id, { order: s.order + 1 });
                    }
                });
            } else {
                newOrder = targetOrder + 1;
                siblings.forEach(s => {
                    if (s.id !== d.taskId && s.order > targetOrder) {
                        store.updateTask(s.id, { order: s.order + 1 });
                    }
                });
            }
        }

        // Apply the move
        store.updateTask(d.taskId, {
            parentId: newParentId,
            order: newOrder,
        });
    }

    _isDescendant(ancestorId, taskId) {
        let current = store.getTask(taskId);
        while (current) {
            if (current.id === ancestorId) return true;
            if (!current.parentId) return false;
            current = store.getTask(current.parentId);
        }
        return false;
    }

    /* ---- Finish Drag ---- */

    _finishDrag() {
        const d = this._dragData;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';

        // Clean up tooltip, drop indicator, auto-scroll
        this._removeTooltip();
        this._removeDropIndicator();
        this._stopAutoScroll();

        if (d && d.bar) {
            d.bar.style.opacity = '';
            d.bar.style.zIndex = '';
        }

        if (d && d.moved) {
            // Handle vertical drop first
            if (d.mode === 'move' && d.verticalMove && d.dropTarget) {
                this._applyVerticalDrop();
                if (this._onUpdate) this._onUpdate();
                this._isDragging = false;
                this._dragData = null;
                return;
            }

            // Calculate date changes (horizontal)
            const newLeft = parseFloat(d.bar.style.left);

            const updates = {};

            if (d.isMilestone) {
                // Milestone: position is left + 8 (centered), startDate = endDate
                const newDate = formatDateISO(this._positionToDateFn(newLeft + 8));
                updates.startDate = newDate;
                updates.endDate = newDate;
            } else {
                const newWidth = parseFloat(d.bar.style.width);
                const newStart = this._positionToDateFn(newLeft);
                // Bar right edge = _dateToPosition(endDate + 1), so subtract 1 day
                const newEnd = addDays(this._positionToDateFn(newLeft + newWidth), -1);

                if (d.mode === 'move') {
                    // Preserve original duration to avoid drift from month-length differences
                    const origDuration = daysBetween(new Date(d.origStartDate), new Date(d.origEndDate));
                    updates.startDate = formatDateISO(newStart);
                    updates.endDate = formatDateISO(addDays(newStart, origDuration));
                } else if (d.mode === 'resize-left') {
                    updates.startDate = formatDateISO(newStart);
                } else if (d.mode === 'resize-right') {
                    updates.endDate = formatDateISO(newEnd);
                }
            }

            store.updateTask(d.taskId, updates);

            if (this._onUpdate) this._onUpdate();
        }

        this._isDragging = false;
        this._dragData = null;
    }
}

/* ---- Helper ---- */

function _formatDateFR(date) {
    const d = new Date(date);
    return d.toLocaleDateString('fr-FR', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
    });
}

const ganttInteractions = new GanttInteractions();

// ====== js/onboarding.js ======
/* ========================================
   ONBOARDING - Interactive guide for new users
   ======================================== */

const ONBOARDING_STORAGE_KEY = 'gantt_onboarding_done';

const STEPS = [
    { target: '.project-selector', titleKey: 'onboarding.step1Title', textKey: 'onboarding.step1Text', position: 'bottom' },
    { target: '.tabs',            titleKey: 'onboarding.step2Title', textKey: 'onboarding.step2Text', position: 'bottom' },
    { target: '#addTaskBtn',      titleKey: 'onboarding.step3Title', textKey: 'onboarding.step3Text', position: 'bottom' },
    { target: '.gantt-wrapper',   titleKey: 'onboarding.step4Title', textKey: 'onboarding.step4Text', position: 'top' },
    { target: '.zoom-controls',   titleKey: 'onboarding.step5Title', textKey: 'onboarding.step5Text', position: 'bottom' },
    { target: '#exportBtn',       titleKey: 'onboarding.step6Title', textKey: 'onboarding.step6Text', position: 'bottom' },
];

class Onboarding {
    constructor() {
        this._overlay = null;
        this._step = 0;
        this._active = false;
    }

    /** Auto-start on first visit, or call manually */
    tryAutoStart() {
        if (localStorage.getItem(ONBOARDING_STORAGE_KEY)) return;
        // Defer so the UI is fully rendered
        setTimeout(() => this.start(), 600);
    }

    start() {
        this._step = 0;
        this._active = true;
        this._buildOverlay();
        this._showStep();
    }

    _buildOverlay() {
        if (this._overlay) this._overlay.remove();

        this._overlay = document.createElement('div');
        this._overlay.className = 'onboarding-overlay';
        this._overlay.setAttribute('role', 'dialog');
        this._overlay.setAttribute('aria-modal', 'true');
        this._overlay.setAttribute('aria-label', t('onboarding.ariaLabel'));

        // Spotlight hole (SVG mask)
        this._overlay.innerHTML = `
            <svg class="onboarding-mask" width="100%" height="100%">
                <defs>
                    <mask id="onboardingMask">
                        <rect width="100%" height="100%" fill="white"/>
                        <rect id="onboardingHole" rx="8" ry="8" fill="black"/>
                    </mask>
                </defs>
                <rect width="100%" height="100%" fill="rgba(0,0,0,.55)" mask="url(#onboardingMask)"/>
            </svg>
        `;

        // Tooltip
        this._tooltip = document.createElement('div');
        this._tooltip.className = 'onboarding-tooltip';
        this._tooltip.innerHTML = `
            <div class="onboarding-title"></div>
            <div class="onboarding-text"></div>
            <div class="onboarding-footer">
                <span class="onboarding-counter"></span>
                <div class="onboarding-btns">
                    <button class="onboarding-skip">${t('onboarding.skip')}</button>
                    <button class="onboarding-next">${t('onboarding.next')}</button>
                </div>
            </div>
        `;
        this._overlay.appendChild(this._tooltip);

        this._tooltip.querySelector('.onboarding-skip').addEventListener('click', () => this._finish());
        this._tooltip.querySelector('.onboarding-next').addEventListener('click', () => this._next());

        document.addEventListener('keydown', this._onKey = (e) => {
            if (!this._active) return;
            if (e.key === 'Escape') this._finish();
            if (e.key === 'ArrowRight' || e.key === 'Enter') this._next();
            if (e.key === 'ArrowLeft') this._prev();
            // Let app keyboard shortcuts work by closing the overlay
            if ((e.ctrlKey || e.metaKey) && e.key.length === 1) this._finish();
        });

        document.body.appendChild(this._overlay);
    }

    _showStep() {
        const step = STEPS[this._step];
        if (!step) { this._finish(); return; }

        const target = document.querySelector(step.target);
        // If target not visible (e.g. hidden on mobile), skip
        if (!target || target.offsetParent === null) {
            this._step++;
            if (this._step < STEPS.length) this._showStep();
            else this._finish();
            return;
        }

        // Scroll target into view so that the tooltip has room to display
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // Wait for scroll to settle then position everything
        const _position = () => {
            const rect = target.getBoundingClientRect();
            const pad = 6;

            // Position spotlight hole
            const hole = this._overlay.querySelector('#onboardingHole');
            hole.setAttribute('x', rect.left - pad);
            hole.setAttribute('y', rect.top - pad);
            hole.setAttribute('width', rect.width + pad * 2);
            hole.setAttribute('height', rect.height + pad * 2);

            // Update tooltip content
            this._tooltip.querySelector('.onboarding-title').textContent = t(step.titleKey);
            this._tooltip.querySelector('.onboarding-text').textContent = t(step.textKey);
            this._tooltip.querySelector('.onboarding-counter').textContent = t('onboarding.counter', { current: this._step + 1, total: STEPS.length });

            const nextBtn = this._tooltip.querySelector('.onboarding-next');
            nextBtn.textContent = this._step === STEPS.length - 1 ? t('onboarding.finish') : t('onboarding.next');

            // Position tooltip
            const tt = this._tooltip;
            tt.style.left = '';
            tt.style.right = '';
            tt.style.top = '';
            tt.style.bottom = '';
            tt.style.maxHeight = '';
            tt.style.overflowY = '';

            requestAnimationFrame(() => {
                const ttRect = tt.getBoundingClientRect();
                let left = rect.left + rect.width / 2 - ttRect.width / 2;
                left = Math.max(12, Math.min(left, window.innerWidth - ttRect.width - 12));
                tt.style.left = left + 'px';

                let topValue;
                if (step.position === 'bottom') {
                    topValue = rect.bottom + pad + 12;
                } else {
                    // If not enough space above, fall back to bottom positioning
                    const topPos = rect.top - pad - ttRect.height - 12;
                    if (topPos < 12) {
                        topValue = rect.bottom + pad + 12;
                    } else {
                        topValue = topPos;
                    }
                }

                // Ensure the tooltip doesn't overflow below the viewport
                const maxTop = window.innerHeight - ttRect.height - 12;
                if (topValue > maxTop) {
                    topValue = Math.max(12, maxTop);
                    // If still overflowing, constrain tooltip height so buttons stay accessible
                    const available = window.innerHeight - topValue - 12;
                    if (ttRect.height > available) {
                        tt.style.maxHeight = available + 'px';
                        tt.style.overflowY = 'auto';
                    }
                }

                tt.style.top = topValue + 'px';

                nextBtn.focus();
            });
        };

        // Small delay to let scrollIntoView settle
        setTimeout(_position, 350);
    }

    _next() {
        this._step++;
        if (this._step >= STEPS.length) {
            this._finish();
        } else {
            this._showStep();
        }
    }

    _prev() {
        if (this._step > 0) {
            this._step--;
            this._showStep();
        }
    }

    _finish() {
        this._active = false;
        localStorage.setItem(ONBOARDING_STORAGE_KEY, '1');
        if (this._overlay) {
            this._overlay.classList.add('fade-out');
            setTimeout(() => {
                if (this._overlay) this._overlay.remove();
                this._overlay = null;
            }, 300);
        }
        if (this._onKey) {
            document.removeEventListener('keydown', this._onKey);
            this._onKey = null;
        }
    }
}

/* ========================================
   CLOUD BACKUP - Google Drive Integration
   Gantt Planner Pro
   ======================================== */

const GDRIVE_CONFIG_KEY = 'gantt-planner-gdrive-token';
const GDRIVE_FOLDER_NAME = 'Gantt Planner Backups';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

class CloudBackup {
    constructor() {
        this._token = null;
        this._user = null;
        this._folderId = null;
        this._listeners = {};
        this._tokenClient = null;
        this._gapiLoaded = false;
        this._gisLoaded = false;
    }

    /* ---- Events ---- */

    on(event, fn) {
        if (!this._listeners[event]) this._listeners[event] = [];
        this._listeners[event].push(fn);
    }

    _emit(event, data) {
        (this._listeners[event] || []).forEach(fn => fn(data));
    }

    /* ---- State ---- */

    isSignedIn() { return !!this._token; }
    getUser() { return this._user; }

    /* ---- Google API Loading ---- */

    async _loadGapiScript() {
        if (this._gapiLoaded) return;
        if (window.gapi) { this._gapiLoaded = true; return; }

        await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://apis.google.com/js/api.js';
            s.onload = resolve;
            s.onerror = () => reject(new Error('Impossible de charger Google API'));
            document.head.appendChild(s);
        });

        await new Promise((resolve) => {
            window.gapi.load('client', resolve);
        });

        this._gapiLoaded = true;
    }

    async _loadGisScript() {
        if (this._gisLoaded) return;
        if (window.google && window.google.accounts) { this._gisLoaded = true; return; }

        await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://accounts.google.com/gsi/client';
            s.onload = resolve;
            s.onerror = () => reject(new Error('Impossible de charger Google Identity Services'));
            document.head.appendChild(s);
        });

        this._gisLoaded = true;
    }

    /* ---- Init ---- */

    async init(clientId) {
        if (!clientId) {
            throw new Error('Client ID Google manquant');
        }

        await Promise.all([
            this._loadGapiScript(),
            this._loadGisScript(),
        ]);

        await window.gapi.client.init({});
        await window.gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');

        this._tokenClient = window.google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: SCOPES,
            callback: () => {}, // set at sign-in time
        });

        // Check for existing token
        const saved = localStorage.getItem(GDRIVE_CONFIG_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.token && data.expiry && Date.now() < data.expiry) {
                    window.gapi.client.setToken({ access_token: data.token });
                    this._token = data.token;
                    this._user = data.user || null;
                    this._emit('auth', this._user);
                }
            } catch (e) { /* ignore */ }
        }

        return true;
    }

    /* ---- Auth ---- */

    signIn() {
        return new Promise((resolve, reject) => {
            if (!this._tokenClient) {
                reject(new Error('Google Drive non initialisé'));
                return;
            }

            this._tokenClient.callback = async (response) => {
                if (response.error) {
                    reject(new Error(response.error_description || response.error));
                    return;
                }

                this._token = response.access_token;

                // Get user info
                try {
                    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                        headers: { Authorization: `Bearer ${this._token}` }
                    });
                    const info = await res.json();
                    this._user = {
                        displayName: info.name,
                        email: info.email,
                        photoURL: info.picture,
                    };
                } catch (e) {
                    this._user = { displayName: 'Utilisateur Google', email: '' };
                }

                // Persist token (1h validity)
                const expiry = Date.now() + (response.expires_in * 1000);
                localStorage.setItem(GDRIVE_CONFIG_KEY, JSON.stringify({
                    token: this._token,
                    expiry,
                    user: this._user,
                }));

                this._emit('auth', this._user);
                resolve(this._user);
            };

            this._tokenClient.requestAccessToken({ prompt: 'consent' });
        });
    }

    signOut() {
        if (this._token) {
            window.google.accounts.oauth2.revoke(this._token);
        }
        this._token = null;
        this._user = null;
        this._folderId = null;
        localStorage.removeItem(GDRIVE_CONFIG_KEY);
        window.gapi.client.setToken(null);
        this._emit('auth', null);
    }

    /* ---- Drive Folder ---- */

    async _getOrCreateFolder() {
        if (this._folderId) return this._folderId;

        // Search for existing folder
        const searchRes = await window.gapi.client.drive.files.list({
            q: `name='${GDRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
            fields: 'files(id, name)',
            spaces: 'drive',
        });

        if (searchRes.result.files && searchRes.result.files.length > 0) {
            this._folderId = searchRes.result.files[0].id;
            return this._folderId;
        }

        // Create folder
        const createRes = await window.gapi.client.drive.files.create({
            resource: {
                name: GDRIVE_FOLDER_NAME,
                mimeType: 'application/vnd.google-apps.folder',
            },
            fields: 'id',
        });

        this._folderId = createRes.result.id;
        return this._folderId;
    }

    /* ---- Backups CRUD ---- */

    async saveBackup(name, data) {
        if (!this._token) throw new Error('Non connecté');

        const folderId = await this._getOrCreateFolder();
        const jsonStr = JSON.stringify(data);
        const blob = new Blob([jsonStr], { type: 'application/json' });

        const metadata = {
            name: `${name}.json`,
            mimeType: 'application/json',
            parents: [folderId],
            description: JSON.stringify({
                projectCount: data.projects ? data.projects.length : 1,
                taskCount: data.tasks ? data.tasks.length : 0,
                createdAt: new Date().toISOString(),
            }),
        };

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);

        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,size,createdTime,description', {
            method: 'POST',
            headers: { Authorization: `Bearer ${this._token}` },
            body: form,
        });

        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error?.message || 'Erreur lors de la sauvegarde');
        }

        return (await response.json()).id;
    }

    async listBackups() {
        if (!this._token) throw new Error('Non connecté');

        const folderId = await this._getOrCreateFolder();

        const res = await window.gapi.client.drive.files.list({
            q: `'${folderId}' in parents and mimeType='application/json' and trashed=false`,
            fields: 'files(id, name, size, createdTime, description)',
            orderBy: 'createdTime desc',
            pageSize: 50,
        });

        return (res.result.files || []).map(f => {
            let meta = {};
            try { meta = JSON.parse(f.description || '{}'); } catch (e) { /* ignore */ }
            return {
                id: f.id,
                name: f.name.replace(/\.json$/, ''),
                projectCount: meta.projectCount || 0,
                taskCount: meta.taskCount || 0,
                size: parseInt(f.size) || 0,
                createdAt: new Date(f.createdTime),
            };
        });
    }

    async loadBackup(fileId) {
        if (!this._token) throw new Error('Non connecté');

        const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
            headers: { Authorization: `Bearer ${this._token}` },
        });

        if (!response.ok) throw new Error('Impossible de charger la sauvegarde');
        return await response.json();
    }

    async deleteBackup(fileId) {
        if (!this._token) throw new Error('Non connecté');

        const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${this._token}` },
        });

        if (!response.ok && response.status !== 204) {
            throw new Error('Impossible de supprimer la sauvegarde');
        }
    }
}

/* ========================================
   CLOUD BACKUP - OneDrive Integration
   Gantt Planner Pro
   ======================================== */

const ONEDRIVE_CONFIG_KEY = 'gantt-planner-onedrive-token';
const ONEDRIVE_FOLDER_NAME = 'Gantt Planner Backups';
const GRAPH_API = 'https://graph.microsoft.com/v1.0';

class OneDriveBackup {
    constructor() {
        this._token = null;
        this._user = null;
        this._folderId = null;
        this._listeners = {};
        this._msalInstance = null;
        this._msalLoaded = false;
    }

    /* ---- Events ---- */

    on(event, fn) {
        if (!this._listeners[event]) this._listeners[event] = [];
        this._listeners[event].push(fn);
    }

    _emit(event, data) {
        (this._listeners[event] || []).forEach(fn => fn(data));
    }

    /* ---- State ---- */

    isSignedIn() { return !!this._token; }
    getUser() { return this._user; }

    /* ---- MSAL Loading ---- */

    async _loadMsalScript() {
        if (this._msalLoaded) return;
        if (window.msal) { this._msalLoaded = true; return; }

        await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js';
            s.onload = resolve;
            s.onerror = () => reject(new Error('Impossible de charger Microsoft Authentication Library'));
            document.head.appendChild(s);
        });

        this._msalLoaded = true;
    }

    /* ---- Init ---- */

    async init(clientId) {
        if (!clientId) {
            throw new Error('Client ID Microsoft manquant');
        }

        await this._loadMsalScript();

        const msalConfig = {
            auth: {
                clientId: clientId,
                authority: 'https://login.microsoftonline.com/common',
                redirectUri: window.location.origin + window.location.pathname,
            },
            cache: {
                cacheLocation: 'localStorage',
                storeAuthStateInCookie: false,
            },
        };

        this._msalInstance = new window.msal.PublicClientApplication(msalConfig);
        await this._msalInstance.initialize();

        // Handle redirect response (if returning from login)
        try {
            const response = await this._msalInstance.handleRedirectPromise();
            if (response) {
                this._token = response.accessToken;
                await this._fetchUserInfo();
                this._persistToken(response);
                this._emit('auth', this._user);
                return true;
            }
        } catch (e) { /* ignore redirect errors */ }

        // Check for existing token
        const saved = localStorage.getItem(ONEDRIVE_CONFIG_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.token && data.expiry && Date.now() < data.expiry) {
                    this._token = data.token;
                    this._user = data.user || null;
                    this._emit('auth', this._user);
                } else {
                    // Try silent token acquisition
                    await this._trySilentLogin();
                }
            } catch (e) { /* ignore */ }
        }

        return true;
    }

    /* ---- Auth ---- */

    async _trySilentLogin() {
        if (!this._msalInstance) return;

        const accounts = this._msalInstance.getAllAccounts();
        if (accounts.length === 0) return;

        try {
            const response = await this._msalInstance.acquireTokenSilent({
                scopes: ['Files.ReadWrite', 'User.Read'],
                account: accounts[0],
            });
            this._token = response.accessToken;
            await this._fetchUserInfo();
            this._persistToken(response);
            this._emit('auth', this._user);
        } catch (e) {
            // Silent login failed, user will need to sign in again
            localStorage.removeItem(ONEDRIVE_CONFIG_KEY);
        }
    }

    async _fetchUserInfo() {
        try {
            const res = await fetch(`${GRAPH_API}/me`, {
                headers: { Authorization: `Bearer ${this._token}` },
            });
            const info = await res.json();
            this._user = {
                displayName: info.displayName || info.userPrincipalName,
                email: info.mail || info.userPrincipalName || '',
                photoURL: null, // MS Graph photo requires separate call
            };
        } catch (e) {
            this._user = { displayName: 'Utilisateur Microsoft', email: '' };
        }
    }

    _persistToken(response) {
        const expiry = response.expiresOn
            ? new Date(response.expiresOn).getTime()
            : Date.now() + 3600 * 1000;
        localStorage.setItem(ONEDRIVE_CONFIG_KEY, JSON.stringify({
            token: this._token,
            expiry,
            user: this._user,
        }));
    }

    async signIn() {
        if (!this._msalInstance) {
            throw new Error('OneDrive non initialisé');
        }

        try {
            const response = await this._msalInstance.acquireTokenPopup({
                scopes: ['Files.ReadWrite', 'User.Read'],
                prompt: 'select_account',
            });

            this._token = response.accessToken;
            await this._fetchUserInfo();
            this._persistToken(response);
            this._emit('auth', this._user);
            return this._user;
        } catch (err) {
            if (err.errorCode === 'user_cancelled' || err.errorCode === 'interaction_in_progress') {
                throw new Error('Connexion annulée');
            }
            throw new Error(err.message || 'Erreur de connexion Microsoft');
        }
    }

    async signOut() {
        this._token = null;
        this._user = null;
        this._folderId = null;
        localStorage.removeItem(ONEDRIVE_CONFIG_KEY);

        if (this._msalInstance) {
            const accounts = this._msalInstance.getAllAccounts();
            if (accounts.length > 0) {
                try {
                    await this._msalInstance.logoutPopup({ account: accounts[0] });
                } catch (e) { /* ignore logout errors */ }
            }
        }

        this._emit('auth', null);
    }

    /* ---- Token Refresh ---- */

    async _getValidToken() {
        if (!this._token) throw new Error('Non connecté');

        const saved = localStorage.getItem(ONEDRIVE_CONFIG_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            if (data.expiry && Date.now() >= data.expiry - 60000) {
                // Token about to expire, try refresh
                await this._trySilentLogin();
                if (!this._token) throw new Error('Session expirée, veuillez vous reconnecter');
            }
        }

        return this._token;
    }

    /* ---- OneDrive Folder ---- */

    async _getOrCreateFolder() {
        if (this._folderId) return this._folderId;

        const token = await this._getValidToken();

        // Search for existing folder in root
        const searchRes = await fetch(
            `${GRAPH_API}/me/drive/root/children?$filter=name eq '${ONEDRIVE_FOLDER_NAME}' and folder ne null&$select=id,name`,
            { headers: { Authorization: `Bearer ${token}` } }
        );

        if (!searchRes.ok) {
            throw new Error('Impossible d\'accéder à OneDrive');
        }

        const searchData = await searchRes.json();
        if (searchData.value && searchData.value.length > 0) {
            this._folderId = searchData.value[0].id;
            return this._folderId;
        }

        // Create folder
        const createRes = await fetch(`${GRAPH_API}/me/drive/root/children`, {
            method: 'POST',
            headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                name: ONEDRIVE_FOLDER_NAME,
                folder: {},
                '@microsoft.graph.conflictBehavior': 'fail',
            }),
        });

        if (!createRes.ok) {
            const err = await createRes.json().catch(() => ({}));
            throw new Error(err.error?.message || 'Impossible de créer le dossier de sauvegarde');
        }

        const folder = await createRes.json();
        this._folderId = folder.id;
        return this._folderId;
    }

    /* ---- Backups CRUD ---- */

    async saveBackup(name, data) {
        const token = await this._getValidToken();
        const folderId = await this._getOrCreateFolder();

        const jsonStr = JSON.stringify(data);
        const fileName = `${name}.json`;

        // Upload file using PUT (simple upload for files < 4MB)
        const uploadRes = await fetch(
            `${GRAPH_API}/me/drive/items/${folderId}:/${encodeURIComponent(fileName)}:/content`,
            {
                method: 'PUT',
                headers: {
                    Authorization: `Bearer ${token}`,
                    'Content-Type': 'application/json',
                },
                body: jsonStr,
            }
        );

        if (!uploadRes.ok) {
            const err = await uploadRes.json().catch(() => ({}));
            throw new Error(err.error?.message || 'Erreur lors de la sauvegarde');
        }

        const file = await uploadRes.json();

        // Update file description with metadata
        const meta = {
            projectCount: data.projects ? data.projects.length : 1,
            taskCount: data.tasks ? data.tasks.length : 0,
            createdAt: new Date().toISOString(),
        };

        await fetch(`${GRAPH_API}/me/drive/items/${file.id}`, {
            method: 'PATCH',
            headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ description: JSON.stringify(meta) }),
        }).catch(() => { /* description update is optional */ });

        return file.id;
    }

    async listBackups() {
        const token = await this._getValidToken();
        const folderId = await this._getOrCreateFolder();

        const res = await fetch(
            `${GRAPH_API}/me/drive/items/${folderId}/children?$select=id,name,size,createdDateTime,description&$orderby=createdDateTime desc&$top=50&$filter=file ne null`,
            { headers: { Authorization: `Bearer ${token}` } }
        );

        if (!res.ok) throw new Error('Impossible de lister les sauvegardes');

        const data = await res.json();

        return (data.value || [])
            .filter(f => f.name.endsWith('.json'))
            .map(f => {
                let meta = {};
                try { meta = JSON.parse(f.description || '{}'); } catch (e) { /* ignore */ }
                return {
                    id: f.id,
                    name: f.name.replace(/\.json$/, ''),
                    projectCount: meta.projectCount || 0,
                    taskCount: meta.taskCount || 0,
                    size: parseInt(f.size) || 0,
                    createdAt: new Date(f.createdDateTime),
                };
            });
    }

    async loadBackup(fileId) {
        const token = await this._getValidToken();

        const response = await fetch(`${GRAPH_API}/me/drive/items/${fileId}/content`, {
            headers: { Authorization: `Bearer ${token}` },
        });

        if (!response.ok) throw new Error('Impossible de charger la sauvegarde');
        return await response.json();
    }

    async deleteBackup(fileId) {
        const token = await this._getValidToken();

        const response = await fetch(`${GRAPH_API}/me/drive/items/${fileId}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${token}` },
        });

        if (!response.ok && response.status !== 204) {
            throw new Error('Impossible de supprimer la sauvegarde');
        }
    }
}

    _renderTabContent(tabName) {
        switch (tabName) {

    /* ---- Helpers ---- */

    _getCustomization(key) {
        const settings = store.getSettings();
        const value = settings.customization?.[key];
        return value !== undefined ? value : '';
    }

    _saveCustomization(key, value) {
        const settings = store.getSettings();
        const customization = { ...(settings.customization || {}), [key]: value };
        store.updateSettings({ customization });
    }

    /* ---- Events ---- */

    _bindToggle() {
        const btn = document.getElementById('settingsBtn');
        if (btn) {
            btn.addEventListener('click', () => this.toggle());
            btn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.toggle(); }
            });
        }
    }

    _bindKeyboard() {
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this._isOpen) this._cancel();
        });
    }

    _bindInternalEvents() {
        // Close button → cancel (revert changes)
        this._panel.querySelector('#settingsPanelClose')
            .addEventListener('click', () => this._cancel());

        // Tab switching
        this._panel.querySelectorAll('.settings-tab').forEach(tab => {
            tab.addEventListener('click', () => this._switchTab(tab.dataset.tab));
        });
    }

    _switchTab(tabName) {
        this._activeTab = tabName;
        this._panel.querySelectorAll('.settings-tab').forEach(tab =>
            tab.classList.toggle('active', tab.dataset.tab === tabName)
        );
        const content = this._panel.querySelector('#settingsTabContent');
        if (content) content.innerHTML = this._renderTabContent(tabName);
        this._bindTabEvents(tabName);
    }

    _bindTabEvents(tabName) {
        switch (tabName) {
            case 'profil':    this._bindProfilEvents();    break;
            case 'apparence': this._bindApparenceEvents(); break;
            case 'general':   this._bindGeneralEvents();   break;
            case 'synchro':   this._bindSynchroEvents();   break;
            case 'aide':      this._bindAideEvents();      break;
        }
    }

    _bindProfilEvents() {
        const uploadBtn  = this._panel.querySelector('#settingsAvatarUploadBtn');
        const fileInput  = this._panel.querySelector('#settingsAvatarInput');
        const removeBtn  = this._panel.querySelector('#settingsAvatarRemoveBtn');

        if (uploadBtn && fileInput) {
            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file || file.size > 2 * 1024 * 1024) return; // 2 Mo max
                const reader = new FileReader();
                reader.onload = (ev) => {
                    this._saveCustomization('avatarPhoto', ev.target.result);
                    this._applyAvatarPhoto(ev.target.result);
                    this._switchTab('profil'); // re-render to show photo + remove btn
                };
                reader.readAsDataURL(file);
            });
        }

        if (removeBtn) {
            removeBtn.addEventListener('click', () => {
                this._saveCustomization('avatarPhoto', '');
                this._applyAvatarPhoto('');
                this._switchTab('profil');
            });
        }

        const userNameInput  = this._panel.querySelector('#settingsUserName');
        const initialsInput  = this._panel.querySelector('#settingsInitials');
        const nameInput      = this._panel.querySelector('#settingsName');

        // Logo upload
        this._bindAssetUpload({
            uploadBtnId:  'settingsLogoUploadBtn',
            removeBtnId:  'settingsLogoRemoveBtn',
            fileInputId:  'settingsLogoInput',
            previewId:    'settingsLogoPreview',
            storeKey:     'logoData',
            maxBytes:     2 * 1024 * 1024,
            renderPreview: (src) => `<img src="${src}" alt="Logo" style="max-width:100%;max-height:100%;object-fit:contain;">`,
            renderEmpty:   () => `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
            onSave:   (src) => { this._applyLogo(src);  this._switchTab('profil'); },
            onRemove: ()    => { this._applyLogo('');   this._switchTab('profil'); },
        });

        // Favicon upload
        this._bindAssetUpload({
            uploadBtnId:  'settingsFaviconUploadBtn',
            removeBtnId:  'settingsFaviconRemoveBtn',
            fileInputId:  'settingsFaviconInput',
            previewId:    'settingsFaviconPreview',
            storeKey:     'faviconData',
            maxBytes:     512 * 1024,
            renderPreview: (src) => `<img src="${src}" alt="Favicon" style="max-width:100%;max-height:100%;object-fit:contain;">`,
            renderEmpty:   () => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>`,
            onSave: (src) => { this._applyFavicon(src); this._switchTab('profil'); },
            onRemove: () => { this._applyFavicon(''); this._switchTab('profil'); },
        });

        if (initialsInput) {
            initialsInput.addEventListener('input', this._debounce(() => {
                const val = initialsInput.value.toUpperCase();
                initialsInput.value = val;
                this._saveCustomization('initials', val);
                if (!this._getCustomization('avatarPhoto')) {
                    this._applyUserInitials(this._getCustomization('userName') || '');
                    const preview = this._panel.querySelector('#settingsAvatarPreview span');
                    if (preview) preview.textContent = val || (this._getCustomization('userName') || '?').trim().split(/\s+/).map(w => w[0]).join('').substring(0, 2).toUpperCase() || '?';
                }
            }, 300));
        }

        if (userNameInput) {
            userNameInput.addEventListener('input', this._debounce(() => {
                this._saveCustomization('userName', userNameInput.value);
                // Only auto-update initials if user hasn't set custom ones
                if (!this._getCustomization('initials')) {
                    this._applyUserInitials(userNameInput.value);
                    if (!this._getCustomization('avatarPhoto')) {
                        const preview = this._panel.querySelector('#settingsAvatarPreview span');
                        if (preview) {
                            preview.textContent = userNameInput.value.trim().split(/\s+/).map(w => w[0]).join('').substring(0, 2).toUpperCase() || '?';
                        }
                    }
                }
            }, 500));
        }
        if (nameInput) {
            nameInput.addEventListener('input', this._debounce(() => {
                this._saveCustomization('brandName', nameInput.value);
                this._applyBrandName(nameInput.value);
            }, 500));
        }
    }

    _bindAssetUpload({ uploadBtnId, removeBtnId, fileInputId, previewId, storeKey, maxBytes, renderPreview, renderEmpty, onSave, onRemove }) {
        const uploadBtn  = this._panel.querySelector(`#${uploadBtnId}`);
        const fileInput  = this._panel.querySelector(`#${fileInputId}`);
        const removeBtn  = this._panel.querySelector(`#${removeBtnId}`);
        const preview    = this._panel.querySelector(`#${previewId}`);

        if (uploadBtn && fileInput) {
            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file || file.size > maxBytes) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const src = ev.target.result;
                    this._saveCustomization(storeKey, src);
                    if (preview) preview.innerHTML = renderPreview(src);
                    if (onSave) onSave(src);
                };
                reader.readAsDataURL(file);
            });
        }
        if (removeBtn) {
            removeBtn.addEventListener('click', () => {
                this._saveCustomization(storeKey, '');
                if (preview) preview.innerHTML = renderEmpty();
                if (onRemove) onRemove();
                else if (onSave) onSave('');
            });
        }
    }

    _bindApparenceEvents() {
        this._panel.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', () => {
                const { primary, hover, light, dark } = swatch.dataset;
                this._applyAccentColor(primary, hover, light, dark);
                this._saveCustomization('accentColor', primary);
                this._saveCustomization('accentColorHover', hover);
                this._saveCustomization('accentColorLight', light);
                this._saveCustomization('accentColorDark', dark);
                this._panel.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                const picker = this._panel.querySelector('#settingsAccentColor');
                if (picker) picker.value = primary;
                const hexLabel = this._panel.querySelector('#settingsAccentColorHex');
                if (hexLabel) hexLabel.textContent = primary;
            });
        });

        const colorPicker = this._panel.querySelector('#settingsAccentColor');
        if (colorPicker) {
            colorPicker.addEventListener('input', this._debounce(() => {
                const hex = colorPicker.value;
                const palette = this._computeColorPalette(hex);
                this._applyAccentColor(palette.primary, palette.hover, palette.light, palette.dark);
                this._saveCustomization('accentColor', palette.primary);
                this._saveCustomization('accentColorHover', palette.hover);
                this._saveCustomization('accentColorLight', palette.light);
                this._saveCustomization('accentColorDark', palette.dark);
                this._panel.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                const hexLabel = this._panel.querySelector('#settingsAccentColorHex');
                if (hexLabel) hexLabel.textContent = hex;
            }, 80));
        }

        const fontSelect = this._panel.querySelector('#settingsFontFamily');
        if (fontSelect) {
            fontSelect.addEventListener('change', () => {
                this._applyFontFamily(fontSelect.value);
                this._saveCustomization('fontFamily', fontSelect.value);
            });
        }

        this._panel.querySelectorAll('.font-size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const size = btn.dataset.size;
                this._applyFontSize(size);
                this._saveCustomization('fontSize', size);
                this._panel.querySelectorAll('.font-size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }

    _bindGeneralEvents() {
        // Language selector
        this._panel.querySelectorAll('.lang-btn:not([disabled])').forEach(btn => {
            btn.addEventListener('click', () => {
                setLanguage(btn.dataset.lang);
            });

        const currencySelect = this._panel.querySelector('#settingsCurrency');
        if (currencySelect) {
            currencySelect.addEventListener('change', () => {
                this._saveCustomization('currency', currencySelect.value);
                document.dispatchEvent(new CustomEvent('currency-changed'));

        const showLinksCheckbox = this._panel.querySelector('#settingsShowLinks');

                this._saveCustomization('showLinks', showLinksCheckbox.checked);
                document.dispatchEvent(new CustomEvent('links-visibility-changed'));

    _bindAideEvents() {

        if (guideBtn) {

    _bindSynchroEvents() {
        const gdriveBtn = this._panel.querySelector('#settingsGDriveBtn');
        if (gdriveBtn) {
            gdriveBtn.addEventListener('click', () => {
                this.close();
                document.dispatchEvent(new CustomEvent('open-cloud-backup'));
            });
        }
        const onedriveBtn = this._panel.querySelector('#settingsOneDriveBtn');
        if (onedriveBtn) {
            onedriveBtn.addEventListener('click', () => {
                this.close();
                document.dispatchEvent(new CustomEvent('open-onedrive-backup'));
            });
        }
